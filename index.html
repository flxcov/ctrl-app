      transform: translateX(-50%);
      display: flex;
      gap: 30px;
      font-size: 32px;
      animation: confettiFall 1s ease-out forwards;
      pointer-events: none;
    }

    .recovery-confetti span {
      animation: confettiFloat 1.5s ease-out infinite;
    }

    .recovery-confetti span:nth-child(1) { animation-delay: 0s; }
    .recovery-confetti span:nth-child(2) { animation-delay: 0.1s; }
    .recovery-confetti span:nth-child(3) { animation-delay: 0.2s; }
    .recovery-confetti span:nth-child(4) { animation-delay: 0.3s; }
    .recovery-confetti span:nth-child(5) { animation-delay: 0.4s; }

    @keyframes confettiFall {
      0% { opacity: 0; transform: translateX(-50%) translateY(-30px); }
      20% { opacity: 1; }
      100% { opacity: 0; transform: translateX(-50%) translateY(100px); }
    }

    @keyframes confettiFloat {
      0%, 100% { transform: translateX(0) rotate(0deg); }
      25% { transform: translateX(-10px) rotate(-10deg); }
      75% { transform: translateX(10px) rotate(10deg); }
    }

    .recovery-icon {
      font-size: 72px;
      margin-bottom: 20px;
    }

    .recovery-icon.bounce {
      animation: iconBounce 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) 0.2s;
    }

    @keyframes iconBounce {
      0% { transform: scale(1); }
      30% { transform: scale(1.3); }
      50% { transform: scale(0.9); }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .recovery-title {
      font-size: 28px;
      font-weight: 700;
      color: white;
      margin-bottom: 8px;
      animation: slideUp 0.4s ease 0.1s backwards;
    }

    .recovery-subtitle {
      font-size: 18px;
      color: rgba(255, 255, 255, 0.8);
      max-width: 300px;
      margin: 0 auto;
      line-height: 1.5;
      animation: slideUp 0.4s ease 0.2s backwards;
    }

    .recovery-state {
      margin-top: 28px;
      animation: slideUp 0.4s ease 0.3s backwards;
    }

    .recovery-state-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 24px;
      border-radius: 28px;
      font-size: 17px;
      font-weight: 600;
      position: relative;
      overflow: hidden;
    }

    .recovery-state-badge.green {
      background: rgba(34, 197, 94, 0.2);
      color: #22C55E;
      box-shadow: 0 0 40px rgba(34, 197, 94, 0.4);
    }

    .recovery-pulse {
      position: absolute;
      inset: 0;
      background: rgba(34, 197, 94, 0.3);
      border-radius: inherit;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.1); opacity: 0; }
    }

    .recovery-streak {
      margin-top: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      animation: slideUp 0.4s ease 0.4s backwards;
    }

    .recovery-streak-fire {
      font-size: 24px;
      animation: fireFlicker 0.5s ease-in-out infinite alternate;
    }

    @keyframes fireFlicker {
      0% { transform: scale(1) rotate(-3deg); }
      100% { transform: scale(1.1) rotate(3deg); }
    }

    .recovery-streak-text {
      font-size: 16px;
      font-weight: 600;
      color: #F59E0B;
    }

    .recovery-points {
      margin-top: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      animation: pointsAppear 0.5s ease 0.5s backwards;
    }

    @keyframes pointsAppear {
      0% { opacity: 0; transform: translateY(20px) scale(0.5); }
      60% { transform: translateY(-5px) scale(1.1); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .recovery-points-badge {
      background: linear-gradient(135deg, #F59E0B, #D97706);
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 16px;
      font-weight: 700;
      box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
    }

    .recovery-points-label {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* State transition animation (🔴 → 🟢) */
    .recovery-transition {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 24px;
      animation: transitionAppear 0.6s ease;
    }

    @keyframes transitionAppear {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }

    .recovery-from, .recovery-to {
      font-size: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 60px;
      height: 60px;
      border-radius: 50%;
    }

    .recovery-from.red {
      background: rgba(239, 68, 68, 0.2);
      animation: fadeOutState 0.8s ease 0.3s forwards;
    }

    .recovery-from.yellow {
      background: rgba(245, 158, 11, 0.2);
      animation: fadeOutState 0.8s ease 0.3s forwards;
    }

    @keyframes fadeOutState {
      0% { opacity: 1; transform: scale(1); }
      100% { opacity: 0.3; transform: scale(0.8); }
    }

    .recovery-to.green {
      background: rgba(34, 197, 94, 0.2);
      box-shadow: 0 0 30px rgba(34, 197, 94, 0.5);
      animation: pulseGreen 1s ease 0.5s infinite;
    }

    @keyframes pulseGreen {
      0%, 100% { box-shadow: 0 0 30px rgba(34, 197, 94, 0.5); }
      50% { box-shadow: 0 0 50px rgba(34, 197, 94, 0.8); }
    }

    .recovery-arrow {
      font-size: 24px;
      color: rgba(255, 255, 255, 0.5);
      animation: arrowPulse 0.5s ease 0.2s;
    }

    @keyframes arrowPulse {
      0% { transform: translateX(-10px); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }

    /* Soft exit message */
    .recovery-exit {
      margin-top: 24px;
      padding: 16px 24px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      font-size: 15px;
      color: rgba(255, 255, 255, 0.7);
      animation: slideUp 0.4s ease 0.6s backwards;
    }

    /* Remaining items indicator */
    .recovery-remaining {
      margin-top: 16px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      animation: slideUp 0.3s ease 0.3s backwards;
    }

    /* === ADA GUIDED FLOWS === */
    .guide-offer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px);
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn 0.2s ease;
    }

    .guide-offer-modal {
      background: var(--bg-secondary);
      border-radius: 24px;
      width: 100%;
      max-width: 400px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      overflow: hidden;
      animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .guide-offer-header {
      padding: 20px 24px;
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(139, 92, 246, 0.05));
      border-bottom: 1px solid rgba(139, 92, 246, 0.2);
    }

    .guide-offer-ada {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      font-weight: 600;
      color: #A78BFA;
    }

    .guide-offer-ada-avatar {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #8B5CF6, #A78BFA);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: white;
    }

    .guide-offer-content {
      padding: 28px 24px;
      text-align: center;
    }

    .guide-offer-icon {
      font-size: 56px;
      margin-bottom: 16px;
      animation: float 3s ease-in-out infinite;
    }

    .guide-offer-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .guide-offer-description {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .guide-offer-meta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .guide-offer-steps {
      padding: 4px 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
    }

    .guide-offer-preview {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 16px;
      padding: 16px;
      text-align: left;
    }

    .guide-preview-step {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .guide-preview-step:last-child {
      border-bottom: none;
    }

    .guide-preview-num {
      width: 24px;
      height: 24px;
      background: rgba(139, 92, 246, 0.2);
      color: #A78BFA;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .guide-preview-title {
      font-size: 14px;
      color: var(--text-primary);
    }

    .guide-preview-more {
      text-align: center;
      padding-top: 12px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .guide-offer-actions {
      padding: 20px 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .guide-offer-btn {
      width: 100%;
      padding: 16px 24px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-sans);
      border: none;
      transition: all 0.15s ease;
    }

    .guide-offer-btn.primary {
      background: white;
      color: black;
    }

    .guide-offer-btn.primary:hover {
      background: #f0f0f0;
      transform: translateY(-1px);
    }

    .guide-offer-btn.secondary {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .guide-offer-btn.secondary:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    /* Guide Accepted Animation */
    .guide-accepted-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(12px);
      z-index: 10001;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.2s ease;
    }

    .guide-accepted-overlay.fade-out {
      animation: fadeOut 0.3s ease forwards;
    }

    .guide-accepted-content {
      text-align: center;
      animation: recoveryPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .guide-accepted-icon {
      font-size: 72px;
      margin-bottom: 20px;
      animation: bounce 0.5s ease 0.2s;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .guide-accepted-title {
      font-size: 28px;
      font-weight: 700;
      color: white;
      margin-bottom: 8px;
    }

    .guide-accepted-subtitle {
      font-size: 18px;
      color: #22C55E;
      font-weight: 500;
      margin-bottom: 16px;
    }

    .guide-accepted-hint {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
    }

    /* Task with guide step styling */
    .task-guide-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: rgba(139, 92, 246, 0.15);
      color: #A78BFA;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      margin-left: 8px;
    }

    .task-guide-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
      padding-left: 28px;
      font-style: italic;
    }

    /* === CROSS-MODULE LINKED ITEMS === */
    .task-linked-items {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
      padding-left: 28px;
    }

    .task-linked-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      background: rgba(216, 90, 48, 0.15);
      border: 2px solid var(--brand-primary);
      border-radius: 10px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: var(--font-sans);
      color: var(--text-primary);
    }

    .task-linked-item:hover {
      background: var(--brand-soft);
      border-color: var(--brand-primary);
      color: var(--text-primary);
      transform: translateY(-1px);
    }

    .linked-item-icon {
      font-size: 16px;
    }

    .linked-item-name {
      font-weight: 600;
      color: var(--text-primary);
    }

    .linked-item-detail {
      color: var(--text-secondary);
      font-size: 12px;
      padding-left: 4px;
      border-left: 1px solid var(--border);
      margin-left: 4px;
    }

    /* Linked item in completed task */
    .task-item.completed .task-linked-item {
      opacity: 0.5;
    }

    /* === CUSTOM CONFIRM MODAL === */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      z-index: 10002;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn 0.15s ease;
    }

    .confirm-modal {
      background: var(--bg-secondary);
      border-radius: 20px;
      width: 100%;
      max-width: 340px;
      padding: 28px 24px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
      animation: slideUp 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .confirm-icon {
      font-size: 40px;
      margin-bottom: 16px;
    }

    .confirm-icon.danger {
      filter: none;
    }

    .confirm-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .confirm-message {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .confirm-actions {
      display: flex;
      gap: 12px;
    }

    .confirm-btn {
      flex: 1;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-sans);
      border: none;
      transition: all 0.15s ease;
    }

    .confirm-btn.secondary {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-primary);
    }

    .confirm-btn.secondary:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .confirm-btn.primary {
      background: white;
      color: black;
    }

    .confirm-btn.primary:hover {
      background: #f0f0f0;
    }

    .confirm-btn.danger {
      background: #EF4444;
      color: white;
    }

    .confirm-btn.danger:hover {
      background: #DC2626;
    }

    /* === ACCOUNT PROMPT MODAL === */
    .account-prompt-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      padding: 20px;
      animation: fadeIn 0.2s ease;
    }

    .account-prompt-modal {
      background: var(--bg-secondary);
      border-radius: 24px;
      width: 100%;
      max-width: 360px;
      padding: 32px 24px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
      animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .account-prompt-icon {
      width: 72px;
      height: 72px;
      background: var(--brand-soft);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 32px;
    }

    .account-prompt-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .account-prompt-subtitle {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .account-prompt-benefits {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 28px;
      text-align: left;
    }

    .account-prompt-benefit {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 12px;
    }

    .account-prompt-benefit-icon {
      font-size: 20px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 8px;
    }

    .account-prompt-benefit-text {
      font-size: 14px;
      color: var(--text-primary);
      font-weight: 500;
    }

    .account-prompt-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .account-prompt-btn {
      width: 100%;
      padding: 16px 24px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-sans);
      border: none;
      transition: all 0.15s ease;
    }

    .account-prompt-btn.primary {
      background: var(--brand-primary);
      color: white;
    }

    .account-prompt-btn.primary:hover {
      background: var(--brand-primary-dark);
      transform: translateY(-1px);
    }

    .account-prompt-btn.secondary {
      background: transparent;
      color: var(--text-secondary);
      padding: 12px;
    }

    .account-prompt-btn.secondary:hover {
      color: var(--text-primary);
    }

    /* === QUICK ADD MODAL === */
    .quick-add-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      z-index: 9999;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      animation: fadeIn 0.2s ease;
    }

    .quick-add-modal {
      width: 100%;
      max-width: 420px;
      background: var(--bg-tertiary);
      border-radius: 24px 24px 0 0;
      padding: 20px;
      padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
      animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .quick-add-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .quick-add-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .quick-add-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.15s ease;
    }

    .quick-add-close:hover {
      background: rgba(255, 255, 255, 0.12);
      color: var(--text-primary);
    }

    .quick-add-close svg {
      width: 18px;
      height: 18px;
    }

    .quick-add-types {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }

    .quick-add-type {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 14px 8px;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid transparent;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: var(--font-sans);
    }

    .quick-add-type:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .quick-add-type.active {
      background: rgba(var(--type-color-rgb, 255, 255, 255), 0.1);
      border-color: var(--type-color, var(--brand-primary));
    }

    .quick-add-type-icon {
      font-size: 24px;
    }

    .quick-add-type-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .quick-add-type.active .quick-add-type-label {
      color: var(--text-primary);
    }

    .quick-add-input-wrapper {
      margin-bottom: 16px;
    }

    .quick-add-input {
      width: 100%;
      padding: 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      font-size: 16px;
      color: var(--text-primary);
      font-family: var(--font-sans);
      transition: all 0.15s ease;
    }

    .quick-add-input:focus {
      outline: none;
      border-color: var(--brand-primary);
      background: rgba(255, 255, 255, 0.08);
    }

    .quick-add-input::placeholder {
      color: var(--text-muted);
    }

    .quick-add-input.shake {
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }

    .quick-add-submit {
      width: 100%;
      padding: 16px;
      background: var(--submit-color, var(--brand-primary));
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      font-family: var(--font-sans);
      transition: all 0.15s ease;
    }

    .quick-add-submit:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }

    .quick-add-submit:active {
      transform: translateY(0);
    }

    /* === QUICK ADD SUCCESS === */
    .quick-add-success {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      z-index: 10001;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.15s ease;
    }

    .quick-add-success.fade-out {
      animation: fadeOut 0.2s ease forwards;
    }

    .quick-add-success-content {
      text-align: center;
      animation: successPop 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes successPop {
      0% { transform: scale(0.6); opacity: 0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    .quick-add-success-icon {
      font-size: 56px;
      margin-bottom: 12px;
    }

    .quick-add-success-message {
      font-size: 20px;
      font-weight: 600;
      color: white;
      margin-bottom: 8px;
    }

    .quick-add-success-state {
      font-size: 14px;
      color: #22C55E;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    /* === QUICK ADD FAB === */
    .quick-add-fab {
      position: fixed;
      bottom: calc(80px + env(safe-area-inset-bottom, 0px));
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--brand-primary);
      border: none;
      box-shadow: 0 4px 20px rgba(216, 90, 48, 0.4);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      z-index: 100;
    }

    .quick-add-fab:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 28px rgba(216, 90, 48, 0.5);
    }

    .quick-add-fab:active {
      transform: scale(0.95);
    }

    .quick-add-fab-icon {
      font-size: 32px;
      font-weight: 300;
      color: white;
      line-height: 1;
      margin-top: -2px;
    }

    @media (min-width: 769px) {
      .quick-add-fab {
        bottom: 32px;
        right: calc(50% - 240px + 20px);
      }
    }

    /* === TRUST FOOTER === */
    .trust-footer {
      margin-top: auto;
      padding: 20px 0;
      text-align: center;
      animation: fadeIn 0.4s ease 0.5s backwards;
    }

    .trust-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
      opacity: 0.6;
    }

    .trust-badge-icon {
      font-size: 12px;
    }

    /* === ANIMATIONS === */
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* === PULSE HOME MOBILE === */
    @media (max-width: 480px) {
      .pulse-home {
        padding: 12px;
        gap: 12px;
      }

      .pulse-header {
        padding: 16px 0 8px;
      }

      .pulse-greeting {
        font-size: 18px;
      }

      .priority-card {
        padding: 14px;
      }

      .priority-icon {
        width: 44px;
        height: 44px;
        font-size: 20px;
      }

      .priority-title {
        font-size: 15px;
      }

      .momentum-habits {
        flex-direction: column;
      }

      .momentum-habit-btn {
        width: 100%;
        justify-content: center;
      }
    }

    /* Touch device optimizations */
    @media (hover: none) and (pointer: coarse) {
      .priority-card,
      .action-card,
      .momentum-habit-btn,
      .background-header {
        min-height: 48px;
      }
    }

    /* Auth Screens */
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: var(--bg-primary);
    }

    .auth-card {
      width: 100%;
      max-width: 400px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 40px;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-logo h1 {
      font-size: 42px;
      font-weight: 700;
      color: var(--brand-primary);
      letter-spacing: -1px;
    }

    .auth-logo span {
      font-size: 13px;
      color: var(--text-muted);
      display: block;
      margin-top: 4px;
    }

    .auth-title {
      font-size: 22px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 8px;
    }

    .auth-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 28px;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 8px 0;
      color: var(--text-muted);
      font-size: 12px;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .auth-switch {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .auth-switch a {
      color: var(--brand-primary);
      cursor: pointer;
      text-decoration: none;
    }

    .auth-switch a:hover {
      text-decoration: underline;
    }

    .auth-error {
      background: var(--danger-soft);
      border: 1px solid var(--danger);
      color: var(--danger);
      padding: 12px 16px;
      border-radius: var(--radius-md);
      font-size: 13px;
      text-align: center;
    }

    .auth-success {
      background: var(--success-soft);
      border: 1px solid var(--success);
      color: var(--success);
      padding: 12px 16px;
      border-radius: var(--radius-md);
      font-size: 13px;
      text-align: center;
    }

    .btn-google {
      background: white;
      color: #333;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-google:hover {
      background: #f5f5f5;
    }

    .btn-google svg {
      width: 18px;
      height: 18px;
    }

    .user-menu {
      position: relative;
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      background: var(--brand-primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: white;
      transition: all 0.15s ease;
    }

    .user-avatar:hover {
      transform: scale(1.05);
    }

    .user-dropdown {
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 8px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      min-width: 200px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      z-index: 100;
      overflow: hidden;
    }

    .user-dropdown-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .user-dropdown-name {
      font-weight: 600;
      font-size: 14px;
    }

    .user-dropdown-email {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .user-dropdown-item {
      padding: 12px 16px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-secondary);
      transition: all 0.15s ease;
    }

    .user-dropdown-item:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    .user-dropdown-item.danger {
      color: var(--danger);
    }

    .user-dropdown-item.danger:hover {
      background: var(--danger-soft);
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--brand-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      margin-top: 16px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .sync-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-muted);
      padding: 4px 10px;
      background: var(--bg-tertiary);
      border-radius: 12px;
    }

    .sync-indicator.syncing {
      color: var(--warning);
    }

    .sync-indicator.synced {
      color: var(--success);
    }

    .sync-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    /* ===================
       MOBILE BOTTOM NAV
    =================== */
    .bottom-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      padding: 8px 0;
      padding-bottom: calc(8px + env(safe-area-inset-bottom));
      z-index: 1000;
    }

    .bottom-nav-items {
      display: flex;
      justify-content: space-around;
      align-items: center;
    }

    .bottom-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 12px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: var(--radius-md);
      min-width: 64px;
      position: relative;
    }

    .bottom-nav-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%) scaleX(0);
      width: 4px;
      height: 4px;
      background: var(--brand-primary);
      border-radius: 50%;
      transition: transform 0.2s ease;
    }

    .bottom-nav-item:hover {
      color: var(--text-secondary);
    }

    .bottom-nav-item:active {
      transform: scale(0.95);
    }

    .bottom-nav-item.active {
      color: var(--text-primary);
    }

    .bottom-nav-item.active::before {
      transform: translateX(-50%) scaleX(1);
    }

    .bottom-nav-item svg {
      width: 22px;
      height: 22px;
      transition: transform 0.2s ease;
    }

    .bottom-nav-item:active svg {
      transform: scale(0.9);
    }

    .bottom-nav-item.active svg {
      color: var(--brand-primary);
    }

    .bottom-nav-label {
      font-size: 10px;
      font-weight: 500;
      transition: transform 0.2s ease;
    }

    .bottom-nav-item.active .bottom-nav-label {
      font-weight: 600;
      color: var(--text-primary);
    }

    /* Mobile More Menu */
    .mobile-more-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--overlay-bg);
      z-index: 1000;
    }

    .mobile-more-menu {
      display: none;
      position: fixed;
      bottom: calc(70px + env(safe-area-inset-bottom));
      left: 16px;
      right: 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 8px;
      z-index: 1001;
      animation: slideUp 0.2s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .mobile-more-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .mobile-more-item:hover {
      background: var(--bg-tertiary);
    }

    .mobile-more-item:active {
      transform: scale(0.98);
    }

    .mobile-more-item.active {
      color: var(--brand-primary);
      background: var(--brand-soft);
    }

    .mobile-more-item svg {
      width: 20px;
      height: 20px;
    }

    /* Mobile Header */
    .mobile-header {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      padding-top: calc(12px + env(safe-area-inset-top));
      z-index: 999;
      align-items: center;
      justify-content: space-between;
    }

    .mobile-header-logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--brand-primary);
    }

    .mobile-header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .mobile-header-divider {
      color: var(--text-muted);
      font-size: 16px;
    }

    .mobile-header-module {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .mobile-header-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-md);
      background: transparent;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s ease;
      position: relative;
    }

    .mobile-header-btn:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    .mobile-header-btn:active {
      transform: scale(0.95);
    }

    .mobile-header-btn svg {
      width: 20px;
      height: 20px;
    }

    .mobile-header-btn .notification-badge {
      position: absolute;
      top: 2px;
      right: 2px;
      min-width: 16px;
      height: 16px;
      background: var(--danger);
      color: white;
      font-size: 10px;
      font-weight: 600;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }

    .mobile-header-avatar {
      width: 32px;
      height: 32px;
      background: var(--brand-primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: white;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--bg-elevated); }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .bottom-nav { display: block; }
      .mobile-header { display: flex; }
      .mobile-more-overlay { display: block; }
      .mobile-more-menu { display: block; }
      
      .app {
        flex-direction: column;
      }
      
      .main {
        padding-top: calc(56px + env(safe-area-inset-top));
        padding-bottom: calc(70px + env(safe-area-inset-bottom));
        height: auto;
        min-height: 100vh;
      }
      
      .header { 
        padding: 16px 20px;
        position: relative;
        flex-wrap: wrap;
        gap: 12px;
      }
      
      .header-actions {
        flex-wrap: wrap;
        gap: 8px;
      }
      
      .header-actions .btn {
        padding: 8px 12px;
        font-size: 12px;
      }
      
      .module-content { 
        padding: 20px;
      }
      
      /* Home V2 tablet */
      .home-v2 {
        padding: 20px;
        max-width: 100%;
      }
      
      .home-state-card {
        padding: 20px;
      }
      
      .home-title-v2 {
        font-size: 26px;
      }
      
      .one-thing-card {
        padding: 16px;
      }
      
      .home-quick-actions-v2 {
        gap: 8px;
      }
      
      .quick-action-v2 {
        padding: 12px 10px;
        font-size: 12px;
      }
      
      .quick-action-v2 svg {
        width: 16px;
        height: 16px;
      }
      
      /* Tag filter tablet */
      .tag-filter-bar {

      // Use Intl for proper formatting

        return new Intl.NumberFormat(state.userCountry === 'US' ? 'en-US' : undefined, {
          style: 'currency',
          currency: config.currencyCode,
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        }).format(num);
      } catch (e) {
        return config.currency + num.toFixed(2);
      }
    }
    
    // Format date based on user's country
    function formatDateLocalized(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      const config = getCountryConfig();
      
      const day = date.getDate().toString().padStart(2, '0');
      const month = (date.getMonth() + 1).toString().padStart(2, '0');
      const year = date.getFullYear();
      
      switch (config.dateFormat) {
        case 'DD/MM/YYYY': return `${day}/${month}/${year}`;
        case 'DD.MM.YYYY': return `${day}.${month}.${year}`;
        case 'DD-MM-YYYY': return `${day}-${month}-${year}`;
        case 'YYYY/MM/DD': return `${year}/${month}/${day}`;
        case 'YYYY.MM.DD': return `${year}.${month}.${day}`;
        default: return `${month}/${day}/${year}`; // MM/DD/YYYY (US)

    // =================== TODAY VIEW ===================
    function renderTodayView() {
      const today = new Date();
      const todayStr = today.toISOString().split('T')[0];
      const dayName = today.toLocaleDateString('en-US', { weekday: 'long' });
      const dateStr = today.toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
      const hour = today.getHours();
      
      // Get life state
      const life = getLifeState();
      
      // Collect all today items
      const todayItems = [];
      
      // Calendar events for today
      (state.events || []).forEach(event => {
        const eventDate = event.date || event.start_date;
        if (eventDate === todayStr) {
          todayItems.push({
            type: 'event',
            time: event.time || event.start_time || '00:00',
            title: event.title,
            icon: '📅',
            color: 'var(--info)',
            item: event
          });
        }
      });
      
      // Tasks due today or overdue
      (state.tasks || []).filter(t => !t.completed).forEach(task => {
        if (task.due_date) {
          const days = getDaysUntil(task.due_date);
          if (days <= 0) {
            todayItems.push({
              type: 'task',
              time: days < 0 ? 'Overdue' : 'Due today',
              title: task.title,
              icon: '☐',
              color: days < 0 ? 'var(--danger)' : 'var(--warning)',
              urgent: days < 0,
              item: task
            });
          }
        }
      });
      
      // Bills due today or overdue
      (state.subscriptions || []).forEach(sub => {
        if (sub.next_bill) {
          const days = getDaysUntil(sub.next_bill);
          if (days <= 0) {
            todayItems.push({
              type: 'bill',
              time: days < 0 ? 'Overdue' : 'Due today',
              title: `${sub.name} · ${formatCurrency(sub.price)}`,
              icon: sub.icon || '💳',
              color: days < 0 ? 'var(--danger)' : 'var(--warning)',
              urgent: days < 0,
              item: sub
            });
          }
        }
      });
      
      // Sort by time (events first by time, then tasks/bills)
      todayItems.sort((a, b) => {
        if (a.type === 'event' && b.type !== 'event') return -1;
        if (a.type !== 'event' && b.type === 'event') return 1;
        if (a.type === 'event' && b.type === 'event') {
          return a.time.localeCompare(b.time);
        }
        if (a.urgent && !b.urgent) return -1;
        if (!a.urgent && b.urgent) return 1;
        return 0;
      });
      
      // Get habits for current time period
      let currentPeriod = 'anytime';
      if (hour >= 5 && hour < 12) currentPeriod = 'morning';
      else if (hour >= 12 && hour < 18) currentPeriod = 'afternoon';
      else if (hour >= 18 || hour < 5) currentPeriod = 'evening';
      
      const periodLabels = {
        morning: '🌅 Morning',
        afternoon: '☀️ Afternoon', 
        evening: '🌙 Evening',
        anytime: '⭐ Anytime'
      };
      
      const todayHabits = (state.habits || []).filter(h => {
        const timeOfDay = h.timeOfDay || 'anytime';
        return timeOfDay === currentPeriod || timeOfDay === 'anytime';
      });
      
      const habitsCompleted = todayHabits.filter(h => 
        (h.completions || []).includes(todayStr)
      ).length;
      
      // Coming up (next 7 days)
      const comingUp = [];
      for (let i = 1; i <= 7; i++) {
        const futureDate = new Date(today);
        futureDate.setDate(futureDate.getDate() + i);
        const futureDateStr = futureDate.toISOString().split('T')[0];
        const dayLabel = i === 1 ? 'Tomorrow' : futureDate.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        
        // Tasks
        (state.tasks || []).filter(t => !t.completed && t.due_date === futureDateStr).forEach(task => {
          comingUp.push({ date: futureDateStr, dayLabel, title: task.title, icon: '☐', type: 'task' });
        });
        
        // Bills
        (state.subscriptions || []).filter(s => s.next_bill === futureDateStr).forEach(sub => {
          comingUp.push({ date: futureDateStr, dayLabel, title: `${sub.name} · ${formatCurrency(sub.price)}`, icon: sub.icon || '💳', type: 'bill' });
        });
        
        // Events
        (state.events || []).filter(e => (e.date || e.start_date) === futureDateStr).forEach(event => {
          comingUp.push({ date: futureDateStr, dayLabel, title: event.title, icon: '📅', type: 'event' });
        });
      }
      
      return `
        <header class="header">
          <div>
            <div class="header-title-row">
              <h2 class="header-title">${dayName}</h2>
              <span class="today-state-badge ${life.state}">${life.stateEmoji}</span>
            </div>
            <p class="header-subtitle">${dateStr}</p>
          </div>
        </header>
        <div class="module-content">
          
          <!-- Ada's Summary -->
          <div class="today-ada-summary">
            ${todayItems.length === 0 && habitsCompleted === todayHabits.length ? `
              <div class="today-ada-message">
                <span class="today-ada-icon">✨</span>
                <span>All clear today. You're on track.</span>
              </div>
            ` : todayItems.filter(i => i.urgent).length > 0 ? `
              <div class="today-ada-message urgent">
                <span class="today-ada-icon">⚠️</span>
                <span>${todayItems.filter(i => i.urgent).length} thing${todayItems.filter(i => i.urgent).length > 1 ? 's need' : ' needs'} your attention.</span>
              </div>
            ` : `
              <div class="today-ada-message">
                <span class="today-ada-icon">👋</span>
                <span>${todayItems.length} item${todayItems.length !== 1 ? 's' : ''} today${todayHabits.length > habitsCompleted ? `, ${todayHabits.length - habitsCompleted} habit${todayHabits.length - habitsCompleted > 1 ? 's' : ''} left` : ''}.</span>
              </div>
            `}
          </div>
          
          <!-- Complete Empty State for new users -->
          ${todayItems.length === 0 && todayHabits.length === 0 && comingUp.length === 0 ? `
            <div class="today-empty-state">
              <div class="ada-empty-state">
                <div class="ada-empty-icon">📅</div>
                <h3>Your day is wide open</h3>
                <p>Add tasks, bills, or habits to see them here. I'll help you stay on track.</p>
                <div class="today-empty-actions">
                  <button class="btn btn-secondary" onclick="state.activeModule='tasks'; render();">Add a task</button>
                  <button class="btn btn-secondary" onclick="state.activeModule='habits'; render();">Start a habit</button>
                </div>
              </div>
            </div>
          ` : ''}
          
          <!-- Urgent Items First (if any) -->
          ${todayItems.filter(i => i.urgent).length > 0 ? `
            <div class="today-section today-section-urgent">
              <div class="today-section-header">
                <h3 class="today-section-title">⚡ Needs attention</h3>
                <span class="today-section-why">Clear these to stay green</span>
              </div>
              <div class="today-timeline">
                ${todayItems.filter(i => i.urgent).map(item => `
                  <div class="today-timeline-item urgent" onclick="${getItemAction(item)}">
                    <div class="today-timeline-content">
                      <span class="today-timeline-icon">${item.icon}</span>
                      <span class="today-timeline-title">${item.title}</span>
                      <span class="today-timeline-badge">${item.time}</span>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          ` : ''}
          
          <!-- Today's Schedule (non-urgent) -->
          ${todayItems.filter(i => !i.urgent).length > 0 ? `
            <div class="today-section">
              <div class="today-section-header">
                <h3 class="today-section-title">Today</h3>
              </div>
              <div class="today-timeline">
                ${todayItems.filter(i => !i.urgent).map(item => `
                  <div class="today-timeline-item" onclick="${getItemAction(item)}">
                    <div class="today-timeline-time">${item.time}</div>
                    <div class="today-timeline-content">
                      <span class="today-timeline-icon">${item.icon}</span>
                      <span class="today-timeline-title">${item.title}</span>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          ` : ''}
          
          <!-- Current Habits (simplified) -->
          ${todayHabits.length > 0 ? `
            <div class="today-section">
              <div class="today-section-header">
                <h3 class="today-section-title">${periodLabels[currentPeriod]}</h3>
                <span class="today-section-count">${habitsCompleted}/${todayHabits.length}</span>
              </div>
              ${habitsCompleted < todayHabits.length ? `<div class="today-section-why">Keep your streak going</div>` : ''}
              
              <div class="today-habits">
                ${todayHabits.slice(0, 4).map(habit => {
                  const isCompleted = (habit.completions || []).includes(todayStr);
                  return `
                    <div class="today-habit ${isCompleted ? 'completed' : ''}" onclick="toggleHabit('${habit.id}')">
                      <div class="today-habit-check" style="border-color: ${habit.color}; ${isCompleted ? `background: ${habit.color}` : ''}">
                        ${isCompleted ? '✓' : ''}
                      </div>
                      <span class="today-habit-icon">${habit.icon || '✓'}</span>
                      <span class="today-habit-name">${habit.name}</span>
                    </div>
                  `;
                }).join('')}
                ${todayHabits.length > 4 ? `
                  <div class="today-habit-more" onclick="state.activeModule='habits'; render();">
                    +${todayHabits.length - 4} more
                  </div>
                ` : ''}
              </div>
            </div>
          ` : ''}
          
          <!-- Coming Up (collapsed, minimal) -->
          ${comingUp.length > 0 ? `
            <div class="today-coming-preview" onclick="this.classList.toggle('expanded')">
              <div class="today-coming-header">
                <span class="today-coming-label">Coming up</span>
                <span class="today-coming-count">${comingUp.length}</span>
              </div>
              <div class="today-coming-why">Stay ahead — no surprises</div>
              <div class="today-coming-items">
                ${comingUp.slice(0, 3).map(item => `
                  <div class="today-coming-item">
                    <span class="today-coming-icon">${item.icon}</span>
                    <span class="today-coming-title">${item.title}</span>
                    <span class="today-coming-date">${item.dayLabel}</span>
                  </div>
                `).join('')}
              </div>
            </div>
          ` : ''}
          
        </div>
      `;
    }
    
    function getItemAction(item) {
      if (item.type === 'task') {
        return `toggleTask('${item.item.id}')`;
      } else if (item.type === 'bill') {
        return `state.activeModule='subscriptions'; render();`;
      } else if (item.type === 'event') {
        return `state.activeModule='calendar'; render();`;
      }
      return '';
    }

    // =================== ADA'S BRAIN ===================
    // The Life State Engine - calculates emotional state and next best action
    
    function getLifeState() {
      const today = new Date();
      const todayISO = today.toISOString().split('T')[0];
      const hour = today.getHours();
      const userProblem = state.userProblem || 'money'; // Default priority
      
      // Collect all items by urgency
      const urgentItems = [];
      const attentionItems = [];
      const backgroundItems = [];
      
      // --- BILLS DUE ---
      (state.subscriptions || []).forEach(sub => {
        const days = getDaysUntil(sub.next_bill || sub.nextDue);
        const amount = sub.price || sub.amount || 0;
        if (days < 0) {
          urgentItems.push({
            type: 'bill',
            id: sub.id,
            icon: sub.icon || '💳',
            title: `${sub.name} payment overdue`,
            subtitle: `$${amount.toFixed(2)} - ${Math.abs(days)} day${Math.abs(days) > 1 ? 's' : ''} late`,
            action: () => { state.activeModule = 'subscriptions'; render(); },
            quickAction: `quickDismissBill(${sub.id})`,
            quickActionLabel: 'Mark Paid',
            actionLabel: 'Fix now',
            dataSource: 'subscriptions',
            urgencyScore: 100 + Math.abs(days)
          });
        } else if (days === 0) {
          urgentItems.push({
            type: 'bill',
            id: sub.id,
            icon: sub.icon || '💳',
            title: `${sub.name} charges today`,
            subtitle: `$${amount.toFixed(2)}`,
            action: () => { state.activeModule = 'subscriptions'; render(); },
            quickAction: `quickDismissBill(${sub.id})`,
            quickActionLabel: 'Mark Paid',
            actionLabel: 'View',
            dataSource: 'subscriptions',
            urgencyScore: 90
          });
        } else if (days === 1) {
          attentionItems.push({
            type: 'bill',
            id: sub.id,
            icon: sub.icon || '💳',
            title: `${sub.name} charges tomorrow`,
            subtitle: `$${amount.toFixed(2)}`,
            action: () => { state.activeModule = 'subscriptions'; render(); },
            quickAction: `quickDismissBill(${sub.id})`,
            quickActionLabel: 'Mark Paid',
            actionLabel: 'View',
            dataSource: 'subscriptions',
            urgencyScore: 80
          });
        } else if (days > 1 && days <= 7) {
          backgroundItems.push({
            type: 'bill',
            id: sub.id,
            icon: sub.icon || '💳',
            title: `${sub.name} in ${days} days`,
            subtitle: `$${amount.toFixed(2)}`,
            days
          });
        }
      });
      
      // --- OVERDUE TASKS ---
      (state.tasks || []).filter(t => !t.completed).forEach(task => {
        const days = getDaysUntil(task.due_date || task.dueDate);
        const title = task.title || task.name;
        if (days < 0) {
          urgentItems.push({
            type: 'task',
            id: task.id,
            icon: '⚠️',
            title: title,
            subtitle: `${Math.abs(days)} day${Math.abs(days) > 1 ? 's' : ''} overdue`,
            action: () => { state.activeModule = 'tasks'; render(); },
            quickAction: `quickCompleteTask(${task.id})`,
            quickActionLabel: 'Done',
            actionLabel: 'Do it',
            dataSource: 'tasks',
            priority: task.priority,
            urgencyScore: 95 + Math.abs(days) + (task.priority === 'high' ? 10 : 0)
          });
        } else if (days === 0) {
          urgentItems.push({
            type: 'task',
            id: task.id,
            icon: '📋',
            title: title,
            subtitle: 'Due today',
            action: () => { state.activeModule = 'tasks'; render(); },
            quickAction: `quickCompleteTask(${task.id})`,
            quickActionLabel: 'Done',
            actionLabel: 'Do it',
            dataSource: 'tasks',
            priority: task.priority,
            urgencyScore: 85 + (task.priority === 'high' ? 10 : 0)
          });
        } else if (days === 1) {
          attentionItems.push({
            type: 'task',
            id: task.id,
            icon: '📋',
            title: title,
            subtitle: 'Due tomorrow',
            action: () => { state.activeModule = 'tasks'; render(); },
            quickAction: `quickCompleteTask(${task.id})`,
            quickActionLabel: 'Done',
            actionLabel: 'View',
            dataSource: 'tasks',
            urgencyScore: 70
          });
        } else if (days <= 7) {
          backgroundItems.push({
            type: 'task',
            id: task.id,
            icon: '📋',
            title: title,
            subtitle: `Due in ${days} days`,
            days
          });
        }
      });
      
      // --- EXPIRING DOCUMENTS ---
      (state.documents || []).forEach(doc => {
        const days = getDaysUntil(doc.expiry_date || doc.expiryDate);
        if (days <= 0) {
          urgentItems.push({
            type: 'document',
            id: doc.id,
            icon: doc.icon || '📄',
            title: `${doc.name} expired`,
            subtitle: 'Renew now',
            action: () => { state.activeModule = 'documents'; render(); },
            quickAction: `quickRenewDocument(${doc.id})`,
            quickActionLabel: 'Renewed',
            actionLabel: 'Renew',
            dataSource: 'documents',
            urgencyScore: 98
          });
        } else if (days <= 14) {
          attentionItems.push({
            type: 'document',
            id: doc.id,
            icon: doc.icon || '📄',
            title: `${doc.name} expires soon`,
            subtitle: `${days} days left`,
            action: () => { state.activeModule = 'documents'; render(); },
            quickAction: `quickRenewDocument(${doc.id})`,
            quickActionLabel: 'Renewed',
            actionLabel: 'Start renewal',
            dataSource: 'documents',
            urgencyScore: 75
          });
        } else if (days <= 60) {
          backgroundItems.push({
            type: 'document',
            id: doc.id,
            icon: doc.icon || '📄',
            title: `${doc.name} in ${days} days`,
            subtitle: 'Plan ahead',
            days
          });
        }
      });
      
      // --- HABITS TODAY ---
      const totalHabits = (state.habits || []).length;
      const completedHabits = (state.habits || []).filter(h => 
        (h.completions || h.completedDates || []).includes(todayISO)
      ).length;
      const incompleteHabits = (state.habits || []).filter(h => 
        !(h.completions || h.completedDates || []).includes(todayISO)
      );
      
      // --- SORT BY URGENCY SCORE ---
      urgentItems.sort((a, b) => (b.urgencyScore || 0) - (a.urgencyScore || 0));
      attentionItems.sort((a, b) => (b.urgencyScore || 0) - (a.urgencyScore || 0));
      
      // --- CALCULATE STATE ---

    // Track daily state for streaks and insights
    function trackDailyState() {
      const today = new Date().toISOString().split('T')[0];
      
      // Only track once per day
      if (state.lastStateCheck === today) return;
      
      const life = getLifeState();
      
      // Add today's state to history
      const entry = {
        date: today,
        state: life.state,
        urgentCount: life.urgentItems.length,
        attentionCount: life.attentionItems.length,
        habitCompletion: life.habitMomentum.percentage
      };
      
      // Keep last 30 days
      state.stateHistory = [...state.stateHistory.filter(e => e.date !== today), entry].slice(-30);
      state.lastStateCheck = today;
      
      localStorage.setItem('ctrl_state_history', JSON.stringify(state.stateHistory));
      localStorage.setItem('ctrl_last_state_check', today);
      
      // Check for state change notifications
      checkStateChangeNotification(life.state);
    }

    // Calculate green streak (days in control)
    function getGreenStreak() {
      if (state.stateHistory.length === 0) return 0;
      
      let streak = 0;
      const sorted = [...state.stateHistory].sort((a, b) => b.date.localeCompare(a.date));
      
      for (const entry of sorted) {
        if (entry.state === 'green') {
          streak++;
        } else {
          break;
        }
      }
      
      return streak;
    }

    // Get state stats for the last N days
    function getStateStats(days = 7) {
      const cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - days);
      const cutoffISO = cutoff.toISOString().split('T')[0];
      
      const recent = state.stateHistory.filter(e => e.date >= cutoffISO);
      
      if (recent.length === 0) {
        return { greenDays: 0, yellowDays: 0, redDays: 0, avgHabitCompletion: 0 };
      }
      
      return {
        greenDays: recent.filter(e => e.state === 'green').length,
        yellowDays: recent.filter(e => e.state === 'yellow').length,
        redDays: recent.filter(e => e.state === 'red').length,
        avgHabitCompletion: Math.round(recent.reduce((sum, e) => sum + (e.habitCompletion || 0), 0) / recent.length)
      };
    }

    // Render state history as visual dots
    function renderStateHistoryDots() {
      const today = new Date();
      const dots = [];
      
      for (let i = 29; i >= 0; i--) {
        const date = new Date(today);
        date.setDate(date.getDate() - i);
        const dateStr = date.toISOString().split('T')[0];
        const dayOfWeek = date.toLocaleDateString('en-US', { weekday: 'short' }).charAt(0);
        
        // Find state for this day
        const entry = state.stateHistory.find(e => e.date === dateStr);
        const stateClass = entry ? entry.state : 'empty';
        const isToday = i === 0;
        
        dots.push(`
          <div class="state-history-dot ${stateClass} ${isToday ? 'today' : ''}" 
               title="${date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}: ${entry ? entry.state : 'no data'}">
          </div>
        `);
      }
      
      return dots.join('');
    }

    // Ada's guidance for focus mode - why this item matters
    function getAdaFocusGuidance(item) {
      if (!item) return '';
      
      // Extract price from subtitle if it's a bill (format: "$XX.XX")
      const priceMatch = item.subtitle?.match(/\$[\d.]+/);
      const price = priceMatch ? priceMatch[0] : null;
      
      if (item.type === 'bill') {
        if (item.subtitle?.includes('overdue') || item.subtitle?.includes('late')) {
          return price 
            ? `This ${price} payment is overdue. Handling it now prevents late fees.`
            : "This payment is overdue. Let's take care of it to avoid extra charges.";
        }
        if (item.subtitle?.includes('today') || item.title?.includes('today')) {
          return price
            ? `${price} charges today. Mark it paid to stay in control.`
            : "This charges today. Mark it paid once you've confirmed.";
        }
        if (item.subtitle?.includes('tomorrow') || item.title?.includes('tomorrow')) {
          return price
            ? `${price} hits your account tomorrow. Make sure funds are ready.`
            : "This charges tomorrow. Quick check to make sure you're covered.";
        }
        return price
          ? `${price} coming up. Staying ahead means no surprises.`
          : "Coming up soon. Better to handle it early.";
      }
      
      if (item.type === 'task') {
        if (item.subtitle?.includes('overdue')) {
          const daysOverdue = item.subtitle.match(/(\d+)\s*day/);
          if (daysOverdue) {
            return `This has been waiting ${daysOverdue[1]} days. Completing it clears your mental load.`;
          }
          return "This is overdue. Getting it done will feel good.";
        }
        if (item.priority === 'high') {
          return "You flagged this as important. It's your top priority right now.";
        }
        if (item.subtitle === 'Due today') {
          return "Due today. One task between you and a clear evening.";
        }
        return "This needs attention soon. Handle it while it's fresh.";
      }
      
      if (item.type === 'document') {
        const daysMatch = item.subtitle?.match(/(\d+)\s*day/);
        if (item.subtitle?.includes('Expired')) {
          return "This has expired. Renewing now prevents bigger headaches later.";
        }
        if (daysMatch) {
          const days = parseInt(daysMatch[1]);
          if (days <= 7) {
            return `Only ${days} days left. Renewal processes can take time — start now.`;
          }
          if (days <= 30) {
            return `${days} days until expiry. Getting ahead means no rush later.`;
          }
          return "Expiring soon. Starting early gives you options.";
        }
        return "Documents take time to renew. Start the process now.";
      }
      
      if (item.type === 'habit') {
        if (item.subtitle?.includes('streak')) {
          const streakMatch = item.subtitle.match(/(\d+)\s*day/);
          if (streakMatch) {
            return `${streakMatch[1]} days strong. Don't break the chain.`;
          }
        }
        return "Small actions daily. This one takes less than 5 minutes.";
      }
      
      return "This needs your attention.";
    }

    // Ada's smart tip for green state - contextual, proactive suggestions
    function getAdaSmartTip(life) {
      const today = new Date();
      const dayOfWeek = today.getDay();
      const dayOfMonth = today.getDate();
      const hour = today.getHours();
      
      // Check for upcoming bills in next 7 days
      const upcomingBills = (state.subscriptions || []).filter(s => {
        const days = getDaysUntil(s.next_bill);
        return days > 0 && days <= 7;
      });
      
      // Check for expiring documents in next 60 days
      const expiringDocs = (state.documents || []).filter(d => {
        const days = getDaysUntil(d.expiry_date || d.expiryDate);
        return days > 0 && days <= 60;
      });
      
      // Check total monthly spend
      const monthlySpend = (state.subscriptions || []).reduce((sum, s) => {
        const price = s.price || s.amount || 0;
        if (s.cycle === 'yearly' || s.billing_cycle === 'yearly') return sum + (price / 12);
        return sum + price;
      }, 0);
      
      // Priority 1: Document expiring soon
      if (expiringDocs.length > 0) {
        const doc = expiringDocs.sort((a, b) => 
          getDaysUntil(a.expiry_date || a.expiryDate) - getDaysUntil(b.expiry_date || b.expiryDate)
        )[0];
        const days = getDaysUntil(doc.expiry_date || doc.expiryDate);

            cta: "Get renewal guide",
            action: `state.activeModule = 'copilot'; state.pendingAdaQuestion = 'How do I renew my ${doc.name}?'; render();`

      // Priority 2: End of month - subscription review
      if (dayOfMonth >= 25 && monthlySpend > 50) {

          cta: "Review bills",
          action: "state.activeModule = 'subscriptions'; render();"

            action: "state.activeModule = 'tasks'; render();"

          text: "New month! Great time to check your upcoming bills and set new goals.",

          action: "state.activeModule = 'reset'; render();"

      }
      
      // Calculate monthly spend for spending insights
      const monthlySpend = (state.subscriptions || []).reduce((sum, s) => 
        sum + (s.cycle === 'monthly' ? (s.price || 0) : (s.price || 0) / 12), 0);
      
      if (monthlySpend > 100) {
        insights.push({
          type: 'money',
          icon: '💰',
          title: `$${monthlySpend.toFixed(0)}/mo in subscriptions`,
          subtitle: 'Want tips to reduce this?',
          action: `I spend $${monthlySpend.toFixed(0)} per month on subscriptions. Which ones should I consider canceling or finding cheaper alternatives for?`,
          priority: 'low'
        });
      }
      
      // Build context-aware quick actions
      if (expiringDocs.length > 0) {
        const doc = expiringDocs[0];
        quickActions.push({
          icon: doc.icon || '📄',
          label: `Renew ${doc.name}`,
          prompt: `How do I renew my ${doc.name}? Step-by-step please.`
        });
      }
      
      if (upcomingSubs.length > 0) {
        quickActions.push({
          icon: '💳',
          label: 'Review bills',
          prompt: 'Help me review my upcoming bills and see if there are any I should cancel.'
        });
      }
      
      // Always include some general quick actions
      if (quickActions.length < 4) {
        const generalActions = [
          { icon: '🪪', label: "Driver's license", prompt: "How do I get or renew my driver's license?" },
          { icon: '💳', label: 'First credit card', prompt: "What's the best first credit card for building credit?" },
          { icon: '🏠', label: 'Renting tips', prompt: 'What do I need to know before renting my first apartment?' },
          { icon: '💼', label: 'File taxes', prompt: 'How do I file my taxes for the first time?' },
          { icon: '🏦', label: 'Banking 101', prompt: 'Help me understand checking vs savings accounts' },
          { icon: '📋', label: 'Budget help', prompt: 'How do I create a simple budget?' }
        ];
        
        for (const action of generalActions) {
          if (quickActions.length >= 4) break;
          if (!quickActions.find(a => a.label === action.label)) {
            quickActions.push(action);
          }
        }
      }
      
      return { insights, quickActions: quickActions.slice(0, 4) };
    }

    function prefillExpense(icon, name, amount, category) {
      document.getElementById('expenseIcon').value = icon;
      document.getElementById('expenseName').value = name;
      document.getElementById('expenseAmount').value = amount;
      document.getElementById('expenseCategory').value = category;
    }

    function saveExpense() {
      const name = document.getElementById('expenseName').value.trim();
      const amount = parseFloat(document.getElementById('expenseAmount').value) || 0;
      const date = document.getElementById('expenseDate').value;
      const category = document.getElementById('expenseCategory').value;
      const icon = document.getElementById('expenseIcon').value.trim() || '💸';
      
      if (!name) {
        alert('Please enter what you spent on.');
        return;
      }
      if (amount <= 0) {
        alert('Please enter a valid amount.');
        return;
      }
      
      const expense = {
        id: Date.now(),
        name,
        amount,
        date,
        category,
        icon
      };
      
      state.expenses = state.expenses || [];
      state.expenses.push(expense);
      localStorage.setItem('ctrl_expenses', JSON.stringify(state.expenses));
      
      addNotification({
        type: 'system',
        icon: '💸',
        title: 'Expense logged',
        body: `$${amount.toFixed(2)} for ${name}`,
      });
      
      closeModal();
    }

    function deleteExpense(id) {
      state.expenses = (state.expenses || []).filter(e => e.id !== id);

    // =================== DOCUMENTS ===================
    function renderDocuments() {
      const expiringCount = state.documents.filter(d => {

        return days <= 90 && days > 0;

      const expiredCount = state.documents.filter(d => getDaysUntil(d.expiry_date || d.expiryDate) <= 0).length;
      const validCount = state.documents.length - expiringCount - expiredCount;
      
      // Find next expiring document
      const sortedDocs = [...state.documents]
        .filter(d => getDaysUntil(d.expiry_date || d.expiryDate) > 0)
        .sort((a, b) => getDaysUntil(a.expiry_date || a.expiryDate) - getDaysUntil(b.expiry_date || b.expiryDate));
      const nextExpiring = sortedDocs[0];
      const nextExpiringDays = nextExpiring ? getDaysUntil(nextExpiring.expiry_date || nextExpiring.expiryDate) : null;

      return `

          <div>
            <div class="header-title-row">
              <h2 class="header-title">Documents</h2>
              ${renderMiniStateIndicator()}

              <div class="module-stat-label">Valid</div>
            </div>
            <div class="module-stat ${expiringCount > 0 ? 'warning' : ''}">
              <div class="module-stat-value">${expiringCount}</div>
              <div class="module-stat-label">Expiring</div>
            </div>
            <div class="module-stat ${expiredCount > 0 ? 'danger' : ''}">
              <div class="module-stat-value">${expiredCount}</div>
              <div class="module-stat-label">Expired</div>
            </div>

          ${renderTagFilterBar()}
          
          <div class="documents-grid">
            ${state.documents.length > 0 ? `
              <div class="list-controls" style="grid-column: 1/-1;">

                <div class="list-controls-right">
                  <select class="list-filter-select" onchange="setDocumentFilter(this.value)">
                    <option value="all" ${state.documentFilter === 'all' ? 'selected' : ''}>All Status</option>
                    <option value="valid" ${state.documentFilter === 'valid' ? 'selected' : ''}>Valid</option>
                    <option value="expiring" ${state.documentFilter === 'expiring' ? 'selected' : ''}>Expiring Soon</option>
                    <option value="expired" ${state.documentFilter === 'expired' ? 'selected' : ''}>Expired</option>
                  </select>
                  <select class="list-sort-select" onchange="setDocumentSort(this.value)">
                    <option value="expiry" ${state.documentSort === 'expiry' ? 'selected' : ''}>Sort: Expiry Date</option>
                    <option value="name" ${state.documentSort === 'name' ? 'selected' : ''}>Sort: Name (A→Z)</option>
                  </select>
                </div>
              </div>
              ${getFilteredSortedDocuments().map(doc => renderDocumentCard(doc)).join('')}

    function renderDocumentCard(doc) {
      const expiryDate = doc.expiry_date || doc.expiryDate;
      const issueDate = doc.issue_date || doc.issueDate;
      const docNumber = doc.doc_number || doc.number || '';
      const hasPhoto = doc.photo ? true : false;
      const daysUntil = getDaysUntil(expiryDate);
      let status, statusClass, cardClass = '';
      
      if (daysUntil <= 0) {
        status = 'Expired';
        statusClass = 'expired';
        cardClass = 'expired';
      } else if (daysUntil <= 90) {
        status = `${daysUntil} days`;
        statusClass = 'expiring';
        cardClass = 'expiring-soon';
      } else {
        status = 'Valid';
        statusClass = 'valid';
      }

      return `
        <div class="document-card ${cardClass}" data-id="${doc.id}">
          <div class="doc-header">
            <div class="doc-icon">${doc.icon}</div>
            <div class="doc-badges">
              ${hasPhoto ? '<span class="doc-photo-badge" title="Has photo">📷</span>' : ''}
              <span class="doc-status ${statusClass}">${status}</span>
            </div>
          </div>
          <div class="doc-title">${doc.name}</div>
          <div class="doc-number">${docNumber}</div>
          ${doc.tags && doc.tags.length ? `<div class="doc-tags">${doc.tags.map(t => `<span class="item-tag">${t}</span>`).join('')}</div>` : ''}
          ${hasPhoto ? `
            <div class="doc-photo-thumb" onclick="event.stopPropagation(); viewDocPhoto('${doc.photo}')">
              <img src="${doc.photo}" alt="Document photo">
              <span class="doc-photo-expand">View</span>
            </div>
          ` : ''}
          <div class="doc-dates">
            <div class="doc-date">
              <div class="doc-date-label">Issued</div>
              <div class="doc-date-value">${formatDateLong(issueDate)}</div>
            </div>
            <div class="doc-date">
              <div class="doc-date-label">Expires</div>
              <div class="doc-date-value ${daysUntil <= 90 ? (daysUntil <= 0 ? 'danger' : 'warning') : ''}">${formatDateLong(expiryDate)}</div>
            </div>
          </div>
          <div class="doc-actions">
            <button class="doc-action-btn" onclick="editDocument(${doc.id})">${icons.edit} Edit</button>
            <button class="doc-action-btn delete" onclick="deleteDocument(${doc.id})">${icons.trash} Delete</button>
          </div>
        </div>
      `;
    }

      // Calculate last month stats
      const completedTasks = (state.tasks || []).filter(t => t.completed).length;
      const totalTasks = (state.tasks || []).length;
      const habitsWithStreaks = (state.habits || []).filter(h => (h.streak || 0) >= 7).length;
      const avgHabitStreak = (state.habits || []).length > 0 
        ? Math.round((state.habits || []).reduce((sum, h) => sum + (h.streak || 0), 0) / state.habits.length) 
        : 0;
      const completedAccomplishments = state.accomplishments.filter(a => a.completed).length;
      const completedGoals = state.goals.filter(g => g.completed).length;
      
      // Get upcoming items
      const upcomingItems = getUpcomingItems();

      return `

          // Check if we need to reset the counter for a new day
          const today = new Date().toISOString().split('T')[0];
          const lastAdaDate = localStorage.getItem('ctrl_ada_date');
          let adaMessages = parseInt(localStorage.getItem('ctrl_ada_messages_today') || '0');
          
          // Reset counter if it's a new day
          if (lastAdaDate !== today) {
            adaMessages = 0;
            localStorage.setItem('ctrl_ada_date', today);
            localStorage.setItem('ctrl_ada_messages_today', '0');
          }
          
          return adaMessages < 5;
        case 'ada-guides':
          const acceptedGuides = JSON.parse(localStorage.getItem('ctrl_accepted_guides') || '[]');

        case 'unlimited-items':
          return (state.subscriptions?.length || 0) < 10 &&

        default:

    // =================== TASKS ===================
    function renderTasks() {
      const allTasks = state.tasks || [];
      const today = new Date().toISOString().split('T')[0];
      
      // Calculate counts for filters
      const counts = {
        all: allTasks.filter(t => !t.completed).length,
        today: allTasks.filter(t => !t.completed && t.due_date === today).length,
        upcoming: allTasks.filter(t => !t.completed && t.due_date > today).length,
        completed: allTasks.filter(t => t.completed).length,
        overdue: allTasks.filter(t => !t.completed && t.due_date < today).length,
      };
      
      const totalTasks = allTasks.length;
      const completedPercent = totalTasks > 0 ? Math.round((counts.completed / totalTasks) * 100) : 0;

      // Filter tasks based on current filter
      let filteredTasks = allTasks;
      if (state.taskFilter === 'today') {
        filteredTasks = allTasks.filter(t => t.due_date === today);
      } else if (state.taskFilter === 'upcoming') {
        filteredTasks = allTasks.filter(t => !t.completed && t.due_date > today);
      } else if (state.taskFilter === 'completed') {
        filteredTasks = allTasks.filter(t => t.completed);
      } else {
        // 'all' - show incomplete first, then completed
        filteredTasks = [...allTasks.filter(t => !t.completed), ...allTasks.filter(t => t.completed)];
      }
      
      // Filter by tag
      if (state.filterByTag) {
        filteredTasks = filteredTasks.filter(t => (t.tags || []).includes(state.filterByTag));
      }

      // Sort by due date
      filteredTasks.sort((a, b) => {
        if (a.completed !== b.completed) return a.completed ? 1 : -1;
        return (a.due_date || '9999').localeCompare(b.due_date || '9999');
      });
      
      // Motivational message
      let heroMessage = '';
      if (counts.overdue > 0) {
        heroMessage = `${counts.overdue} overdue — clear them to stay green`;
      } else if (counts.today > 0) {
        heroMessage = `${counts.today} due today — you've got this`;
      } else if (counts.all === 0) {
        heroMessage = "Nothing on your plate — enjoy the calm";
      } else {
        heroMessage = "Stay ahead — nothing urgent yet";
      }

      return `
        <header class="header">
          <div>
            <div class="header-title-row">
              <h2 class="header-title">Tasks</h2>
              ${renderMiniStateIndicator()}
            </div>
            <p class="header-subtitle">${heroMessage}</p>
          </div>
          <div class="header-actions">
            <button class="btn btn-secondary" onclick="openTaskModal()">
              <span class="btn-icon">${icons.plus}</span>
