    function renderTaskItem(task) {
      const today = new Date().toISOString().split('T')[0];
      const dueDate = task.due_date;
      let dueClass = 'upcoming';
      let dueText = '';
      
      if (dueDate) {
        const days = getDaysUntil(dueDate);
        if (days < 0) {
          dueClass = 'overdue';
          dueText = `${Math.abs(days)} day${Math.abs(days) > 1 ? 's' : ''} overdue`;
        } else if (days === 0) {
          dueClass = 'today';
          dueText = 'Today';
        } else if (days === 1) {
          dueText = 'Tomorrow';
        } else if (days <= 7) {
          dueText = `In ${days} days`;
        } else {
          dueText = formatDate(dueDate);
        }
      }
      
      // Get guide info if this is a guided task
      const guide = task.guideId ? adaGuides[task.guideId] : null;
      
      // Find linked items
      const linkedItems = findLinkedItems(task.title);

      return `
        <div class="task-item ${task.completed ? 'completed' : ''}" data-id="${task.id}">
          <div class="task-checkbox ${task.completed ? 'checked' : ''}" onclick="toggleTask('${task.id}')">
            ${task.completed ? icons.check : ''}
          </div>
          <div class="task-content">
            <div class="task-title">
              ${task.title}
              ${task.recurrence ? ' <span class="task-recurrence" title="Repeats ' + task.recurrence + '">🔄</span>' : ''}
              ${guide ? `<span class="task-guide-badge">${guide.icon} Step ${task.guideStep}</span>` : ''}
            </div>
            ${task.guideDescription ? `<div class="task-guide-hint">${task.guideDescription}</div>` : ''}
            ${linkedItems.length > 0 ? `
              <div class="task-linked-items">
                ${linkedItems.map(link => `
                  <button class="task-linked-item" onclick="goToLinkedItem('${link.type}', ${link.id})">
                    <span class="linked-item-icon">${link.icon}</span>
                    <span class="linked-item-name">${link.name}</span>
                    <span class="linked-item-detail">${link.detail}</span>
                  </button>
                `).join('')}
              </div>
            ` : ''}
            <div class="task-meta">
              ${task.category ? `<span class="task-category">${task.category}</span>` : ''}
              ${dueText ? `<span class="task-due ${dueClass}">${icons.calendar} ${dueText}</span>` : ''}
              ${task.recurrence ? `<span class="task-repeat">${getRecurrenceLabel(task.recurrence)}</span>` : ''}
              ${task.priority ? `<span class="task-priority ${task.priority}" title="${capitalize(task.priority)} priority"></span>` : ''}
              ${task.tags && task.tags.length ? task.tags.map(t => `<span class="item-tag">${t}</span>`).join('') : ''}
            </div>
          </div>
          <div class="task-actions">
            <button class="task-action-btn edit-task" data-id="${task.id}">${icons.edit}</button>
            <button class="task-action-btn delete delete-task" data-id="${task.id}">${icons.trash}</button>
          </div>
        </div>
      `;
    }

    function getRecurrenceLabel(recurrence) {
      const labels = {
        'daily': '📅 Daily',
        'weekly': '📅 Weekly',
        'biweekly': '📅 Biweekly',
        'monthly': '📅 Monthly',
        'yearly': '📅 Yearly'
      };
      return labels[recurrence] || '';
    }

    function renderCalendarMonth() {
      const currentDate = state.calendarDate || new Date();
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      
      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const startPadding = firstDay.getDay();
      const daysInMonth = lastDay.getDate();
      
      const today = new Date();
      const todayStr = today.toISOString().split('T')[0];
      
      // Get all calendar events
      const events = getCalendarEvents();
      
      // Build calendar days
      let days = [];
      
      // Previous month padding
      const prevMonth = new Date(year, month, 0);
      for (let i = startPadding - 1; i >= 0; i--) {
        days.push({ 
          day: prevMonth.getDate() - i, 
          otherMonth: true,
          date: new Date(year, month - 1, prevMonth.getDate() - i)
        });
      }
      
      // Current month days
      for (let i = 1; i <= daysInMonth; i++) {
        const date = new Date(year, month, i);
        const dateStr = date.toISOString().split('T')[0];
        days.push({ 
          day: i, 
          otherMonth: false,
          date: date,
          dateStr: dateStr,
          isToday: dateStr === todayStr,
          events: events.filter(e => e.date === dateStr)
        });
      }
      
      // Next month padding
      const remaining = 42 - days.length;
      for (let i = 1; i <= remaining; i++) {
        days.push({ 
          day: i, 
          otherMonth: true,
          date: new Date(year, month + 1, i)
        });
      }

      return `
        <div class="calendar-grid">
          <div class="calendar-weekdays">
            <div class="calendar-weekday">Sun</div>
            <div class="calendar-weekday">Mon</div>
            <div class="calendar-weekday">Tue</div>
            <div class="calendar-weekday">Wed</div>
            <div class="calendar-weekday">Thu</div>
            <div class="calendar-weekday">Fri</div>
            <div class="calendar-weekday">Sat</div>
          </div>
          <div class="calendar-days">
            ${days.map(d => `
              <div class="calendar-day ${d.otherMonth ? 'other-month' : ''} ${d.isToday ? 'today' : ''}" 
                   onclick="${!d.otherMonth ? `openCalendarQuickAdd('${d.dateStr}')` : ''}"
                   ${!d.otherMonth ? 'style="cursor: pointer;"' : ''}>
                <div class="calendar-day-number">${d.day}</div>
                ${d.events && d.events.length > 0 ? `
                  <div class="calendar-events">
                    ${d.events.slice(0, 3).map(e => `
                      <div class="calendar-event ${e.type} ${e.completed ? 'completed' : ''}" 
                           title="${e.title}"
                           onclick="event.stopPropagation(); handleCalendarEventClick('${e.type}', ${e.id})">
                        ${e.icon || ''} ${e.title}
                      </div>
                    `).join('')}
                    ${d.events.length > 3 ? `<div class="calendar-event more">+${d.events.length - 3} more</div>` : ''}
                  </div>
                ` : `
                  <div class="calendar-day-add" onclick="event.stopPropagation(); openCalendarQuickAdd('${d.dateStr}')">
                    ${icons.plus}
                  </div>
                `}
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderCalendarAgenda() {
      const events = getCalendarEvents();
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      
      // Group events by date for next 14 days
      const days = [];
      for (let i = 0; i < 14; i++) {
        const date = new Date(today);
        date.setDate(date.getDate() + i);
        const dateStr = date.toISOString().split('T')[0];
        const dayEvents = events.filter(e => e.date === dateStr);
        
        if (dayEvents.length > 0 || i < 7) {
          days.push({
            date: date,
            dateStr: dateStr,
            isToday: i === 0,
            dayName: date.toLocaleDateString('en-US', { weekday: 'long' }),
            fullDate: date.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }),
            dayNum: date.getDate(),
            events: dayEvents
          });
        }
      }

      return `
        <div class="calendar-agenda">
          ${days.map(d => `
            <div class="agenda-day ${d.isToday ? 'today' : ''}">
              <div class="agenda-day-header">
                <div class="agenda-day-date">${d.dayNum}</div>
                <div class="agenda-day-info">
                  <div class="agenda-day-name">${d.isToday ? 'Today' : d.dayName}</div>
                  <div class="agenda-day-full">${d.fullDate}</div>
                </div>
              </div>
              <div class="agenda-events">
                ${d.events.length > 0 ? d.events.map(e => `
                  <div class="agenda-event">
                    <div class="agenda-event-icon ${e.type}">${e.icon || '📌'}</div>
                    <div class="agenda-event-content">
                      <div class="agenda-event-title">${e.title}</div>
                      <div class="agenda-event-meta">${e.meta || ''}</div>
                    </div>
                    <div class="agenda-event-type ${e.type}">${e.typeLabel}</div>
                  </div>
                `).join('') : `
                  <div class="agenda-empty">
                    <div class="agenda-empty-icon">📅</div>
                    <div class="agenda-empty-text">No events this day</div>
                  </div>
                `}
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderCalendarUpcoming() {
      const events = getCalendarEvents();
      const today = new Date().toISOString().split('T')[0];
      
      // Get next 10 upcoming events
      const upcoming = events
        .filter(e => e.date >= today)
        .sort((a, b) => a.date.localeCompare(b.date))
        .slice(0, 10);

      return `
        <div class="calendar-upcoming">
          <div class="calendar-upcoming-header">📅 Upcoming</div>
          <div class="calendar-upcoming-list">
            ${upcoming.length > 0 ? upcoming.map(e => `
              <div class="calendar-upcoming-item">
                <div class="calendar-upcoming-icon agenda-event-icon ${e.type}">${e.icon || '📌'}</div>
                <div class="calendar-upcoming-content">
                  <div class="calendar-upcoming-title">${e.title}</div>
                  <div class="calendar-upcoming-date">${formatDateLong(e.date)}</div>
                </div>
              </div>
            `).join('') : `
              <div class="agenda-empty">No upcoming events</div>
            `}
          </div>
        </div>
      `;
    }

    function getCalendarEvents() {
      const events = [];
      
      // Add tasks
      (state.tasks || []).forEach(task => {
        if (task.due_date) {
          events.push({
            id: task.id,
            type: 'task',
            typeLabel: 'Task',
            title: task.title,
            date: task.due_date,
            icon: task.completed ? '✓' : '☐',
            completed: task.completed,
            meta: task.category || '',
            priority: task.priority
          });
        }
      });
      
      // Add subscriptions
      (state.subscriptions || []).forEach(sub => {
        if (sub.next_bill) {
          events.push({
            id: sub.id,
            type: 'subscription',
            typeLabel: 'Payment',
            title: sub.name,
            date: sub.next_bill,
            icon: sub.icon || '💳',
            meta: `$${(sub.price || 0).toFixed(2)}`
          });
        }
      });
      
      // Add document expirations (within 90 days)
      const today = new Date();
      (state.documents || []).forEach(doc => {
        const expiryDate = doc.expiry_date || doc.expiryDate;
        if (expiryDate) {
          const days = getDaysUntil(expiryDate);
          if (days >= 0 && days <= 90) {
            events.push({
              id: doc.id,
              type: 'document',
              typeLabel: 'Expires',
              title: doc.name,
              date: expiryDate,
              icon: doc.icon || '📄',
              meta: days === 0 ? 'Expires today!' : `Expires in ${days} days`
            });
          }
        }
      });
      
      return events;
    }

    function handleCalendarEventClick(type, id) {
      // Find the event data
      let event = null;
      let eventData = null;
      
      if (type === 'task') {
        eventData = state.tasks.find(t => t.id === id);
        if (eventData) {
          event = {
            type: 'task',
            id: id,
            title: eventData.title,
            icon: '✓',
            date: eventData.due_date,
            category: eventData.category,
            priority: eventData.priority,
            completed: eventData.completed,
            recurrence: eventData.recurrence
          };
        }
      } else if (type === 'subscription') {
        eventData = state.subscriptions.find(s => s.id === id);
        if (eventData) {
          event = {
            type: 'subscription',
            id: id,
            title: eventData.name,
            icon: eventData.icon || '💳',
            date: eventData.next_bill,
            price: eventData.price,
            cycle: eventData.cycle,
            category: eventData.category
          };
        }
      } else if (type === 'document') {
        eventData = state.documents.find(d => d.id === id);
        if (eventData) {
          event = {
            type: 'document',
            id: id,
            title: eventData.name,
            icon: eventData.icon || '📄',
            date: eventData.expiry_date || eventData.expiryDate,
            doc_number: eventData.doc_number,
            issue_date: eventData.issue_date
          };
        }
      }
      
      if (event) {
        state.calendarEventDetails = event;
        state.showCalendarEventDetails = true;
        render();
      }
    }

    function closeCalendarEventDetails() {
      state.showCalendarEventDetails = false;
      state.calendarEventDetails = null;
      render();
    }

    function renderCalendarEventDetails() {
      if (!state.showCalendarEventDetails || !state.calendarEventDetails) return '';
      
      const event = state.calendarEventDetails;
      const formattedDate = formatDate(event.date);
      
      // Type-specific content

    // =================== UNIFIED QUICK ADD ===================
    // Time-based contextual quick add with success animations
    
    function openQuickAdd(forceType = null) {
      const hour = new Date().getHours();
      
      // Time-based default selection
      let defaultType = 'task';
      if (hour >= 5 && hour < 10) {
        defaultType = 'habit'; // Morning = habits
      } else if (hour >= 10 && hour < 17) {
        defaultType = 'task'; // Work hours = tasks
      } else if (hour >= 17 && hour < 22) {
        defaultType = 'expense'; // Evening = expenses
      } else {
        defaultType = 'task'; // Late night = tasks
      }
      
      state.quickAddType = forceType || defaultType;
      state.showQuickAdd = true;
      render();
      
      // Focus input after render
      setTimeout(() => {
        const input = document.getElementById('quickAddInput');
        if (input) input.focus();
      }, 100);
    }

    function closeQuickAdd() {
      state.showQuickAdd = false;
      state.quickAddType = null;
      render();
    }

    function setQuickAddType(type) {
      state.quickAddType = type;
      render();
      setTimeout(() => {
        const input = document.getElementById('quickAddInput');
        if (input) input.focus();
      }, 50);
    }

    function submitQuickAdd() {
      const input = document.getElementById('quickAddInput');
      const value = input?.value?.trim();
      if (!value) return;
      
      const type = state.quickAddType;
      let success = false;
      let message = '';
      let icon = '';
      
      switch (type) {
        case 'task':
          const newTask = {
            id: Date.now(),
            title: value,
            category: 'Personal',
            priority: 'medium',
            due_date: new Date().toISOString().split('T')[0],
            completed: false
          };
          state.tasks = state.tasks || [];
          state.tasks.push(newTask);
          saveDemoData();
          if (state.user) dbInsert('tasks', newTask);
          success = true;
          message = 'Task added';
          icon = '📋';
          break;
          
        case 'habit':
          const newHabit = {
            id: Date.now(),
            name: value,
            icon: '✓',
            frequency: 'daily',
            streak: 0,
            completions: []
          };
          state.habits = state.habits || [];
          state.habits.push(newHabit);
          saveDemoData();
          if (state.user) dbInsert('habits', newHabit);
          success = true;
          message = 'Habit created';
          icon = '✓';
          break;
          
        case 'expense':
          const amount = parseFloat(value.replace(/[^0-9.]/g, ''));
          if (isNaN(amount) || amount <= 0) {
            // Try to parse as description, ask for amount
            showQuickAddError('Enter an amount (e.g., 12.50)');
            return;
          }
          const expense = {
            id: Date.now(),
            amount,
            name: 'Quick expense',
            category: 'Other',
            icon: '💸',
            date: new Date().toISOString().split('T')[0],
            timestamp: new Date().toISOString()
          };
          state.expenses = state.expenses || [];
          state.expenses.push(expense);
          localStorage.setItem('ctrl_expenses', JSON.stringify(state.expenses));
          success = true;
          message = `$${amount.toFixed(2)} logged`;
          icon = '💸';
          break;
          
        case 'bill':
          const newBill = {
            id: Date.now(),
            name: value,
            icon: '💳',
            price: 0,
            cycle: 'monthly',
            next_bill: new Date(Date.now() + 30*24*60*60*1000).toISOString().split('T')[0]
          };
          state.subscriptions = state.subscriptions || [];
          state.subscriptions.push(newBill);
          saveDemoData();
          if (state.user) dbInsert('subscriptions', newBill);
          success = true;
          message = 'Bill added';
          icon = '💳';
          break;
      }
      
      if (success) {
        showQuickAddSuccess(icon, message);
      }
    }

    function showQuickAddSuccess(icon, message) {
      const life = getLifeState();
      const stillInControl = life.state === 'green';
      
      // Create success overlay
      const overlay = document.createElement('div');
      overlay.className = 'quick-add-success';
      overlay.innerHTML = `
        <div class="quick-add-success-content">
          <div class="quick-add-success-icon">${icon}</div>
          <div class="quick-add-success-message">${message}</div>
          ${stillInControl ? `
            <div class="quick-add-success-state">🟢 Still in control</div>
          ` : ''}
        </div>
      `;
      
      document.body.appendChild(overlay);
      
      // Close quick add and remove overlay
      setTimeout(() => {
        overlay.classList.add('fade-out');
        setTimeout(() => {
          overlay.remove();
          closeQuickAdd();
        }, 200);
      }, 1200);
    }

    function showQuickAddError(message) {
      const input = document.getElementById('quickAddInput');
      if (input) {
        input.classList.add('shake');
        setTimeout(() => input.classList.remove('shake'), 500);
      }
    }

    // =================== HABITS ===================
    function renderHabits() {
      let habits = state.habits || [];
      const today = new Date().toISOString().split('T')[0];
      const currentHour = new Date().getHours();
      
      // Determine current time period
      let currentPeriod = 'anytime';
      if (currentHour >= 5 && currentHour < 12) currentPeriod = 'morning';
      else if (currentHour >= 12 && currentHour < 18) currentPeriod = 'afternoon';
      else if (currentHour >= 18 || currentHour < 5) currentPeriod = 'evening';
      
      // Filter by tag if set
      if (state.filterByTag) {
        habits = habits.filter(h => (h.tags || []).includes(state.filterByTag));
      }
      
      // Calculate stats (from filtered habits)
      const completedToday = habits.filter(h => (h.completions || []).includes(today)).length;
      const totalHabits = habits.length;
      const longestStreak = Math.max(0, ...habits.map(h => h.streak || 0));
      const avgCompletion = totalHabits > 0 
        ? Math.round(habits.reduce((sum, h) => sum + getCompletionRate(h), 0) / totalHabits)
        : 0;
      
      const progressPercent = totalHabits > 0 ? Math.round((completedToday / totalHabits) * 100) : 0;
      
      let progressMessage = '';
      if (progressPercent === 100) {
        progressMessage = "🎉 Amazing! You've completed all habits today!";
      } else if (progressPercent >= 75) {
        progressMessage = "💪 Almost there! Keep going!";
      } else if (progressPercent >= 50) {
        progressMessage = "👍 Halfway done! You've got this!";
      } else if (progressPercent > 0) {
        progressMessage = "🌱 Good start! Keep building momentum!";
      } else {
        progressMessage = "✨ Ready to start your day?";
      }
      
      // Group habits by time of day
      const timeGroups = {
        morning: { label: 'Morning', icon: '🌅', range: '5am - 12pm', habits: [] },
        afternoon: { label: 'Afternoon', icon: '☀️', range: '12pm - 6pm', habits: [] },
        evening: { label: 'Evening', icon: '🌙', range: '6pm - 12am', habits: [] },
        anytime: { label: 'Anytime', icon: '⭐', range: 'All day', habits: [] }
      };
      
      habits.forEach(habit => {
        const timeOfDay = habit.timeOfDay || 'anytime';
        if (timeGroups[timeOfDay]) {
          timeGroups[timeOfDay].habits.push(habit);
        } else {
          timeGroups.anytime.habits.push(habit);
        }
      });
      
      // Generate heatmap data (last 12 weeks) - use all habits for heatmap
      const allHabits = state.habits || [];
      const heatmapData = generateHeatmapData(allHabits);

      return `
        <header class="header">
          <div>
            <div class="header-title-row">
              <h2 class="header-title">Habits</h2>
              ${renderMiniStateIndicator()}
            </div>
            <p class="header-subtitle">${progressMessage}</p>
          </div>
          <div class="header-actions">
            <button class="btn btn-secondary" onclick="openHabitModal()">
              <span class="btn-icon">${icons.plus}</span>
              Add Habit
            </button>
          </div>
        </header>
        <div class="module-content">
          <!-- Stats Bar with Today's Progress -->
          <div class="module-stats-bar">
            <div class="module-stat">
              <div class="module-stat-value">${totalHabits}</div>
              <div class="module-stat-label">Active</div>
            </div>
            <div class="module-stat ${completedToday === totalHabits && totalHabits > 0 ? 'highlight' : ''}">
              <div class="module-stat-value">${completedToday}/${totalHabits}</div>
              <div class="module-stat-label">Today</div>
            </div>
            <div class="module-stat">
              <div class="module-stat-value">${longestStreak}</div>
              <div class="module-stat-label">Best Streak</div>
            </div>
            <div class="module-stat">
              <div class="module-stat-value">${avgCompletion}%</div>
              <div class="module-stat-label">Avg Rate</div>
            </div>
          </div>
          
          <!-- Tag Filter Bar -->
          ${renderTagFilterBar()}
          
          ${habits.length > 0 ? `
            <div class="habit-heatmap-section">
              <h3 class="section-title">Activity Overview</h3>
              <div class="habit-heatmap-container">
                <div class="habit-heatmap-months">
                  ${getHeatmapMonths()}
                </div>
                <div class="habit-heatmap-grid">
                  <div class="habit-heatmap-days">
                    <span>Mon</span>
                    <span>Wed</span>
                    <span>Fri</span>
                  </div>
                  <div class="habit-heatmap-cells">
                    ${heatmapData.map(day => `
                      <div class="habit-heatmap-cell ${day.level}" 
                           title="${day.date}: ${day.completed}/${allHabits.length} habits"
                           data-date="${day.date}">
                      </div>
                    `).join('')}
                  </div>
                </div>
                <div class="habit-heatmap-legend">
                  <span>Less</span>
                  <div class="habit-heatmap-cell level-0"></div>
                  <div class="habit-heatmap-cell level-1"></div>
                  <div class="habit-heatmap-cell level-2"></div>
                  <div class="habit-heatmap-cell level-3"></div>
                  <div class="habit-heatmap-cell level-4"></div>
                  <span>More</span>
                </div>
              </div>

    function generateHeatmapData(habits) {
      const data = [];
      const today = new Date();
      const totalHabits = habits.length;
      
      // Go back 12 weeks (84 days)
      for (let i = 83; i >= 0; i--) {
        const date = new Date(today);
        date.setDate(date.getDate() - i);
        const dateStr = date.toISOString().split('T')[0];
        
        // Count how many habits were completed on this day
        let completed = 0;
        habits.forEach(h => {
          if ((h.completions || []).includes(dateStr)) {
            completed++;
          }
        });
        
        // Calculate level (0-4)
        let level = 'level-0';
        if (totalHabits > 0) {
          const percent = completed / totalHabits;
          if (percent >= 1) level = 'level-4';
          else if (percent >= 0.75) level = 'level-3';
          else if (percent >= 0.5) level = 'level-2';
          else if (percent > 0) level = 'level-1';
        }
        
        data.push({ date: dateStr, completed, level });
      }
      
      return data;
    }

    function getHeatmapMonths() {
      const months = [];
      const today = new Date();
      
      for (let i = 2; i >= 0; i--) {
        const date = new Date(today);
        date.setMonth(date.getMonth() - i);
        months.push(date.toLocaleDateString('en-US', { month: 'short' }));
      }
      
      return months.map(m => `<span>${m}</span>`).join('');
    }

    function getCompletionRate(habit) {
      const completions = habit.completions || [];
      // Calculate for last 30 days
      const today = new Date();
      let completedDays = 0;
      for (let i = 0; i < 30; i++) {
        const date = new Date(today);
        date.setDate(date.getDate() - i);
        const dateStr = date.toISOString().split('T')[0];
        if (completions.includes(dateStr)) completedDays++;
      }
      return Math.round((completedDays / 30) * 100);
    }

    function toggleHabit(id) {
      const parsedId = isNaN(parseInt(id)) ? id : parseInt(id);
      const habit = (state.habits || []).find(h => h.id === parsedId);
      if (!habit) return;
      
      const today = new Date().toISOString().split('T')[0];
      habit.completions = habit.completions || [];
      
      if (habit.completions.includes(today)) {
        // Remove completion
        habit.completions = habit.completions.filter(d => d !== today);
        habit.streak = Math.max(0, (habit.streak || 0) - 1);
      } else {
        // Add completion
        habit.completions.push(today);
        habit.streak = calculateStreak(habit.completions);
        
        // Track for account prompt (only when completing, not uncompleting)
        trackUserAction();
      }
      
      if (state.user) {
        dbUpdate('habits', parsedId, { 
          completions: habit.completions, 
          streak: habit.streak 
        });
      }
      
      saveDemoData();
      render();
    }

    function calculateStreak(completions) {
      if (!completions || completions.length === 0) return 0;
      
      const sorted = [...completions].sort().reverse();
      const today = new Date().toISOString().split('T')[0];
      
      // Check if completed today or yesterday
      let streak = 0;
      let checkDate = new Date();
      
      for (let i = 0; i < 365; i++) {
        const dateStr = checkDate.toISOString().split('T')[0];
        if (sorted.includes(dateStr)) {
          streak++;
        } else if (i > 0) {
          // Allow gap for today if not yet completed
          break;
        }
        checkDate.setDate(checkDate.getDate() - 1);
      }
      
      return streak;
    }

    function saveHabit() {
      const name = document.getElementById('habitName').value.trim();
      const icon = document.getElementById('habitIcon').value.trim() || '✓';
      const frequency = document.getElementById('habitFrequency').value;
      const color = document.getElementById('habitColor').value;
      const reminder_time = document.getElementById('habitReminderTime').value || '';
      const timeOfDay = document.getElementById('habitTimeOfDay').value || 'anytime';
      const tags = getTagsFromField('habit');

      if (!name) {
        alert('Please enter a habit name.');
        return;
      }

      const data = { name, icon, frequency, color, reminder_time, timeOfDay, tags, streak: 0, completions: [] };

      if (state.editingId !== null) {
        const index = (state.habits || []).findIndex(h => h.id === state.editingId);
        if (index !== -1) {
          // Preserve existing completions and streak
          data.completions = state.habits[index].completions || [];
          data.streak = state.habits[index].streak || 0;
          state.habits[index] = { ...state.habits[index], ...data };
          if (state.user) dbUpdate('habits', state.editingId, data);
        }
      } else {
        if (state.user) {
          dbInsert('habits', data).then(result => {
            if (result) {
              state.habits = state.habits || [];
              state.habits.push(result);
              saveDemoData();
              render();
            }
          });
        } else {
          state.habits = state.habits || [];
          const newId = Math.max(0, ...state.habits.map(h => h.id || 0)) + 1;
          state.habits.push({ id: newId, ...data });
        }
      }

      saveDemoData();
      closeModal();
    }

        });
      });

      const newName = document.getElementById('settingsUserName').value.trim();

      }
      
      state.userLocation = newLocation;
      localStorage.setItem('ctrl_user_location', newLocation);
      
      state.userCountry = newCountry;
      localStorage.setItem('ctrl_user_country', newCountry);
      
      const config = getCountryConfig();
      addNotification({
        type: 'system',
        icon: config.flag,
        title: 'Profile Updated',
        message: `Settings saved. Currency: ${config.currency}, Date format: ${config.dateFormat}`,
        relatedId: 'profile-update'
      });
      render();
    }

    function toggleSetting(key) {
      const current = localStorage.getItem(key);
      
      // Settings that default to OFF (quiet_hours)
      const defaultOffSettings = ['ctrl_quiet_hours'];
      
      if (defaultOffSettings.includes(key)) {
        // For default-OFF: null/false means OFF, 'true' means ON
        const isOn = current === 'true';
        localStorage.setItem(key, isOn ? 'false' : 'true');
      } else {
        // For default-ON: null/'true' means ON, 'false' means OFF
        const isOn = current !== 'false';
        localStorage.setItem(key, isOn ? 'false' : 'true');
      }
      render();
    }
    
    function saveSetting(key, value) {
      localStorage.setItem(key, value);
      // Don't re-render for simple value changes, just save
    }

    function toggleTheme() {

      localStorage.setItem('ctrl_theme', state.theme);
      applyTheme();

    }

    // =================== TAGS SYSTEM ===================
    function addTagToField(fieldType, tagValue) {
      if (!tagValue) return;
      
      if (tagValue === '__new__') {
        const newTag = prompt('Enter new tag name:');
        if (newTag && newTag.trim()) {
          const tag = newTag.trim();
          if (!state.tags.includes(tag)) {
            state.tags.push(tag);
            localStorage.setItem('ctrl_tags', JSON.stringify(state.tags));
          }
          addTagToField(fieldType, tag);
        }
        return;
      }
      
      const containerId = `${fieldType}TagsSelected`;
      const selectId = `${fieldType}TagSelect`;
      const container = document.getElementById(containerId);
      const select = document.getElementById(selectId);
      
      if (!container) return;
      
      // Check if tag already added
      if (container.querySelector(`[data-tag="${tagValue}"]`)) return;
      
      // Add tag chip
      const chip = document.createElement('span');
      chip.className = 'tag-chip';
      chip.dataset.tag = tagValue;
      chip.innerHTML = `${tagValue}<span class="tag-remove" onclick="removeTagFromField('${fieldType}', '${tagValue}')">&times;</span>`;
      container.appendChild(chip);
      
      // Remove from select options
      if (select) {
        const option = select.querySelector(`option[value="${tagValue}"]`);
        if (option) option.remove();
      }
    }

    function removeTagFromField(fieldType, tagValue) {
      const containerId = `${fieldType}TagsSelected`;
      const selectId = `${fieldType}TagSelect`;
      const container = document.getElementById(containerId);
      const select = document.getElementById(selectId);
      
      if (container) {
        const chip = container.querySelector(`[data-tag="${tagValue}"]`);
        if (chip) chip.remove();
      }
      
      // Add back to select options
      if (select) {
        const newOption = document.createElement('option');
        newOption.value = tagValue;
        newOption.textContent = tagValue;
        // Insert before the "Create new" option
        const createOption = select.querySelector('option[value="__new__"]');
        if (createOption) {
          select.insertBefore(newOption, createOption);
        } else {
          select.appendChild(newOption);
        }
      }
    }

    function getTagsFromField(fieldType) {
      const containerId = `${fieldType}TagsSelected`;
      const container = document.getElementById(containerId);
      if (!container) return [];
      
      return Array.from(container.querySelectorAll('.tag-chip'))
        .map(chip => chip.dataset.tag)
        .filter(Boolean);
    }

    function addNewTag() {
      const input = document.getElementById('newTagInput');
      const tagName = input.value.trim();
      
      if (!tagName) return;
      
      if (state.tags.includes(tagName)) {
        alert('Tag already exists!');
        return;
      }
      
      state.tags.push(tagName);
      localStorage.setItem('ctrl_tags', JSON.stringify(state.tags));
      input.value = '';
      render();
    }

    function deleteTag(tagName) {
      if (!confirm(`Delete tag "${tagName}"? It will be removed from all items.`)) return;
      
      // Remove from tags list
      state.tags = state.tags.filter(t => t !== tagName);
      localStorage.setItem('ctrl_tags', JSON.stringify(state.tags));
      
      // Remove from all items
      state.subscriptions.forEach(s => {
        if (s.tags) s.tags = s.tags.filter(t => t !== tagName);
      });
      state.tasks.forEach(t => {
        if (t.tags) t.tags = t.tags.filter(tag => tag !== tagName);
      });
      state.habits.forEach(h => {
        if (h.tags) h.tags = h.tags.filter(t => t !== tagName);
      });
      
      saveDemoData();
      render();
    }

    function renderTagManager() {
      if (!state.showTagManager) return '';
      
      // Count items per tag
      const tagCounts = {};
      state.tags.forEach(tag => {
        let count = 0;
        state.subscriptions.forEach(s => { if (s.tags?.includes(tag)) count++; });
        state.tasks.forEach(t => { if (t.tags?.includes(tag)) count++; });
        state.habits.forEach(h => { if (h.tags?.includes(tag)) count++; });
        tagCounts[tag] = count;
      });
      
      return `
        <div class="modal-overlay" onclick="closeTagManager()">

        if ('Notification' in window) {
          Notification.requestPermission().then(permission => {
            if (permission === 'granted') {
              state.pushEnabled = true;
              localStorage.setItem('ctrl_push_enabled', 'true');
              addNotification({
                type: 'system',
                icon: '🔔',
                title: 'Notifications Enabled',

              addNotification({

                icon: '⚠️',
                title: 'Notifications Blocked',
                message: 'Please enable notifications in your browser settings to receive reminders.',
                relatedId: 'push-denied'
              });

                icon: 'ℹ️',
                title: 'Notifications Not Enabled',

            relatedId: 'push-not-supported'

    function handleCSVImport(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const csvText = e.target.result;
          const lines = csvText.split('\n').filter(line => line.trim());
          
          if (lines.length < 2) {
            alert('CSV file appears to be empty or has no data rows.');
            return;
          }
          
          // Parse header
          const header = parseCSVLine(lines[0]).map(h => h.toLowerCase().trim());
          
          // Try to identify columns
          const nameCol = header.findIndex(h => h.includes('name') || h.includes('description') || h.includes('merchant'));
          const amountCol = header.findIndex(h => h.includes('amount') || h.includes('price') || h.includes('cost'));
          const categoryCol = header.findIndex(h => h.includes('category') || h.includes('type'));
          const dateCol = header.findIndex(h => h.includes('date') || h.includes('bill'));
          
          if (nameCol === -1 || amountCol === -1) {
            alert('Could not find required columns.\n\nCSV must have columns for:\n• Name/Description/Merchant\n• Amount/Price/Cost\n\nOptional: Category, Date');
            return;
          }
          
          // Parse data rows
          const subscriptions = [];
          const categoryIcons = {
            'streaming': '🎬', 'music': '🎵', 'storage': '☁️', 'ai': '🤖',
            'gaming': '🎮', 'news': '📰', 'fitness': '💪', 'software': '💻',
            'food': '🍕', 'shopping': '🛒', 'entertainment': '🎭', 'utilities': '⚡',
            'insurance': '🛡️', 'phone': '📱', 'internet': '🌐', 'default': '💳'
          };
          
          for (let i = 1; i < lines.length; i++) {
            const values = parseCSVLine(lines[i]);
            if (values.length < Math.max(nameCol, amountCol) + 1) continue;
            
            const name = values[nameCol]?.trim();
            let amount = values[amountCol]?.trim();
            const category = categoryCol !== -1 ? values[categoryCol]?.trim() : 'Other';
            let nextBill = dateCol !== -1 ? values[dateCol]?.trim() : '';
            
            if (!name) continue;
            
            // Parse amount (remove $ and other chars)
            amount = parseFloat(amount.replace(/[^0-9.-]/g, ''));
            if (isNaN(amount) || amount <= 0) continue;
            
            // Parse date or default to next month
            if (!nextBill || isNaN(Date.parse(nextBill))) {
              const next = new Date();
              next.setMonth(next.getMonth() + 1);
              nextBill = next.toISOString().split('T')[0];
            } else {
              nextBill = new Date(nextBill).toISOString().split('T')[0];
            }
            
            // Find icon based on category
            const catLower = (category || '').toLowerCase();
            let icon = categoryIcons.default;
            for (const [key, emoji] of Object.entries(categoryIcons)) {
              if (catLower.includes(key)) {
                icon = emoji;
                break;
              }
            }
            
            // Check for duplicates
            const exists = state.subscriptions.some(s => 
              s.name.toLowerCase() === name.toLowerCase()
            );
            if (exists) continue;
            
            subscriptions.push({
              id: Math.max(0, ...state.subscriptions.map(s => s.id || 0), ...subscriptions.map(s => s.id)) + 1,
              name,
              price: amount,
              category: category || 'Other',
              icon,
              cycle: 'monthly',
              next_bill: nextBill
            });
          }
          
          if (subscriptions.length === 0) {
            alert('No valid subscriptions found in CSV.\n\nMake sure each row has a name and amount.');
            return;
          }
          
          // Show preview and confirm
          const preview = subscriptions.slice(0, 5).map(s => `• ${s.name}: $${s.price}`).join('\n');
          const more = subscriptions.length > 5 ? `\n...and ${subscriptions.length - 5} more` : '';
          
          if (!confirm(`Found ${subscriptions.length} bills:\n\n${preview}${more}\n\nAdd these to your bills?`)) {
            return;
          }
          
          // Add to state
          state.subscriptions = [...state.subscriptions, ...subscriptions];
          saveDemoData();
          
          addNotification({
            type: 'system',
            icon: '📥',
            title: 'CSV Import Complete',
            body: `Added ${subscriptions.length} subscriptions from CSV.`,
          });
          
          render();
          
        } catch (error) {
          console.error('CSV Import error:', error);
          alert('Error reading CSV file. Please check the format.');
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    }

    // Helper to parse CSV line (handles quoted fields)
    function parseCSVLine(line) {
      const result = [];
      let current = '';
      let inQuotes = false;
      
      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        
        if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
          result.push(current);
          current = '';
        } else {
          current += char;
        }
      }
      result.push(current);
      
      return result.map(s => s.replace(/^"|"$/g, '').trim());
    }

    function exportDataCSV() {
      // Check Pro access
      if (!state.isProUser) {
        showProGate('export-data');
        return;
      }
      
      // Create a zip-like approach with multiple CSV downloads
      const csvFiles = [];
      
      // Subscriptions CSV
      if (state.subscriptions?.length > 0) {
        const subHeaders = ['Name', 'Category', 'Price', 'Cycle', 'Next Bill', 'Icon', 'Tags'];
        const subRows = state.subscriptions.map(s => [
          s.name || '',
          s.category || '',
          s.price || s.amount || 0,
          s.cycle || 'monthly',
          s.next_bill || s.nextBill || s.nextDue || '',
          s.icon || '',
          (s.tags || []).join('; ')
        ]);
        csvFiles.push({ name: 'subscriptions', headers: subHeaders, rows: subRows });
      }
      
      // Tasks CSV
      if (state.tasks?.length > 0) {
        const taskHeaders = ['Title', 'Category', 'Priority', 'Due Date', 'Completed', 'Tags'];
        const taskRows = state.tasks.map(t => [
          t.title || '',
          t.category || '',
          t.priority || 'medium',
          t.due_date || t.dueDate || '',
          t.completed ? 'Yes' : 'No',
          (t.tags || []).join('; ')
        ]);
        csvFiles.push({ name: 'tasks', headers: taskHeaders, rows: taskRows });
      }
      
      // Documents CSV
      if (state.documents?.length > 0) {
        const docHeaders = ['Name', 'Type', 'Expiry Date', 'Notes', 'Tags'];
        const docRows = state.documents.map(d => [
          d.name || '',
          d.type || '',
          d.expiry_date || d.expiryDate || '',
          d.notes || '',
          (d.tags || []).join('; ')
        ]);
        csvFiles.push({ name: 'documents', headers: docHeaders, rows: docRows });
      }
      
      // Habits CSV
      if (state.habits?.length > 0) {
        const habitHeaders = ['Name', 'Icon', 'Frequency', 'Time of Day', 'Streak', 'Total Completions'];
        const habitRows = state.habits.map(h => [
          h.name || '',
          h.icon || '',
          h.frequency || 'daily',
          h.timeOfDay || 'anytime',
          h.streak || 0,
          (h.completedDates || []).length
        ]);
        csvFiles.push({ name: 'habits', headers: habitHeaders, rows: habitRows });
      }
      
      // Download each CSV
      csvFiles.forEach(file => {
        const csvContent = [
          file.headers.join(','),
          ...file.rows.map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(','))
        ].join('\n');
        
        const blob = new Blob([csvContent], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `ctrl-${file.name}-${new Date().toISOString().split('T')[0]}.csv`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      });
      
      if (csvFiles.length > 0) {
        addNotification({
          type: 'system',
          icon: '📊',
          title: 'CSV Export Complete',
          body: `Exported ${csvFiles.length} CSV file(s).`
        });
      } else {
        addNotification({
          type: 'system',
          icon: '📊',
          title: 'Nothing to Export',
          body: 'Add some data first before exporting.'
        });
      }
    }

    // =================== HELPERS ===================
    function formatMessage(content) {
      return content
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/\n- /g, '<br>• ')
        .replace(/\n(\d+)\. /g, '<br>$1. ')
        .replace(/^/, '<p>')
        .replace(/$/, '</p>');
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function formatDateLong(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function formatTime12(timeStr) {
      if (!timeStr) return '';
      const [hours, minutes] = timeStr.split(':').map(Number);
      const period = hours >= 12 ? 'PM' : 'AM';
      const hour12 = hours % 12 || 12;
      return `${hour12}:${minutes.toString().padStart(2, '0')} ${period}`;
    }

    function getDaysUntil(dateStr) {
      if (!dateStr) return 999;
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const target = new Date(dateStr);
      target.setHours(0, 0, 0, 0);
      return Math.ceil((target - today) / (1000 * 60 * 60 * 24));
    }

    function capitalize(str) {
      return str ? str.charAt(0).toUpperCase() + str.slice(1) : '';
    }

    function getExpiringDocsCount() {
      return state.documents.filter(d => {
        const days = getDaysUntil(d.expiry_date || d.expiryDate);
        return days <= 90 && days > 0;
      }).length;
    }

    function getUpcomingItems() {
      const items = [];
      
      // Add subscriptions due in next 30 days
      state.subscriptions.forEach(sub => {
        const days = getDaysUntil(sub.next_bill || sub.nextBill);
        if (days >= 0 && days <= 30) {
          items.push({
            name: sub.name,
            icon: sub.icon,
            meta: `$${sub.price.toFixed(2)} due ${days === 0 ? 'today' : days === 1 ? 'tomorrow' : `in ${days} days`}`,
            type: 'subscription',
            days
          });
        }
      });

      // Add documents expiring in next 90 days
      state.documents.forEach(doc => {
        const days = getDaysUntil(doc.expiry_date || doc.expiryDate);
        if (days >= 0 && days <= 90) {
          items.push({
            name: doc.name,
            icon: doc.icon,
            meta: `Expires ${days === 0 ? 'today' : days === 1 ? 'tomorrow' : `in ${days} days`}`,
            type: 'document',
            days
          });
        }
      });

      // Sort by days until due
      return items.sort((a, b) => a.days - b.days);
    }

      if (!isSupabaseConfigured) {
        // No Supabase - use demo mode with localStorage persistence
        loadDemoData();
        state.isInitialized = true;
        render();
        return;
      }

      // Check for existing session
      try {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session?.user) {
          state.user = session.user;
          await loadUserData();
        } else {
          // Use demo data for non-authenticated users
          loadDemoData();
        }
      } catch (error) {
        console.error('Auth error:', error);
        loadDemoData();
      }

      // Listen for auth changes
      if (supabaseClient) {
        supabaseClient.auth.onAuthStateChange(async (event, session) => {
          if (event === 'SIGNED_IN' && session?.user) {
            state.user = session.user;
            state.authError = null;
            await loadUserData();
            render();
          } else if (event === 'SIGNED_OUT') {
            state.user = null;
            loadDemoData();
            render();
          }
        });
      }

      state.isInitialized = true;
      render();
      
      // Initialize notifications
      setTimeout(() => {
        checkForNotifications();
        scheduleHabitCheckins();
      }, 1000);
      
      // Check for notifications periodically (every 30 minutes)
      setInterval(checkForNotifications, 30 * 60 * 1000);
    }

    // Load demo data from localStorage or use defaults
    function loadDemoData() {
      const savedSubs = localStorage.getItem('ctrl_demo_subscriptions');
      const savedDocs = localStorage.getItem('ctrl_demo_documents');
      const savedAccomplishments = localStorage.getItem('ctrl_demo_accomplishments');
      const savedGoals = localStorage.getItem('ctrl_demo_goals');
      const savedTasks = localStorage.getItem('ctrl_demo_tasks');
      const savedHabits = localStorage.getItem('ctrl_demo_habits');
      
      state.subscriptions = savedSubs ? JSON.parse(savedSubs) : [...defaultData.subscriptions];
      state.documents = savedDocs ? JSON.parse(savedDocs) : [...defaultData.documents];
      state.accomplishments = savedAccomplishments ? JSON.parse(savedAccomplishments) : [...defaultData.accomplishments];
      state.goals = savedGoals ? JSON.parse(savedGoals) : [...defaultData.goals];
      state.tasks = savedTasks ? JSON.parse(savedTasks) : [...defaultData.tasks];
      state.habits = savedHabits ? JSON.parse(savedHabits) : [...defaultData.habits];

    async function loadUserData() {
      if (!supabase || !state.user) return;
      
      state.isSyncing = true;
      render();

      try {
        // Load all user data in parallel
        const [subsRes, docsRes, accRes, goalsRes, tasksRes, habitsRes] = await Promise.all([
          supabaseClient.from('subscriptions').select('*').eq('user_id', state.user.id).order('created_at'),
          supabaseClient.from('documents').select('*').eq('user_id', state.user.id).order('created_at'),
          supabaseClient.from('accomplishments').select('*').eq('user_id', state.user.id).order('created_at'),
          supabaseClient.from('goals').select('*').eq('user_id', state.user.id).order('created_at'),
          supabaseClient.from('tasks').select('*').eq('user_id', state.user.id).order('created_at'),
          supabaseClient.from('habits').select('*').eq('user_id', state.user.id).order('created_at'),
        ]);

        state.subscriptions = subsRes.data || [];
        state.documents = docsRes.data || [];
        state.accomplishments = accRes.data || [];
        state.goals = goalsRes.data || [];
        state.tasks = tasksRes.data || [];
        state.habits = habitsRes.data || [];
        state.lastSynced = new Date();
      } catch (error) {
        console.error('Error loading data:', error);
      }

      state.isSyncing = false;
    }

    // Database CRUD operations
    async function dbInsert(table, data) {
      if (!supabase || !state.user) return null;
      
      const { data: result, error } = await supabase
        .from(table)
        .insert({ ...data, user_id: state.user.id })
        .select()
        .single();
      
      if (error) {
        console.error(`Insert error (${table}):`, error);
        return null;
      }
      return result;
    }

    async function dbUpdate(table, id, data) {
      if (!supabase || !state.user) return false;
      
      const { error } = await supabase
        .from(table)
        .update(data)
        .eq('id', id)
        .eq('user_id', state.user.id);
      
      if (error) {
        console.error(`Update error (${table}):`, error);
        return false;
      }
      return true;
    }

    async function dbDelete(table, id) {
      if (!supabase || !state.user) return false;
      
      const { error } = await supabase
        .from(table)
        .delete()
        .eq('id', id)
        .eq('user_id', state.user.id);
      
      if (error) {
        console.error(`Delete error (${table}):`, error);
        return false;
      }
      return true;
    }

      const step = tourSteps[state.tourStep];
      const isLastStep = state.tourStep === tourSteps.length - 1;
      
      return `
        <div class="tour-overlay">
          <button class="tour-skip" onclick="skipTour()">Skip</button>
          
          <div class="tour-phone-container">
            <div class="tour-phone">
              <div class="tour-phone-screen">
                <div class="tour-phone-notch"></div>
                ${renderTourMockup(step.mockup)}
              </div>
            </div>
          </div>
          
          <div class="tour-content">
            <div class="tour-dots">
              ${tourSteps.map((_, i) => `
                <div class="tour-dot ${i === state.tourStep ? 'active' : ''} ${i < state.tourStep ? 'completed' : ''}" onclick="goToTourStep(${i})"></div>
              `).join('')}

      `;

    function goToTourStep(index) {
      state.tourStep = index;
      render();
    }

    function nextTourStep() {
      if (state.tourStep < tourSteps.length - 1) {
        state.tourStep++;
        render();
      } else {
        completeTour();
      }
    }

    function skipTour() {
      completeTour();
    }

    function completeTour() {
      state.showTour = false;
      localStorage.setItem('ctrl_tour_completed', 'true');
      state.activeModule = 'home';
      render();

      localStorage.removeItem('ctrl_tour_completed');

      state.activeModule = 'home';

    // =================== NOTIFICATIONS ===================
    function addNotification(notification) {
      const newNotif = {
        id: Date.now(),
        timestamp: new Date().toISOString(),
        read: false,
        ...notification
      };
      state.notifications.unshift(newNotif);
      saveNotifications();
      
      // Also trigger browser notification if enabled
      if (state.pushEnabled && Notification.permission === 'granted') {
        sendBrowserNotification(newNotif);
      }
      
      render();
    }

    function saveNotifications() {
      // Keep only last 50 notifications
      state.notifications = state.notifications.slice(0, 50);
      localStorage.setItem('ctrl_notifications', JSON.stringify(state.notifications));
    }

    function markNotificationRead(id) {
      const notif = state.notifications.find(n => n.id === id);
      if (notif) {
        notif.read = true;
        saveNotifications();
        render();
      }
    }

    function markAllNotificationsRead() {
      state.notifications.forEach(n => n.read = true);
      saveNotifications();
      render();
    }

    function dismissNotification(id, e) {
      e.stopPropagation();
      state.notifications = state.notifications.filter(n => n.id !== id);
      saveNotifications();
      render();
    }

    function clearAllNotifications() {
      state.notifications = [];
      saveNotifications();
      render();
    }

    function getUnreadCount() {
      return state.notifications.filter(n => !n.read).length;
    }

    function toggleNotificationCenter() {
      state.showNotificationCenter = !state.showNotificationCenter;
      render();
    }

    function closeNotificationCenter() {
      state.showNotificationCenter = false;
      render();
    }

    function formatNotificationTime(timestamp) {
      const date = new Date(timestamp);
      const now = new Date();
      const diffMs = now - date;
      const diffMins = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMs / 3600000);
      const diffDays = Math.floor(diffMs / 86400000);
      
      if (diffMins < 1) return 'Just now';
      if (diffMins < 60) return `${diffMins}m ago`;
      if (diffHours < 24) return `${diffHours}h ago`;
      if (diffDays < 7) return `${diffDays}d ago`;
      return date.toLocaleDateString();
    }

    function renderNotificationCenter() {
      const unreadCount = getUnreadCount();
      
      // Sort notifications: unread first, then by timestamp
      const sortedNotifications = [...state.notifications].sort((a, b) => {
        if (a.read !== b.read) return a.read ? 1 : -1;
        return new Date(b.timestamp) - new Date(a.timestamp);
      });
      
      return `
        <div class="notification-overlay" onclick="closeNotificationCenter()"></div>
        <div class="notification-center" onclick="event.stopPropagation()">
          <div class="notification-center-header">
            <h3 class="notification-center-title">Notifications</h3>
            <div class="notification-center-actions">
              ${state.notifications.length > 0 ? `
                <button class="notification-center-btn" onclick="markAllNotificationsRead()">Mark all read</button>
                <button class="notification-center-btn" onclick="clearAllNotifications()">Clear all</button>
              ` : ''}
              <button class="notification-center-close" onclick="closeNotificationCenter()">${icons.x}</button>
            </div>
          </div>
          <div class="notification-list">
            ${sortedNotifications.length > 0 ? sortedNotifications.map(notif => `
              <div class="notification-item ${notif.read ? '' : 'unread'} ${notif.urgent ? 'urgent' : ''} ${notif.celebratory ? 'celebratory' : ''}" 
                   onclick="handleNotificationClick('${notif.id}', '${notif.action || ''}')">
                <div class="notification-icon ${notif.type}">${notif.icon || '🔔'}</div>
                <div class="notification-content">
                  <div class="notification-title">${notif.title}</div>
                  <div class="notification-body">${(notif.body || '').replace(/\n/g, '<br>')}</div>
                  ${notif.tips && notif.tips.length > 0 ? `
                    <div class="notification-tips">
                      ${notif.tips.slice(0, 2).map(tip => `
                        <div class="notification-tip">💡 ${tip}</div>
                      `).join('')}
                    </div>
                  ` : ''}
                  ${notif.actions && notif.actions.length > 0 ? `
                    <div class="notification-actions">
                      ${notif.actions.map(action => `
                        <button class="notification-action-btn ${action.action === 'dismiss' ? 'secondary' : 'primary'}" 
                                onclick="event.stopPropagation(); handleNotificationAction('${notif.id}', '${action.action}', ${JSON.stringify(action.data || '')})">
                          ${action.label}
                        </button>
                      `).join('')}
                    </div>
                  ` : ''}
                  <div class="notification-time">${formatNotificationTime(notif.timestamp)}</div>
                </div>
                <button class="notification-dismiss" onclick="dismissNotification(${notif.id}, event)">${icons.x}</button>
              </div>
            `).join('') : `
              <div class="notification-empty">
                ${icons.bell}
                <h3>No notifications</h3>
                <p>You're all caught up!</p>
              </div>
            `}
          </div>
          <div class="notification-settings">
            <div class="notification-setting">
              <div>
                <div class="notification-setting-label">Push Notifications</div>
                <div class="notification-setting-desc">Get notified even when the app is closed</div>
              </div>
              <div class="toggle-switch ${state.pushEnabled ? 'active' : ''}" onclick="togglePushNotifications()"></div>
            </div>
          </div>
        </div>
      `;
    }

    function handleNotificationClick(id, action) {
      markNotificationRead(id);
      if (action) {
        state.showNotificationCenter = false;
        state.activeModule = action;
        render();
      }
    }

    // =================== BROWSER PUSH NOTIFICATIONS ===================
    async function togglePushNotifications() {
      if (!state.pushEnabled) {
        // Request permission
        if ('Notification' in window) {
          const permission = await Notification.requestPermission();
          if (permission === 'granted') {
            state.pushEnabled = true;
            localStorage.setItem('ctrl_push_enabled', 'true');
            addNotification({
              type: 'system',
              icon: '🔔',
              title: 'Notifications enabled',
              body: "You'll now receive reminders for bills, documents, and habits.",
            });
          }
        }
      } else {
        state.pushEnabled = false;
        localStorage.setItem('ctrl_push_enabled', 'false');
      }
      render();
    }

    function sendBrowserNotification(notif) {
      if ('Notification' in window && Notification.permission === 'granted') {
        const browserNotif = new Notification(notif.title, {
          body: notif.body,
          icon: '/favicon.ico',
          badge: '/favicon.ico',
          tag: notif.id.toString(),
        });
        
        browserNotif.onclick = () => {
          window.focus();
          if (notif.action) {
            state.activeModule = notif.action;
            render();
          }
        };
      }
    }

    // Get renewal guide for a document
    function getDocumentRenewalGuide(doc) {
      const docType = (doc.type || doc.name || '').toLowerCase();
      
      // Find matching guide
      for (const [key, guide] of Object.entries(documentRenewalGuides)) {
        if (docType.includes(key) || key.includes(docType)) {
          const days = getDaysUntil(doc.expiry_date || doc.expiryDate);
          if (days <= guide.lead_days && days >= 0) {
            return { ...guide.getGuide(days), docType: key, days };
          }
        }
      }
      
      // Default guide for unknown document types
      const days = getDaysUntil(doc.expiry_date || doc.expiryDate);
      if (days <= 30 && days >= 0) {
        return {
          title: `📄 ${doc.name} expires in ${days} day(s)`,
          body: 'Check the renewal requirements for this document.',
          tips: ['Contact the issuing agency for renewal steps'],
          days
        };
      }
      return null;
    }

      subs.forEach(sub => {

          if (monthsActive === 12) {
            const annualCost = sub.cycle === 'yearly' ? sub.price : sub.price * 12;

    // Habit coaching notifications
    function generateHabitCoaching() {
      const coaching = [];
      const habits = state.habits || [];
      const today = new Date().toISOString().split('T')[0];
      
      habits.forEach(habit => {
        const completions = habit.completions || [];
        const streak = habit.streak || 0;
        const lastCompletion = completions[completions.length - 1];
        
        // Streak milestones
        if (streak === 7 || streak === 14 || streak === 21 || streak === 30 || streak === 50 || streak === 100) {
          const existingMilestone = state.notifications.find(n => 
            n.type === 'habit_milestone' && n.relatedId === habit.id && n.body.includes(streak + ' day')
          );
          if (!existingMilestone) {
            coaching.push({
              type: 'habit_milestone',
              icon: streak >= 30 ? '🏆' : '🔥',
              title: `${streak}-day streak on ${habit.name}!`,
              body: getMilestoneMessage(streak, habit.name),
              relatedId: habit.id,
              actions: [
                { label: 'Keep going!', action: 'dismiss' },
                { label: 'View habits', action: 'navigate', data: 'habits' }
              ],
              celebratory: true
            });
          }
        }
        
        // Streak about to break (missed yesterday)
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        const yesterdayISO = yesterday.toISOString().split('T')[0];
        
        if (streak > 3 && lastCompletion === yesterdayISO && !completions.includes(today)) {
          // Had a streak, completed yesterday, haven't today
          coaching.push({
            type: 'habit_reminder',
            icon: '⏰',
            title: `Don't break your ${habit.name} streak!`,
            body: `You're at ${streak} days. Complete today to keep it going.`,
            relatedId: habit.id,
            priority: 'high',
            actions: [
              { label: 'Mark complete', action: 'completeHabit', data: habit.id },
              { label: 'Skip today', action: 'dismiss' }
            ]
          });
        }
        
        // Streak broken - encouragement
        const dayBeforeYesterday = new Date();
        dayBeforeYesterday.setDate(dayBeforeYesterday.getDate() - 2);
        const dayBeforeISO = dayBeforeYesterday.toISOString().split('T')[0];
        
        if (lastCompletion && lastCompletion < yesterdayISO && lastCompletion >= dayBeforeISO && streak > 5) {
          const existingBroken = state.notifications.find(n => 
            n.type === 'habit_broken' && n.relatedId === habit.id
          );
          if (!existingBroken) {
            coaching.push({
              type: 'habit_broken',
              icon: '💪',
              title: `Get back on track with ${habit.name}`,
              body: `You had a ${streak}-day streak. Missing one day is okay - start fresh today!`,
              relatedId: habit.id,
              actions: [
                { label: 'Start again', action: 'completeHabit', data: habit.id },
                { label: 'Later', action: 'dismiss' }
              ]
            });
          }
        }
      });
      
      return coaching;
    }

    function getMilestoneMessage(days, habitName) {
      const messages = {
        7: `One week of consistency! ${habitName} is becoming a habit.`,
        14: `Two weeks strong! You're building real momentum.`,
        21: `21 days - scientists say this is when habits form. You did it!`,
        30: `A full month! ${habitName} is now part of who you are.`,
        50: `50 days! You're in the top 1% of habit builders.`,
        100: `100 DAYS! Legendary commitment. You're unstoppable.`
      };
      return messages[days] || `Amazing ${days}-day streak! Keep it up.`;
    }

    // Generate weekly review (Sunday evenings)
    function generateWeeklyReview() {
      const now = new Date();
      const dayOfWeek = now.getDay(); // 0 = Sunday
      const hour = now.getHours();
      const todayISO = now.toISOString().split('T')[0];
      
      // Only show on Sunday between 5-9 PM
      if (dayOfWeek !== 0 || hour < 17 || hour > 21) return null;
      
      // Check if already shown today
      const existingReview = state.notifications.find(n => 
        n.type === 'weekly_review' && n.timestamp.startsWith(todayISO)
      );
      if (existingReview) return null;
      
      const tasks = state.tasks || [];
      const habits = state.habits || [];
      const subs = state.subscriptions || [];
      
      // Calculate week stats
      const weekStart = new Date(now);
      weekStart.setDate(now.getDate() - 7);
      const weekStartISO = weekStart.toISOString().split('T')[0];
      
      // Tasks completed this week (rough estimate based on completed status)
      const completedTasks = tasks.filter(t => t.completed).length;
      const totalTasks = tasks.length;
      
      // Habits completed today
      const habitsCompletedToday = habits.filter(h => 
        (h.completions || []).includes(todayISO)
      ).length;
      
      // Current streaks
      const activeStreaks = habits.filter(h => (h.streak || 0) > 0);
      const longestStreak = Math.max(0, ...habits.map(h => h.streak || 0));
      
      // Upcoming bills this week
      const upcomingBills = subs.filter(s => {
        const days = getDaysUntil(s.next_bill);
        return days >= 0 && days <= 7;
      });
      const upcomingTotal = upcomingBills.reduce((sum, s) => sum + (s.price || 0), 0);
      
      // Build summary
      const lines = [];
      lines.push(`📊 **Week in Review**`);
      lines.push('');
      
      if (completedTasks > 0) {
        lines.push(`✅ ${completedTasks} tasks completed`);
      }
      
      if (activeStreaks.length > 0) {
        lines.push(`🔥 ${activeStreaks.length} active habit streak${activeStreaks.length > 1 ? 's' : ''}`);
        if (longestStreak >= 7) {
          lines.push(`   Longest: ${longestStreak} days!`);
        }
      }
      
      if (upcomingBills.length > 0) {
        lines.push(`💳 $${upcomingTotal.toFixed(0)} in bills coming this week`);
      }
      
      // Encouragement
      const encouragements = [
        "You're making progress! Keep it up.",
        "Every small step counts. Great week!",
        "Consistency is key, and you've got it.",
        "Look at you, staying on top of things!"
      ];
      lines.push('');
      lines.push(encouragements[Math.floor(Math.random() * encouragements.length)]);
      
      return {
        type: 'weekly_review',
        icon: '📅',
        title: 'Your Weekly Review',
        body: lines.join('\n'),
        celebratory: true,
        actions: [
          { label: 'Start fresh week', action: 'navigate', data: 'home' },
          { label: 'Plan ahead', action: 'navigate', data: 'tasks' }
        ]
      };
    }

    // Check habit time-based reminders
    function checkHabitTimeReminders() {
      const now = new Date();
      const todayISO = now.toISOString().split('T')[0];
      const currentHour = now.getHours();
      const currentMinute = now.getMinutes();
      const currentTime = `${currentHour.toString().padStart(2, '0')}:${currentMinute.toString().padStart(2, '0')}`;
      
      (state.habits || []).forEach(habit => {
        if (!habit.reminder_time) return;
        
        // Check if already completed today
        const completions = habit.completions || [];
        if (completions.includes(todayISO)) return;
        
        // Parse reminder time
        const [reminderHour, reminderMinute] = habit.reminder_time.split(':').map(Number);
        
        // Check if we're within 5 minutes after the reminder time
        const reminderTotalMinutes = reminderHour * 60 + reminderMinute;
        const currentTotalMinutes = currentHour * 60 + currentMinute;
        const diff = currentTotalMinutes - reminderTotalMinutes;
        
        if (diff >= 0 && diff <= 5) {
          // Check if we already sent a reminder for this habit today
          const existing = state.notifications.find(n => 
            n.type === 'habit_time_reminder' && 
            n.relatedId === habit.id && 
            n.timestamp.startsWith(todayISO)
          );
          
          if (!existing) {
            addNotification({
              type: 'habit_time_reminder',
              icon: habit.icon || '⏰',
              title: `Time for: ${habit.name}`,
              body: habit.streak > 0 
                ? `Keep your ${habit.streak}-day streak going!` 
                : "Let's build this habit today!",
              relatedId: habit.id,
              actions: [
                { label: 'Mark done', action: 'completeHabit', data: habit.id },
                { label: 'Later', action: 'dismiss' }
              ]
            });
          }
        }
      });
    }
