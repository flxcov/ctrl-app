    .spending-legend-item:nth-child(2) { animation-delay: 0.35s; }
    .spending-legend-item:nth-child(3) { animation-delay: 0.4s; }
    .spending-legend-item:nth-child(4) { animation-delay: 0.45s; }
    .spending-legend-item:nth-child(5) { animation-delay: 0.5s; }

    .spending-legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .spending-legend-label {
      color: var(--text-secondary);
      flex: 1;
    }

    .spending-legend-value {
      font-weight: 600;
      color: var(--text-primary);
    }

    .spending-legend-percent {
      font-weight: 400;
      color: var(--text-muted);
      font-size: 12px;
    }

    .subscriptions-list {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .subscriptions-header {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr 80px;
      padding: 14px 20px;
      background: var(--bg-tertiary);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
    }

    .subscription-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr 80px;
      padding: 16px 20px;
      align-items: center;
      border-bottom: 1px solid var(--border);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      animation: fadeInUp 0.4s ease backwards;
    }

    .subscription-row:nth-child(1) { animation-delay: 0.05s; }
    .subscription-row:nth-child(2) { animation-delay: 0.1s; }
    .subscription-row:nth-child(3) { animation-delay: 0.15s; }
    .subscription-row:nth-child(4) { animation-delay: 0.2s; }
    .subscription-row:nth-child(5) { animation-delay: 0.25s; }

    .subscription-row:last-child {
      border-bottom: none;
    }

    .subscription-row:hover {
      background: var(--bg-tertiary);
      transform: translateX(4px);
    }

    .sub-name {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sub-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      background: var(--bg-elevated);
      transition: transform 0.2s ease;
    }

    .subscription-row:hover .sub-icon {
      transform: scale(1.1) rotate(-5deg);
    }

    .sub-details h4 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .sub-details span {
      font-size: 12px;
      color: var(--text-muted);
    }

    .sub-price {
      font-family: var(--font-mono);
      font-weight: 600;
      font-size: 14px;
    }

    .sub-cycle {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .sub-next {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .sub-next.soon {
      color: var(--warning);
      font-weight: 500;
    }

    .sub-actions {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
    }

    .sub-action-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: var(--bg-elevated);
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      transition: all 0.15s ease;
    }

    .sub-action-btn:hover {
      background: var(--brand-soft);
      color: var(--brand-primary);
    }

    .sub-action-btn.delete:hover {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .sub-action-btn svg {
      width: 16px;
      height: 16px;
    }

    /* Expenses Section */
    .expenses-section {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .expenses-section .list-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .expenses-month-total {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .expenses-month-label {
      font-size: 13px;
      color: var(--text-muted);
    }

    .expenses-month-value {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 600;
      color: var(--danger);
    }

    .expenses-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .expense-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      transition: all 0.2s ease;
    }

    .expense-row:hover {
      background: var(--bg-tertiary);
      border-color: var(--border-strong);
    }

    .expense-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      background: var(--bg-elevated);
      flex-shrink: 0;
    }

    .expense-info {
      flex: 1;
      min-width: 0;
    }

    .expense-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 2px;
    }

    .expense-meta {
      font-size: 12px;
      color: var(--text-muted);
    }

    .expense-amount {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 600;
      color: var(--danger);
      flex-shrink: 0;
    }

    .expense-delete {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: var(--radius-sm);
      opacity: 0;
      transition: all 0.2s ease;
    }

    .expense-row:hover .expense-delete {
      opacity: 1;
    }

    .expense-delete:hover {
      color: var(--danger);
      background: var(--danger-soft);
    }

    .expense-delete svg {
      width: 14px;
      height: 14px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      animation: fadeIn 0.4s ease;
    }

    .empty-state svg {
      width: 48px;
      height: 48px;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .empty-state h3 {
      font-size: 16px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: 14px;
      margin-bottom: 20px;
    }

    /* Ada Empty State - The voice of the system */
    .ada-empty-state {
      max-width: 320px;
      margin: 0 auto;
      padding: 20px 0;
    }

    .ada-empty-state .ada-empty-icon {
      font-size: 48px;
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite;
    }

    .ada-empty-state h3 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 12px;
    }

    .ada-empty-state p {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    .ada-empty-state .btn {
      margin-bottom: 0;
    }

    /* Quick Add Chips for Empty States */
    .empty-quick-adds {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .empty-quick-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .empty-quick-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .empty-quick-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 14px;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: var(--font-sans);
    }

    .empty-quick-chip:hover {
      background: var(--bg-elevated);
      border-color: var(--brand-primary);
      transform: translateY(-1px);
    }

    .empty-quick-chip:active {
      transform: translateY(0);
    }

    .empty-quick-chip span {
      font-size: 16px;
    }

    /* Empty State Templates */
    .empty-templates {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .empty-templates-title {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }

    .empty-templates-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      max-width: 500px;
      margin: 0 auto;
    }

    .empty-template-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
    }

    .empty-template-btn:hover {
      background: var(--bg-elevated);
      border-color: var(--border-strong);
      color: var(--text-primary);
      transform: translateY(-2px);
    }

    .empty-template-btn span {
      font-size: 16px;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: var(--overlay-bg);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.2s ease;
    }

    .modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      width: 100%;
      max-width: 440px;
      max-height: 90vh;
      overflow-y: auto;
      animation: modalSlideIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.1);
      box-shadow: var(--shadow-lg);
    }

    @media (max-width: 480px) {
      .modal {
        max-width: 100%;
        max-height: 100vh;
        border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        margin-top: auto;
      }
      
      .modal-backdrop {
        align-items: flex-end;
      }
      
      .modal-header {
        padding: 16px 20px;
      }
      
      .modal-body {
        padding: 20px;
      }
      
      .modal-actions {
        padding: 16px 20px 24px;
        flex-direction: column-reverse;
        gap: 10px;
      }
      
      .modal-actions .btn {
        width: 100%;
      }
    }

    @keyframes modalSlideIn {
      0% { 
        opacity: 0; 
        transform: translateY(30px) scale(0.95); 
      }
      100% { 
        opacity: 1; 
        transform: translateY(0) scale(1); 
      }
    }

    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-header h3 {
      font-size: 18px;
      font-weight: 600;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      border-radius: var(--radius-sm);
      transition: all 0.2s ease;
    }

    .modal-close:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      transform: rotate(90deg);
    }

    .modal-body {
      padding: 24px;
    }

    .form-group {
      margin-bottom: 20px;
      animation: fadeInUp 0.3s ease backwards;
    }

    .form-group:nth-child(1) { animation-delay: 0.05s; }
    .form-group:nth-child(2) { animation-delay: 0.1s; }
    .form-group:nth-child(3) { animation-delay: 0.15s; }
    .form-group:nth-child(4) { animation-delay: 0.2s; }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      font-size: 14px;
      color: var(--text-primary);
      font-family: var(--font-sans);
      transition: border-color 0.15s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--brand-primary);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .form-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    /* Document Photo Upload */
    .doc-photo-upload {
      margin-top: 8px;
    }

    .doc-photo-input {
      display: block;
      cursor: pointer;
    }

    .doc-photo-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg-tertiary);
      border: 2px dashed var(--border);
      border-radius: var(--radius-lg);
      text-align: center;
      transition: all 0.15s ease;
    }

    .doc-photo-placeholder:hover {
      border-color: var(--brand-primary);
      background: var(--bg-elevated);
    }

    .doc-photo-icon {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .doc-photo-text {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .doc-photo-hint {
      font-size: 12px;
      color: var(--text-muted);
    }

    .doc-photo-preview {
      position: relative;
      display: inline-block;
    }

    .doc-photo-preview img {
      max-width: 100%;
      max-height: 200px;
      border-radius: var(--radius-lg);
      cursor: pointer;
      border: 1px solid var(--border);
    }

    .doc-photo-remove {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 24px;
      height: 24px;
      background: var(--danger);
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .doc-photo-remove:hover {
      transform: scale(1.1);
    }

    /* Photo Viewer Lightbox */
    .photo-viewer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .photo-viewer-content {
      position: relative;
      max-width: 90vw;
      max-height: 90vh;
    }

    .photo-viewer-content img {
      max-width: 100%;
      max-height: 90vh;
      border-radius: var(--radius-lg);
    }

    .photo-viewer-close {
      position: absolute;
      top: -40px;
      right: 0;
      background: transparent;
      border: none;
      color: white;
      font-size: 32px;
      cursor: pointer;
      padding: 8px;
    }

    /* Tags System */
    .tags-input-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .tags-selected {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 24px;
    }

    /* Tag Filter Bar */
    .tag-filter-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .tag-filter-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      flex: 1;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .tag-filter-scroll::-webkit-scrollbar {
      display: none;
    }

    .tag-filter-chip {
      flex-shrink: 0;
      padding: 6px 14px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .tag-filter-chip:hover {
      background: var(--bg-elevated);
      border-color: var(--border-strong);
    }

    .tag-filter-chip.active {
      background: var(--brand-soft);
      border-color: var(--brand-primary);
      color: var(--brand-primary);
    }

    .tag-filter-clear {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      background: var(--danger-soft);
      border: none;
      border-radius: var(--radius-md);
      font-size: 12px;
      font-weight: 500;
      color: var(--danger);
      cursor: pointer;
      flex-shrink: 0;
    }

    .tag-filter-clear svg {
      width: 14px;
      height: 14px;
    }

    .tag-filter-clear:hover {
      background: var(--danger);
      color: white;
    }

    .tag-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: var(--brand-soft);
      color: var(--brand-primary);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    .tag-chip .tag-remove {
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      opacity: 0.7;
      margin-left: 2px;
    }

    .tag-chip .tag-remove:hover {
      opacity: 1;
    }

    .tag-select {
      flex-shrink: 0;
    }

    .item-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }

    .item-tag {
      display: inline-block;
      padding: 2px 8px;
      background: var(--bg-tertiary);
      color: var(--text-muted);
      border-radius: 12px;
      font-size: 11px;
    }

    .tag-filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .tag-filter-btn {
      padding: 6px 12px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-secondary);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tag-filter-btn:hover {
      border-color: var(--brand-primary);
      color: var(--text-primary);
    }

    .tag-filter-btn.active {
      background: var(--brand-soft);
      border-color: var(--brand-primary);
      color: var(--brand-primary);
    }

    /* Tag Manager Modal */
    .tag-manager-modal {
      max-width: 400px;
    }

    .tag-manager-add {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tag-manager-add .form-input {
      flex: 1;
    }

    .tag-manager-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 300px;
      overflow-y: auto;
    }

    .tag-manager-empty {
      text-align: center;
      color: var(--text-muted);
      padding: 20px;
    }

    .tag-manager-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
    }

    .tag-manager-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .tag-manager-count {
      font-size: 12px;
      color: var(--text-muted);
    }

    .tag-manager-delete {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: var(--radius-sm);
      transition: all 0.2s ease;
    }

    .tag-manager-delete:hover {
      color: var(--danger);
      background: var(--danger-soft);
    }

    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    /* Renewal Guide Modal */
    .renewal-guide-modal {
      max-width: 520px;
    }

    .renewal-steps {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 20px;
    }

    .renewal-step {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .renewal-step-number {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--brand-primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .renewal-step-content {
      flex: 1;
      padding-top: 2px;
    }

    .renewal-step-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .renewal-step-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .renewal-links {
      padding: 16px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
    }

    .renewal-links-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .renewal-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      color: var(--brand-primary);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
      transition: all 0.15s ease;
    }

    .renewal-link:last-child {
      margin-bottom: 0;
    }

    .renewal-link:hover {
      background: var(--bg-elevated);
      transform: translateX(4px);
    }

    .renewal-link svg {
      opacity: 0.7;
    }

    /* Coming Soon Modules */
    .module-coming-soon {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      color: var(--text-muted);
    }

    .module-coming-soon svg {
      width: 56px;
      height: 56px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .module-coming-soon h3 {
      font-size: 18px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    /* ===================
       DOCUMENTS MODULE
    =================== */
    .documents-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .document-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      animation: fadeInUp 0.4s ease backwards;
    }

    .document-card:nth-child(1) { animation-delay: 0.05s; }
    .document-card:nth-child(2) { animation-delay: 0.1s; }
    .document-card:nth-child(3) { animation-delay: 0.15s; }
    .document-card:nth-child(4) { animation-delay: 0.2s; }

    .document-card:hover {
      border-color: var(--border-strong);
      background: var(--bg-tertiary);
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }

    .document-card.expiring-soon {
      border-color: var(--warning);
      background: var(--warning-soft);
      animation: fadeInUp 0.4s ease backwards, pulse 3s ease infinite 1s;
    }

    .document-card.expired {
      border-color: var(--danger);
      background: var(--danger-soft);
      animation: fadeInUp 0.4s ease backwards, shake 0.5s ease 0.5s;
    }

    .doc-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .doc-icon {
      width: 48px;
      height: 48px;
      background: var(--bg-elevated);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      transition: transform 0.2s ease;
    }

    .document-card:hover .doc-icon {
      transform: scale(1.1) rotate(-5deg);
    }

    .doc-badges {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .doc-photo-badge {
      font-size: 14px;
      opacity: 0.7;
    }

    .doc-status {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: transform 0.2s ease;
    }

    .document-card:hover .doc-status {
      transform: scale(1.05);
    }

    .doc-status.valid {
      background: var(--success-soft);
      color: var(--success);
    }

    .doc-status.expiring {
      background: var(--warning-soft);
      color: var(--warning);
      animation: pulse 2s ease infinite;
    }

    .doc-status.expired {
      background: var(--danger-soft);
      color: var(--danger);
      animation: pulse 1.5s ease infinite;
    }

    .doc-photo-thumb {
      position: relative;
      margin: 12px 0;
      border-radius: var(--radius-md);
      overflow: hidden;
      cursor: pointer;
    }

    .doc-photo-thumb img {
      width: 100%;
      height: 80px;
      object-fit: cover;
      display: block;
    }

    .doc-photo-expand {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .doc-photo-thumb:hover .doc-photo-expand {
      opacity: 1;
    }

    .doc-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .doc-number {
      font-size: 13px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      margin-bottom: 12px;
    }

    .doc-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 12px;
    }

    .doc-dates {
      display: flex;
      gap: 20px;
    }

    .doc-date {
      flex: 1;
    }

    .doc-date-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .doc-date-value {
      font-size: 14px;
      font-weight: 500;
    }

    .doc-date-value.warning { color: var(--warning); }
    .doc-date-value.danger { color: var(--danger); }

    .doc-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .doc-action-btn {
      flex: 1;
      padding: 10px 14px;
      border: none;
      background: var(--bg-elevated);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.15s ease;
    }

    .doc-action-btn svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .doc-action-btn:hover {
      background: var(--brand-soft);
      color: var(--brand-primary);
    }

    .doc-action-btn.delete:hover {
      background: var(--danger-soft);
      color: var(--danger);
    }

    /* ===================
       MONTHLY RESET MODULE
    =================== */
    .reset-container {
      max-width: 800px;
    }

    /* Reset Flow Steps */
    .reset-flow-steps {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
    }

    .reset-flow-step {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .reset-flow-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--bg-tertiary);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      transition: all 0.3s ease;
    }

    .reset-flow-dot.active {
      background: var(--brand-primary);
      border-color: var(--brand-primary);
      color: white;
      transform: scale(1.1);
    }

    .reset-flow-dot.completed {
      background: var(--success);
      border-color: var(--success);
      color: white;
    }

    .reset-flow-dot.completed svg {
      width: 16px;
      height: 16px;
    }

    .reset-flow-line {
      width: 40px;
      height: 2px;
      background: var(--border);
      transition: background 0.3s ease;
    }

    .reset-flow-line.completed {
      background: var(--success);
    }

    /* Reset Step Content */
    .reset-step {
      animation: fadeInUp 0.4s ease;
    }

    .reset-step-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .reset-step-icon {
      width: 72px;
      height: 72px;
      background: var(--brand-gradient);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 32px;
    }

    .reset-step-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .reset-step-subtitle {
      font-size: 15px;
      color: var(--text-secondary);
    }

    /* State Summary in Reset */
    .reset-state-summary {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 24px;
      text-align: center;
    }

    .reset-state-header {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .reset-state-circles {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 16px;
    }

    .reset-state-circle {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .reset-state-count {
      font-size: 32px;
      font-weight: 700;
    }

    .reset-state-circle.green .reset-state-count { color: var(--success); }
    .reset-state-circle.yellow .reset-state-count { color: var(--warning); }
    .reset-state-circle.red .reset-state-count { color: var(--danger); }

    .reset-state-label {
      font-size: 12px;
      color: var(--text-muted);
    }

    .reset-state-streak {
      display: inline-block;
      padding: 8px 16px;
      background: var(--warning-soft);
      color: var(--warning);
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
    }

    /* State History Chart */
    .state-history-chart {
      margin-top: 20px;
      padding: 16px;
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
    }

    .state-history-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .state-history-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .state-history-dot {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      transition: transform 0.15s ease;
      cursor: default;
    }

    .state-history-dot:hover {
      transform: scale(1.3);
    }

    .state-history-dot.green {
      background: #22C55E;
    }

    .state-history-dot.yellow {
      background: #F59E0B;
    }

    .state-history-dot.red {
      background: #EF4444;
    }

    .state-history-dot.empty {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
    }

    .state-history-dot.today {
      box-shadow: 0 0 0 2px var(--bg-secondary), 0 0 0 4px var(--brand-primary);
    }

    .state-history-legend {
      display: flex;
      gap: 16px;
      margin-top: 12px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .state-history-legend span {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .state-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
    }

    .state-dot.green {
      background: #22C55E;
    }

    .state-dot.yellow {
      background: #F59E0B;
    }

    .state-dot.red {
      background: #EF4444;
    }

    .state-dot.empty {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
    }

    /* Mini State History (Home screen) */
    .mini-state-history {
      background: var(--bg-secondary);
      border-radius: 16px;
      padding: 16px;
      margin-top: 16px;
      border: 1px solid var(--border);
    }

    .mini-state-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .mini-state-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .mini-state-score {
      font-size: 12px;
      color: var(--text-muted);
    }

    .mini-state-dots {
      display: flex;
      justify-content: space-between;
    }

    .mini-state-day {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .mini-state-day.today .mini-state-dot {
      box-shadow: 0 0 0 2px var(--bg-secondary), 0 0 0 4px var(--brand-primary);
    }

    .mini-state-dot {
      width: 24px;
      height: 24px;
      border-radius: 6px;
    }

    .mini-state-dot.green {
      background: #22C55E;
    }

    .mini-state-dot.yellow {
      background: #F59E0B;
    }

    .mini-state-dot.red {
      background: #EF4444;
    }

    .mini-state-dot.empty {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
    }

    .mini-state-day-label {
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* Stats Summary Cards */
    .reset-stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .reset-stat-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      text-align: center;
      animation: fadeInUp 0.4s ease backwards;
    }

    .reset-stat-card:nth-child(1) { animation-delay: 0.1s; }
    .reset-stat-card:nth-child(2) { animation-delay: 0.15s; }
    .reset-stat-card:nth-child(3) { animation-delay: 0.2s; }

    .reset-stat-value {
      font-size: 36px;
      font-weight: 700;
      color: var(--brand-primary);
      margin-bottom: 4px;
    }

    .reset-stat-label {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* Celebration Animation */
    .reset-celebration {
      text-align: center;
      padding: 40px 20px;
    }

    .reset-celebration-emoji {
      font-size: 80px;
      animation: bounce 1s ease infinite;
      margin-bottom: 24px;
    }

    .reset-celebration h2 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .reset-celebration p {
      font-size: 16px;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    /* Momentum Reward Badge */
    .reset-momentum-reward {
      margin-bottom: 32px;
    }

    .reset-momentum-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%);
      border-radius: 24px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      animation: momentumPulse 2s ease infinite;
    }

    @keyframes momentumPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); }
      50% { transform: scale(1.05); box-shadow: 0 0 20px 5px rgba(245, 158, 11, 0.3); }
    }

    /* Control Score Circle */
    .reset-control-score {
      margin-bottom: 32px;
    }

    .reset-control-score-circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: conic-gradient(#22C55E var(--score-pct, 0%), #2A2A2A var(--score-pct, 0%));
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      position: relative;
    }

    .reset-control-score-circle::before {
      content: '';
      position: absolute;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: var(--bg-tertiary);
    }

    .reset-control-score-value {
      position: relative;
      font-size: 28px;
      font-weight: 700;
      color: #22C55E;
    }

    .reset-control-score-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .reset-control-score-detail {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* Pro CTA in Reset */
    .reset-pro-cta {
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.15) 0%, rgba(59, 130, 246, 0.15) 100%);
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 20px;
      padding: 24px;
      margin-top: 32px;
    }

    .reset-pro-header {
      margin-bottom: 12px;
    }

    .reset-pro-badge {
      display: inline-block;
      padding: 6px 14px;
      background: linear-gradient(135deg, #8B5CF6 0%, #3B82F6 100%);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      color: white;
      letter-spacing: 0.5px;
    }

    .reset-pro-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 16px;
    }

    .reset-pro-features {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }

    .reset-pro-feature {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .reset-pro-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #8B5CF6 0%, #3B82F6 100%);
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: var(--font-sans);
    }

    .reset-pro-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(139, 92, 246, 0.4);
    }

    .reset-pro-price {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 12px;
    }

    /* Reset Complete Overlay */
    .reset-complete-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(12px);
      z-index: 10001;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.3s ease;
    }

    .reset-complete-overlay.fade-out {
      animation: fadeOut 0.3s ease forwards;
    }

    .reset-complete-content {
      text-align: center;
      animation: resetCompletePop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes resetCompletePop {
      0% { transform: scale(0.5); opacity: 0; }
      60% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    .reset-complete-icon {
      font-size: 72px;
      margin-bottom: 20px;
    }

    .reset-complete-title {
      font-size: 24px;
      font-weight: 700;
      color: white;
      margin-bottom: 16px;
    }

    .reset-complete-momentum {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: rgba(245, 158, 11, 0.2);
      border-radius: 24px;
      font-size: 18px;
      font-weight: 600;
      color: #F59E0B;
    }

    /* Pro Upgrade Modal */
    .pro-upgrade-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px);
      z-index: 10002;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn 0.2s ease;
    }

    .pro-upgrade-modal {
      width: 100%;
      max-width: 400px;
      max-height: 90vh;
      overflow-y: auto;
      background: var(--bg-tertiary);
      border-radius: 24px;
      padding: 32px 24px;
      position: relative;
      animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .pro-upgrade-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.15s ease;
    }

    .pro-upgrade-close:hover {
      background: rgba(255, 255, 255, 0.15);
      color: var(--text-primary);
    }

    .pro-upgrade-close svg {
      width: 18px;
      height: 18px;
    }

    .pro-upgrade-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .pro-upgrade-badge {
      display: inline-block;
      padding: 8px 16px;
      background: linear-gradient(135deg, #8B5CF6 0%, #3B82F6 100%);
      border-radius: 20px;
      font-size: 14px;
      font-weight: 700;
      color: white;
      margin-bottom: 16px;
    }

    .pro-upgrade-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .pro-upgrade-subtitle {
      font-size: 15px;
      color: var(--text-secondary);
    }

    .pro-upgrade-features {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 28px;
    }

    .pro-upgrade-feature {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .pro-upgrade-feature-icon {
      font-size: 24px;
      flex-shrink: 0;
    }

    .pro-upgrade-feature-text {
      text-align: left;
    }

    .pro-upgrade-feature-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 2px;
    }

    .pro-upgrade-feature-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    .pro-upgrade-pricing {
      text-align: center;
      margin-bottom: 20px;
    }

    .pro-upgrade-price-main {
      font-size: 36px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .pro-upgrade-price-main span {
      font-size: 16px;
      font-weight: 400;
      color: var(--text-secondary);
    }

    .pro-upgrade-price-annual {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .pro-upgrade-cta {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #8B5CF6 0%, #3B82F6 100%);
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: var(--font-sans);
    }

    .pro-upgrade-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(139, 92, 246, 0.4);
    }

    .pro-upgrade-guarantee {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 12px;
    }

    .pro-upgrade-skip {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: none;
      font-size: 14px;
      color: var(--text-muted);
      cursor: pointer;
      margin-top: 16px;
      font-family: var(--font-sans);
      transition: color 0.15s ease;
    }

    .pro-upgrade-skip:hover {
      color: var(--text-secondary);
    }

    /* Pro Gate Modal (simpler than full upgrade) */
    .pro-gate-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      z-index: 10005;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn 0.15s ease;
    }

    .pro-gate-modal {
      background: var(--bg-secondary);
      border-radius: 24px;
      padding: 32px 28px;
      max-width: 340px;
      width: 100%;
      text-align: center;
      border: 1px solid var(--border);
      animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .pro-gate-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .pro-gate-badge {
      display: inline-block;
      padding: 6px 14px;
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(59, 130, 246, 0.2));
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      color: #A78BFA;
      margin-bottom: 16px;
    }

    .pro-gate-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .pro-gate-description {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 20px;
    }

    .pro-gate-limit {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: var(--bg-tertiary);
      border-radius: 12px;
      margin-bottom: 24px;
    }

    .pro-gate-limit-label {
      font-size: 13px;
      color: var(--text-muted);
    }

    .pro-gate-limit-value {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .pro-gate-upgrade-btn {
      width: 100%;
      padding: 14px 20px;
      background: linear-gradient(135deg, #8B5CF6 0%, #3B82F6 100%);
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      font-family: var(--font-sans);
      transition: all 0.15s ease;
    }

    .pro-gate-upgrade-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
    }

    .pro-gate-close-btn {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: none;
      font-size: 14px;
      color: var(--text-muted);
      cursor: pointer;
      margin-top: 12px;
      font-family: var(--font-sans);
    }

    .pro-gate-close-btn:hover {
      color: var(--text-secondary);
    }

    /* Pro Badge for locked features */
    .pro-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(59, 130, 246, 0.15));
      border: 1px solid rgba(139, 92, 246, 0.25);
      border-radius: 6px;
      font-size: 10px;
      font-weight: 600;
      color: #A78BFA;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .pro-badge::before {
      content: '✨';
      font-size: 10px;
    }

    /* Navigation Buttons */
    .reset-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .reset-nav-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
    }

    .reset-nav-btn.secondary {
      background: var(--bg-tertiary);
      color: var(--text-secondary);
    }

    .reset-nav-btn.secondary:hover {
      background: var(--bg-elevated);
      color: var(--text-primary);
    }

    .reset-nav-btn.primary {
      background: var(--brand-primary);
      color: white;
    }

    .reset-nav-btn.primary:hover {
      background: var(--brand-primary-dark);
      transform: translateX(4px);
    }

    .reset-nav-btn svg {
      width: 18px;
      height: 18px;
    }

    /* Quick Add Row */
    .reset-quick-add {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .reset-quick-add input {
      flex: 1;
    }

    .reset-quick-add button {
      flex-shrink: 0;
    }

    .reset-quick-add button svg {
      width: 16px;
      height: 16px;
    }

    .reset-header-card {
      background: linear-gradient(135deg, var(--brand-primary), var(--brand-primary-dark));
      border-radius: var(--radius-xl);
      padding: 32px;
      margin-bottom: 28px;
      position: relative;
      overflow: hidden;
    }

    .reset-header-card::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 300px;
      height: 300px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
    }

    .reset-month {
      font-size: 14px;
      font-weight: 500;
      opacity: 0.8;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .reset-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .reset-subtitle {
      font-size: 15px;
      opacity: 0.9;
    }

    .reset-progress {
      margin-top: 24px;
    }

    .reset-progress-bar {
      height: 8px;
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
      overflow: hidden;
    }

    .reset-progress-fill {
      height: 100%;
      background: white;
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .reset-progress-text {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 13px;
      opacity: 0.9;
    }

    .reset-section {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      margin-bottom: 20px;
      overflow: hidden;
    }

    .reset-section-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .reset-section-title {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 16px;
      font-weight: 600;
    }

    .reset-section-icon {
      width: 36px;
      height: 36px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .reset-section-body {
      padding: 20px;
    }

    .accomplishment-list, .goal-list, .upcoming-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .accomplishment-item, .goal-item, .upcoming-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
      transition: all 0.15s ease;
    }

    .accomplishment-item:hover, .goal-item:hover {
      background: var(--bg-elevated);
    }

    .item-checkbox {
      width: 22px;
      height: 22px;
      border: 2px solid var(--border-strong);
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }

    .item-checkbox:hover {
      border-color: var(--brand-primary);
    }

    .item-checkbox.checked {
      background: var(--success);
      border-color: var(--success);
    }

    .item-checkbox.checked svg {
      color: white;
      width: 14px;
      height: 14px;
    }

    .item-content {
      flex: 1;
    }

    .item-text {
      font-size: 14px;
      font-weight: 500;
    }

    .item-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .item-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 12px;
      text-transform: uppercase;
    }

    .item-badge.subscription { background: var(--info-soft); color: var(--info); }
    .item-badge.document { background: var(--warning-soft); color: var(--warning); }
    .item-badge.goal { background: var(--success-soft); color: var(--success); }

    .upcoming-item {
      cursor: default;
    }

    .upcoming-icon {
      width: 36px;
      height: 36px;
      background: var(--bg-elevated);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .add-item-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 2px dashed var(--border-strong);
      border-radius: var(--radius-md);
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .add-item-btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .add-item-btn:hover {
      border-color: var(--brand-primary);
      color: var(--brand-primary);
      background: var(--brand-soft);
    }

    .inline-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-size: 14px;
      font-family: var(--font-sans);
      outline: none;
    }

    .inline-input::placeholder {
      color: var(--text-muted);
    }

    /* ===================
       TASKS MODULE
    =================== */
    .tasks-layout {
      display: flex;
      gap: 24px;
      height: 100%;
    }

    .tasks-sidebar {
      width: 200px;
      flex-shrink: 0;
    }

    .tasks-main {
      flex: 1;
      min-width: 0;
    }

    .task-filters {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .task-filter {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: var(--radius-md);
      font-size: 14px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s ease;
      position: relative;
    }

    .task-filter:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    .task-filter.active {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      font-weight: 600;
    }

    .task-filter.active::after {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 60%;
      background: var(--brand-primary);
      border-radius: 0 2px 2px 0;
    }

    .task-filter-icon {
      width: 18px;
      height: 18px;
      opacity: 0.7;
    }

    .task-filter.active .task-filter-icon {
      opacity: 1;
      color: var(--brand-primary);
    }

    .task-filter-count {
      margin-left: auto;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .task-filter.active .task-filter-count {
      color: var(--text-secondary);
    }

    .tasks-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      animation: fadeInUp 0.4s ease backwards;
    }

    .task-item:nth-child(1) { animation-delay: 0.05s; }
    .task-item:nth-child(2) { animation-delay: 0.1s; }
    .task-item:nth-child(3) { animation-delay: 0.15s; }
    .task-item:nth-child(4) { animation-delay: 0.2s; }
    .task-item:nth-child(5) { animation-delay: 0.25s; }
    .task-item:nth-child(6) { animation-delay: 0.3s; }

    .task-item:hover {
      border-color: var(--border-strong);
      background: var(--bg-tertiary);
      transform: translateX(4px);
    }

    .task-item.completed {
      opacity: 0.6;
    }

    .task-item.completing {
      animation: taskComplete 0.5s ease forwards;
    }

    @keyframes taskComplete {
      0% { transform: scale(1); }
      30% { transform: scale(1.02); }
      100% { transform: scale(1); opacity: 0.6; }
    }

    .task-item.completed .task-title {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .task-checkbox {
      width: 22px;
      height: 22px;
      border: 2px solid var(--border-strong);
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      flex-shrink: 0;
      margin-top: 2px;
    }

    .task-checkbox:hover {
      border-color: var(--brand-primary);
      transform: scale(1.1);
    }

    .task-checkbox:active {
      transform: scale(0.9);
    }

    .task-checkbox.checked {
      background: var(--success);
      border-color: var(--success);
      animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .task-checkbox.checked svg {
      color: white;
      width: 14px;
      height: 14px;
    }

    .task-content {
      flex: 1;
      min-width: 0;
    }

    .task-title {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text-primary);
    }

    .task-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .task-category {
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 6px;
      background: var(--bg-elevated);
      color: var(--text-secondary);
    }

    .task-due {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .task-due.overdue {
      color: var(--danger);
    }

    .task-due.today {
      color: var(--warning);
    }

    .task-due.upcoming {
      color: var(--text-secondary);
    }

    .task-due svg {
      width: 12px;
      height: 12px;
    }

    .task-recurrence {
      font-size: 12px;
      opacity: 0.7;
    }

    .task-repeat {
      font-size: 11px;
      color: var(--info);
      background: var(--info-soft);
      padding: 2px 6px;
      border-radius: 4px;
    }

    .task-priority {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .task-priority.high {
      background: var(--danger);
    }

    .task-priority.medium {
      background: var(--warning);
    }

    .task-priority.low {
      background: var(--success);
    }

    .task-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .task-item:hover .task-actions {
      opacity: 1;
    }

    .task-action-btn {
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      transition: all 0.15s ease;
    }

    .task-action-btn:hover {
      background: var(--bg-elevated);
      color: var(--text-primary);
    }

    .task-action-btn.delete:hover {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .task-action-btn svg {
      width: 14px;
      height: 14px;
    }

    .add-task-inline {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--bg-secondary);
      border: 2px dashed var(--border-strong);
      border-radius: var(--radius-lg);
    }

    .add-task-inline .task-checkbox {
      opacity: 0.4;
    }

    .add-task-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-size: 14px;
      font-family: var(--font-sans);
      outline: none;
    }

    .add-task-input::placeholder {
      color: var(--text-muted);
    }

    .tasks-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .tasks-empty svg {
      width: 48px;
      height: 48px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .tasks-empty h3 {
      font-size: 16px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .task-section-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      margin-top: 24px;
    }

    .task-section-title:first-child {
      margin-top: 0;
    }

    /* ===================
       CALENDAR MODULE
    =================== */
    .calendar-container {
      display: flex;
      gap: 24px;
      height: 100%;
    }

    .calendar-main {
      flex: 1;
      min-width: 0;
    }

    .calendar-sidebar {
      width: 300px;
      flex-shrink: 0;
    }

    .calendar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .calendar-nav {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .calendar-nav-btn {
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      transition: all 0.15s ease;
    }

    .calendar-nav-btn:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border-color: var(--border-strong);
    }

    .calendar-nav-btn svg {
      width: 18px;
      height: 18px;
    }

    .calendar-month-title {
      font-size: 20px;
      font-weight: 600;
      min-width: 180px;
      text-align: center;
    }

    .calendar-today-btn {
      padding: 8px 16px;
      font-size: 13px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .calendar-today-btn:hover {
      background: var(--brand-soft);
      color: var(--brand-primary);
      border-color: var(--brand-primary);
    }

    .calendar-view-toggle {
      display: flex;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .calendar-view-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      font-size: 13px;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: var(--font-sans);
    }

    .calendar-view-btn svg {
      width: 14px;
      height: 14px;
    }

    .calendar-view-btn:hover {
      color: var(--text-primary);
    }

    .calendar-view-btn.active {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    .calendar-grid {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .calendar-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border);
    }

    .calendar-weekday {
      padding: 12px;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .calendar-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .calendar-day {
      min-height: 100px;
      padding: 8px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: var(--bg-secondary);
      transition: background 0.15s ease;
    }

    .calendar-day:nth-child(7n) {
      border-right: none;
    }

    .calendar-day:hover {
      background: var(--bg-tertiary);
    }

    .calendar-day.other-month {
      background: var(--bg-primary);
      opacity: 0.5;
    }

    .calendar-day.today {
      background: var(--brand-soft);
    }

    .calendar-day-number {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .calendar-day.today .calendar-day-number {
      color: var(--brand-primary);
      font-weight: 700;
    }

    .calendar-events {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .calendar-event {
      font-size: 11px;
      padding: 3px 6px;
      border-radius: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .calendar-event:hover {
      transform: scale(1.02);
    }

    .calendar-event.task {
      background: var(--brand-soft);
      color: var(--brand-primary);
      border-left: 2px solid var(--brand-primary);
    }

    .calendar-event.task.completed {
      opacity: 0.5;
      text-decoration: line-through;
    }

    .calendar-event.subscription {
      background: rgba(139, 92, 246, 0.15);
      color: rgb(139, 92, 246);
      border-left: 2px solid rgb(139, 92, 246);
    }

    .calendar-event.document {
      background: var(--warning-soft);
      color: var(--warning);
      border-left: 2px solid var(--warning);
    }

    .calendar-event.more {
      background: var(--bg-tertiary);
      color: var(--text-muted);
      text-align: center;
      font-weight: 500;
    }

    .calendar-day-add {
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--bg-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .calendar-day-add svg {
      width: 12px;
      height: 12px;
      color: var(--text-muted);
    }

    .calendar-day:hover .calendar-day-add {
      opacity: 1;
    }

    .calendar-day-add:hover {
      background: var(--brand-primary);
    }

    .calendar-day-add:hover svg {
      color: white;
    }

    .calendar-day {
      position: relative;
    }

    /* Calendar Quick Add Modal */
    .calendar-quick-add {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 24px;
      width: 90%;
      max-width: 400px;
      z-index: 1001;
      animation: modalSlideIn 0.3s ease;
    }

    .calendar-quick-add-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .calendar-quick-add-date {
      font-size: 14px;
      color: var(--text-muted);
    }

    .calendar-quick-add-title {
      font-size: 18px;
      font-weight: 600;
    }

    .calendar-quick-add-options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .calendar-quick-add-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .calendar-quick-add-option:hover {
      background: var(--bg-elevated);
      border-color: var(--border-strong);
      transform: translateX(4px);
    }

    .calendar-quick-add-option-icon {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .calendar-quick-add-option-icon.task {
      background: var(--brand-soft);
      color: var(--brand-primary);
    }

    .calendar-quick-add-option-icon.subscription {
      background: rgba(139, 92, 246, 0.15);
      color: #8B5CF6;
    }

    .calendar-quick-add-option-icon.document {
      background: rgba(245, 158, 11, 0.15);
      color: #F5A623;
    }

    .calendar-quick-add-option-text h4 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .calendar-quick-add-option-text p {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Calendar Event Details Modal */
    .calendar-event-modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      width: 90%;
      max-width: 420px;
      animation: modalSlideIn 0.25s ease;
      overflow: hidden;
    }

    .calendar-event-modal-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-tertiary);
    }

    .calendar-event-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-md);
      background: var(--brand-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .calendar-event-title-wrap {
      flex: 1;
    }

    .calendar-event-modal-title {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .calendar-event-modal-type {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .calendar-event-modal-body {
      padding: 20px;
    }

    .event-detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .event-detail-row:last-child {
      border-bottom: none;
    }

    .event-detail-row.highlight {
      background: var(--bg-tertiary);
      margin: -20px -20px 0 -20px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .event-detail-label {
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .event-detail-label svg {
      width: 14px;
      height: 14px;
    }

    .event-detail-value {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .event-detail-value.completed {
      color: var(--success);
    }

    .event-detail-value.priority-high {
      color: var(--danger);
    }

    .event-detail-value.priority-medium {
      color: var(--warning);
    }

    .event-detail-value.priority-low {
      color: var(--success);
    }

    .calendar-event-modal-footer {
      display: flex;
      gap: 12px;
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg-primary);
    }

    .calendar-event-modal-footer .btn {
      flex: 1;
    }

    /* Quick Expense Modal */
    .quick-expense-modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      width: 90%;
      max-width: 400px;
      animation: modalSlideIn 0.25s ease;
      overflow: hidden;
    }

    @media (max-width: 480px) {
      .quick-expense-modal {
        width: 100%;
        max-width: 100%;
        border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        max-height: 85vh;
        overflow-y: auto;
      }
      
      .quick-expense-shortcuts {
        overflow-x: auto;
        flex-wrap: nowrap;
        padding-bottom: 8px;
        -webkit-overflow-scrolling: touch;
      }
      
      .quick-expense-shortcut {
        flex-shrink: 0;
      }
    }

    .quick-expense-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }

    .quick-expense-header h3 {
      font-size: 18px;
      font-weight: 600;
    }

    .quick-expense-body {
      padding: 20px;
    }

    .quick-expense-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .quick-expense-stat {
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
      padding: 12px;
      text-align: center;
    }

    .quick-expense-stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .quick-expense-stat-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .quick-expense-form {
      margin-bottom: 20px;
    }

    .quick-expense-shortcuts {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .quick-expense-shortcut {
      padding: 8px 12px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .quick-expense-shortcut:hover {
      background: var(--brand-soft);
      border-color: var(--brand-primary);
      color: var(--brand-primary);
    }

    .expense-amount-input {
      position: relative;
    }

    .expense-currency {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .expense-amount-input .form-input {
      padding-left: 32px;
      font-size: 24px;
      font-weight: 600;
    }

    .quick-expense-recent {
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }

    .quick-expense-recent-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .quick-expense-recent-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .quick-expense-recent-item:last-child {
      border-bottom: none;
    }

    .quick-expense-recent-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .quick-expense-recent-desc {
      font-size: 14px;
      color: var(--text-primary);
    }

    .quick-expense-recent-date {
      font-size: 12px;
      color: var(--text-muted);
    }

    .quick-expense-recent-amount {
      font-size: 14px;
      font-weight: 600;
      color: var(--danger);
    }

    .quick-expense-footer {
      display: flex;
      gap: 12px;
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg-primary);
    }

    .quick-expense-footer .btn {
      flex: 1;
    }

    .calendar-agenda {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .agenda-day {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .agenda-day-header {
      padding: 12px 16px;
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .agenda-day-date {
      font-size: 24px;
      font-weight: 700;
      color: var(--brand-primary);
      width: 40px;
    }

    .agenda-day-info {
      flex: 1;
    }

    .agenda-day-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .agenda-day-full {
      font-size: 12px;
      color: var(--text-muted);
    }

    .agenda-day.today .agenda-day-header {
      background: var(--brand-soft);
    }

    .agenda-events {
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .agenda-event {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--bg-primary);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .agenda-event:hover {
      background: var(--bg-tertiary);
    }

    .agenda-event-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .agenda-event-icon.task {
      background: var(--brand-soft);
    }

    .agenda-event-icon.subscription {
      background: rgba(139, 92, 246, 0.15);
    }

    .agenda-event-icon.document {
      background: var(--warning-soft);
    }

    .agenda-event-content {
      flex: 1;
      min-width: 0;
    }

    .agenda-event-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .agenda-event-meta {
      font-size: 12px;
      color: var(--text-muted);
    }

    .agenda-event-type {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      font-weight: 500;
    }

    .agenda-event-type.task {
      background: var(--brand-soft);
      color: var(--brand-primary);
    }

    .agenda-event-type.subscription {
      background: rgba(139, 92, 246, 0.15);
      color: rgb(139, 92, 246);
    }

    .agenda-event-type.document {
      background: var(--warning-soft);
      color: var(--warning);
    }

    .agenda-empty {
      padding: 20px 16px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .agenda-empty-icon {
      font-size: 20px;
      opacity: 0.6;
    }

    .agenda-empty-text {
      font-size: 12px;
    }

    .calendar-upcoming {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .calendar-upcoming-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      font-weight: 600;
    }

    .calendar-upcoming-list {
      max-height: 400px;
      overflow-y: auto;
    }

    .calendar-upcoming-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s ease;
    }

    .calendar-upcoming-item:last-child {
      border-bottom: none;
    }

    .calendar-upcoming-item:hover {
      background: var(--bg-tertiary);
    }

    .calendar-upcoming-icon {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .calendar-upcoming-content {
      flex: 1;
      min-width: 0;
    }

    .calendar-upcoming-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .calendar-upcoming-date {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ===================
       HABITS MODULE
    =================== */
    
    /* Habit Heatmap */
    .habit-heatmap-section {
      margin-bottom: 24px;
      animation: fadeInUp 0.5s ease 0.1s backwards;
    }

    .habit-heatmap-container {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
    }

    .habit-heatmap-months {
      display: flex;
      justify-content: space-around;
      margin-bottom: 8px;
      padding-left: 36px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .habit-heatmap-grid {
      display: flex;
      gap: 8px;
    }

    .habit-heatmap-days {
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      font-size: 10px;
      color: var(--text-muted);
      width: 28px;
      padding: 2px 0;
    }

    .habit-heatmap-cells {
      display: grid;
      grid-template-rows: repeat(7, 1fr);
      grid-auto-flow: column;
      gap: 3px;
      flex: 1;
    }

    .habit-heatmap-cell {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      background: var(--bg-tertiary);
      transition: all 0.15s ease;
    }

    .habit-heatmap-cell:hover {
      transform: scale(1.3);
      outline: 2px solid var(--brand-primary);
      outline-offset: 1px;
    }
