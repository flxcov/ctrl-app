    function generateMorningBriefing() {
      const now = new Date();
      const hour = now.getHours();
      const todayISO = now.toISOString().split('T')[0];
      
      // Only show between 6-10 AM
      if (hour < 6 || hour > 10) return null;
      
      // Check if already shown today
      const existingBriefing = state.notifications.find(n => 
        n.type === 'morning_briefing' && n.timestamp.startsWith(todayISO)
      );
      if (existingBriefing) return null;
      
      const tasks = state.tasks || [];
      const habits = state.habits || [];
      const subs = state.subscriptions || [];
      const docs = state.documents || [];
      
      const todayTasks = tasks.filter(t => !t.completed && t.due_date === todayISO);
      const overdueTasks = tasks.filter(t => !t.completed && t.due_date && t.due_date < todayISO);
      const todayHabits = habits.filter(h => !(h.completions || []).includes(todayISO));
      const todayBills = subs.filter(s => s.next_bill === todayISO);
      const expiringDocs = docs.filter(d => {
        const days = getDaysUntil(d.expiry_date || d.expiryDate);
        return days >= 0 && days <= 7;
      });
      
      const lines = [];
      if (todayTasks.length > 0) lines.push(`📋 ${todayTasks.length} task${todayTasks.length > 1 ? 's' : ''} due today`);
      if (overdueTasks.length > 0) lines.push(`⚠️ ${overdueTasks.length} overdue task${overdueTasks.length > 1 ? 's' : ''}`);
      if (todayHabits.length > 0) lines.push(`✨ ${todayHabits.length} habit${todayHabits.length > 1 ? 's' : ''} to complete`);
      if (todayBills.length > 0) lines.push(`💳 ${todayBills.length} bill${todayBills.length > 1 ? 's' : ''} due`);
      if (expiringDocs.length > 0) lines.push(`📄 ${expiringDocs.length} document${expiringDocs.length > 1 ? 's' : ''} expiring soon`);
      
      if (lines.length === 0) {
        return {
          type: 'morning_briefing',
          icon: '☀️',
          title: 'Good morning! Your day is clear.',
          body: 'No urgent tasks or bills today. Enjoy your day!',
          celebratory: true
        };
      }
      
      return {
        type: 'morning_briefing',
        icon: '☀️',
        title: `Good morning! Here's your day:`,
        body: lines.join('\n'),
        actions: [
          { label: 'View details', action: 'navigate', data: 'home' }
        ]
      };
    }

    // Main smart notification check
    function checkForNotifications() {
      const today = new Date();
      const todayISO = today.toISOString().split('T')[0];
      
      // Helper to check if a notification type is enabled
      const isEnabled = (key) => localStorage.getItem(key) !== 'false';
      
      // === MORNING BRIEFING ===
      if (isEnabled('ctrl_morning_briefing')) {
        const briefing = generateMorningBriefing();
        if (briefing) {
          addNotification(briefing);
        }
      }
      
      // === WEEKLY REVIEW (Sunday evenings) ===
      if (isEnabled('ctrl_morning_briefing')) { // Uses same setting as morning briefing
        const weeklyReview = generateWeeklyReview();
        if (weeklyReview) {
          addNotification(weeklyReview);
        }
      }
      
      // === HABIT TIME-BASED REMINDERS ===
      if (isEnabled('ctrl_habit_checkins')) {
        checkHabitTimeReminders();
      }
      
      // === SMART DOCUMENT NOTIFICATIONS ===
      if (isEnabled('ctrl_doc_reminders')) {
        (state.documents || []).forEach(doc => {
          const guide = getDocumentRenewalGuide(doc);
          if (guide) {
            // Check if we already have a notification for this document at this checkpoint
            const existing = state.notifications.find(n => 
              n.type === 'document_smart' && 
              n.relatedId === doc.id && 
              n.body.includes(guide.days + ' day')
            );
            
            if (!existing) {
              addNotification({
                type: 'document_smart',
                icon: doc.icon || '📄',
                title: guide.title,
                body: guide.body,
                tips: guide.tips,
                actions: guide.actions,
                urgent: guide.urgent,
                action: 'documents',
                relatedId: doc.id
              });
            }
          }
        });
      }
      
      // === SUBSCRIPTION NOTIFICATIONS ===
      if (isEnabled('ctrl_bill_reminders')) {
        (state.subscriptions || []).forEach(sub => {
          const days = getDaysUntil(sub.next_bill);
          if (days === 1 || days === 0) {
            const existing = state.notifications.find(n => 
              n.type === 'bill' && n.relatedId === sub.id && n.timestamp.startsWith(todayISO)
            );
            if (!existing) {
              addNotification({
                type: 'bill',
                icon: sub.icon || '💳',
                title: `${sub.name} payment ${days === 0 ? 'today' : 'tomorrow'}`,
                body: `$${(sub.price || 0).toFixed(2)} will be charged ${days === 0 ? 'today' : 'tomorrow'}.`,
                action: 'subscriptions',
                relatedId: sub.id,
                actions: [
                  { label: 'View details', action: 'navigate', data: 'subscriptions' }
                ]
            });
          }
        }
      });
      }
      
      // === SPENDING INSIGHTS (weekly check) ===
      if (isEnabled('ctrl_spending_insights')) {
        const dayOfWeek = today.getDay();
        if (dayOfWeek === 0) { // Sunday
          const lastSpendingInsight = state.notifications.find(n => 
            n.type === 'spending' && n.timestamp.startsWith(todayISO)
          );
          if (!lastSpendingInsight) {
            const spendingInsights = generateSpendingInsights();
            spendingInsights.forEach(insight => addNotification(insight));
          }
        }
      }
      
      // === HABIT COACHING ===
      if (isEnabled('ctrl_streak_celebrations') || isEnabled('ctrl_habit_checkins')) {
        const habitCoaching = generateHabitCoaching();
        habitCoaching.forEach(coaching => {
          // Filter based on notification type
          if (coaching.type === 'habit_milestone' && !isEnabled('ctrl_streak_celebrations')) return;
          if ((coaching.type === 'habit_reminder' || coaching.type === 'habit_broken') && !isEnabled('ctrl_habit_checkins')) return;
          
          const existing = state.notifications.find(n => 
            n.type === coaching.type && 
            n.relatedId === coaching.relatedId &&
            n.timestamp.startsWith(todayISO)
          );
          if (!existing) {
            addNotification(coaching);
          }
        });
      }
      
      // === TASK INSIGHTS ===
      if (isEnabled('ctrl_task_reminders')) {
        const taskInsights = generateTaskInsights();
        taskInsights.forEach(insight => {
          const existing = state.notifications.find(n => 
            n.type === 'task_insight' && n.timestamp.startsWith(todayISO)
          );
          if (!existing) {
            addNotification(insight);
          }
        });
        
        // === OVERDUE TASK NOTIFICATIONS ===
        (state.tasks || []).forEach(task => {
          if (!task.completed && task.due_date && task.due_date < todayISO) {
            const existing = state.notifications.find(n => 
              n.type === 'task' && n.relatedId === task.id
            );
            if (!existing) {
              addNotification({
                type: 'task',
                icon: '⚠️',
                title: `Overdue: ${task.title}`,
                body: `Was due on ${formatDate(task.due_date)}.`,
                action: 'tasks',
                relatedId: task.id,
                actions: [
                  { label: 'Complete', action: 'completeTask', data: task.id },
                  { label: 'Reschedule', action: 'navigate', data: 'tasks' }
                ]
              });
            }
          }
        });
      }
    }

    // Handle smart notification actions
    function handleNotificationAction(notifId, actionType, actionData) {
      markNotificationRead(notifId);
      
      switch (actionType) {
        case 'navigate':
          state.activeModule = actionData;
          state.showNotificationCenter = false;
          break;
        case 'filterTasks':
          state.activeModule = 'tasks';
          state.taskFilter = actionData;
          state.showNotificationCenter = false;
          break;
        case 'completeHabit':
          toggleHabit(parseInt(actionData));
          dismissNotification(notifId);
          break;
        case 'completeTask':
          toggleTask(parseInt(actionData));
          dismissNotification(notifId);
          break;
        case 'createTask':
          state.activeModule = 'tasks';
          state.showModal = true;
          state.modalType = 'task';
          state.showNotificationCenter = false;
          // Pre-fill task title
          setTimeout(() => {
            const titleInput = document.getElementById('taskTitle');
            if (titleInput) titleInput.value = actionData;
          }, 100);
          break;
        case 'showRenewalGuide':
          showRenewalGuideModal(actionData);
          break;
        case 'openUrl':
          window.open(actionData, '_blank');
          break;
        case 'dismiss':
          dismissNotification(notifId);
          break;
      }
      render();
    }

    // =================== HABIT CHECK-IN ===================
    function triggerHabitCheckin() {
      const today = new Date().toISOString().split('T')[0];
      const habits = state.habits || [];
      
      // Find habits not completed today
      const incompleteHabits = habits.filter(h => {
        const completions = h.completions || [];
        return !completions.includes(today);
      });
      
      if (incompleteHabits.length > 0) {
        // Pick a random habit to check in on
        const randomHabit = incompleteHabits[Math.floor(Math.random() * incompleteHabits.length)];
        state.currentCheckinHabit = randomHabit;
        state.showHabitCheckin = true;
        render();
      }
    }

    function handleHabitCheckinResponse(completed) {
      const habit = state.currentCheckinHabit;
      if (habit && completed) {
        toggleHabit(habit.id);
        addNotification({
          type: 'habit',
          icon: habit.icon || '✓',
          title: `${habit.name} completed!`,
          body: `Great job! Your streak is now ${(habit.streak || 0) + 1} days.`,
          action: 'habits',
          relatedId: habit.id
        });
      }
      closeHabitCheckin();
    }

    function closeHabitCheckin() {
      state.showHabitCheckin = false;
      state.currentCheckinHabit = null;
      render();
    }

    function skipHabitCheckin() {
      closeHabitCheckin();
    }

    function renderHabitCheckin() {
      const habit = state.currentCheckinHabit;

      setInterval(() => {

        if (hour >= 9 && hour <= 21) {
          // 30% chance to trigger a check-in
          if (Math.random() < 0.3) {
            triggerHabitCheckin();
          }
        }
      }, 2 * 60 * 60 * 1000); // 2 hours
      
      // Also check on app load (with a delay)
      setTimeout(() => {

        if (hour >= 9 && hour <= 21 && Math.random() < 0.5) {
          triggerHabitCheckin();
        }
      }, 5000);

    function setupChat() {

    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const content = input.value.trim();
      if (!content || state.isLoading) return;
      
      // Check Ada message limits for free users
      if (!canAccessProFeature('ada-unlimited')) {
        showProGate('ada-unlimited');
        return;
      }
      
      // Track Ada messages today (for free tier limit)
      if (!state.isProUser) {
        const today = new Date().toISOString().split('T')[0];
        const lastAdaDate = localStorage.getItem('ctrl_ada_date');
        let adaCount = parseInt(localStorage.getItem('ctrl_ada_messages_today') || '0');
        
        if (lastAdaDate !== today) {
          adaCount = 0;
          localStorage.setItem('ctrl_ada_date', today);
        }
        
        adaCount++;
        localStorage.setItem('ctrl_ada_messages_today', adaCount.toString());
      }

      state.messages.push({ role: 'user', content });
      input.value = '';
      input.style.height = 'auto';
      state.isLoading = true;
      render();

      try {
        // Build context-aware system prompt
        const systemPrompt = buildAdaSystemPrompt();
        
        // Build messages array
        const apiMessages = state.messages.map(m => ({ 
          role: m.role, 
          content: m.content 
        }));
        
        // Create a timeout promise
        const timeoutPromise = new Promise((_, reject) => {
          setTimeout(() => reject(new Error('Request timeout after 20 seconds')), 20000);
        });
        
        // Determine the API endpoint:
        // - On Netlify: use /api/ada (proxied to serverless function)
        // - In Claude.ai artifacts: use direct API (has built-in auth)
        // - Locally: will fail and use fallback
        const isNetlify = window.location.hostname.includes('netlify') || 
                          window.location.hostname.includes('.app') ||
                          (window.location.hostname !== 'localhost' && 
                           !window.location.hostname.includes('claude.ai') &&
                           window.location.protocol === 'https:');
        
        const apiEndpoint = isNetlify 
          ? '/api/ada' 
          : 'https://api.anthropic.com/v1/messages';
        
        // Race between fetch and timeout
        const response = await Promise.race([
          fetch(apiEndpoint, {
            method: 'POST',
            headers: { 
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              model: 'claude-sonnet-4-20250514',
              max_tokens: 1024,
              system: systemPrompt,
              messages: apiMessages
            })
          }),
          timeoutPromise
        ]);

        const data = await response.json();
        
        // Check for error response from our function
        if (data.error) {
          throw new Error(data.error);
        }
        
        // Extract text from response
        let assistantContent = '';
        
        if (data && data.content) {
          for (const block of data.content) {
            if (block.type === 'text' && block.text) {
              assistantContent += block.text;
            }
          }
        }

        if (!assistantContent && data && data.error) {
          throw new Error(data.error.message || JSON.stringify(data.error));
        }

        state.messages.push({ 
          role: 'assistant', 
          content: assistantContent || 'I had trouble generating a response. Please try again!'
        });
        
        // Track Ada usage for account prompt
        trackAdaUsage();
        
      } catch (error) {
        // Provide intelligent fallback response based on the question
        const fallbackResponse = getAdaFallbackResponse(content);
        
        // Add a note about the connection issue (helps debugging)
        const errorNote = error.message.includes('timeout') 
          ? '\n\n---\n*Ada is taking longer than usual. The above is offline guidance - try asking again!*'
          : '\n\n---\n*Ada had a connection hiccup. The above is offline guidance based on your question.*';
        
        state.messages.push({ 
          role: 'assistant', 
          content: fallbackResponse + errorNote
        });
      }

      state.isLoading = false;
      render();
    }

    // =================== CROSS-MODULE LINKING ===================
    // Detect linked items across modules based on text matching
    function findLinkedItems(text) {
      if (!text) return [];
      const textLower = text.toLowerCase();
      const links = [];
      
      // Check subscriptions
      (state.subscriptions || []).forEach(sub => {
        const nameLower = (sub.name || '').toLowerCase();
        if (nameLower && nameLower.length > 2 && textLower.includes(nameLower)) {
          links.push({
            type: 'subscription',
            id: sub.id,
            name: sub.name,
            icon: sub.icon || '📦',
            detail: `$${sub.price}/${sub.cycle === 'monthly' ? 'mo' : sub.cycle === 'yearly' ? 'yr' : sub.cycle}`,
            item: sub
          });
        }
      });
      
      // Check documents
      (state.documents || []).forEach(doc => {
        const nameLower = (doc.name || '').toLowerCase();
        // Also check common variations
        const variations = [nameLower];
        if (nameLower.includes('license')) variations.push('licence', 'dmv');
        if (nameLower.includes('passport')) variations.push('travel');
        
        const matches = variations.some(v => v.length > 2 && textLower.includes(v)) || 
                       (nameLower.length > 3 && textLower.includes(nameLower));
        
        if (matches) {
          const daysUntil = getDaysUntil(doc.expiry_date || doc.expiryDate);
          let status = 'Valid';
          if (daysUntil <= 0) status = 'Expired';
          else if (daysUntil <= 90) status = `${daysUntil}d left`;
          
          links.push({
            type: 'document',
            id: doc.id,
            name: doc.name,
            icon: doc.icon || '📄',
            detail: status,
            item: doc
          });
        }
      });
      
      return links;
    }

    // Document photo handling
    function handleDocPhotoUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      // Check file size (max 5MB)
      if (file.size > 5 * 1024 * 1024) {
        alert('Photo is too large. Please use an image under 5MB.');
        return;
      }
      
      const reader = new FileReader();
      reader.onload = function(e) {
        // Compress image if needed
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const maxSize = 1200; // Max dimension
          let width = img.width;
          let height = img.height;
          
          if (width > maxSize || height > maxSize) {
            if (width > height) {
              height = (height / width) * maxSize;
              width = maxSize;
            } else {
              width = (width / height) * maxSize;
              height = maxSize;
            }
          }
          
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          
          const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.8);
          document.getElementById('docPhoto').value = compressedDataUrl;
          render();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function quickDismissBill(id) {
      const parsedId = isNaN(parseInt(id)) ? id : parseInt(id);
      const sub = state.subscriptions.find(s => s.id === parsedId);
      if (!sub) return;
      
      // Move next_bill forward by one cycle
      const currentDate = new Date(sub.next_bill || sub.nextDue);
      const cycle = sub.cycle || sub.billing_cycle || 'monthly';
      
      if (cycle === 'monthly') {
        currentDate.setMonth(currentDate.getMonth() + 1);
      } else if (cycle === 'yearly' || cycle === 'annual') {
        currentDate.setFullYear(currentDate.getFullYear() + 1);
      } else if (cycle === 'weekly') {
        currentDate.setDate(currentDate.getDate() + 7);
      }
      
      sub.next_bill = currentDate.toISOString().split('T')[0];
      sub.nextDue = sub.next_bill;
      
      if (state.user) dbUpdate('subscriptions', parsedId, { next_bill: sub.next_bill });
      saveDemoData();

    // Calculate next recurrence date
    function getNextRecurrenceDate(currentDate, recurrence) {
      const date = new Date(currentDate);
      
      switch (recurrence) {
        case 'daily':
          date.setDate(date.getDate() + 1);
          break;
        case 'weekly':
          date.setDate(date.getDate() + 7);
          break;
        case 'biweekly':
          date.setDate(date.getDate() + 14);
          break;
        case 'monthly':
          date.setMonth(date.getMonth() + 1);
          break;
        case 'yearly':
          date.setFullYear(date.getFullYear() + 1);
          break;
      }
      
      return date.toISOString().split('T')[0];
    }

    // Detect if a guide should be offered based on item name/type
    function detectGuideForItem(itemName, itemType) {
      const nameLower = (itemName || '').toLowerCase();
      
      // Debug log
      
      // Direct keyword matching for common document types
      if (itemType === 'document') {
        // Driver's license variations
        if (nameLower.includes('license') || nameLower.includes('licence') || 
            nameLower.includes('driver') || nameLower.includes('dmv') ||
            nameLower.includes('driving')) {
          return adaGuides['drivers-license'];
        }
        
        // Passport
        if (nameLower.includes('passport')) {
          return adaGuides['passport'];
        }
      }
      
      // General trigger matching for all item types
      for (const [key, guide] of Object.entries(adaGuides)) {
        for (const trigger of guide.triggers) {
          if (nameLower.includes(trigger.toLowerCase())) {
            return guide;
          }
        }
      }
      
      return null;
    }

    // Accept guide and create tasks
    function acceptGuide() {
      const guide = state.pendingGuide;
      if (!guide) return;
      
      // Check Pro access for guides beyond the first one
      if (!canAccessProFeature('ada-guides')) {
        state.showGuideOffer = false;
        state.pendingGuide = null;
        showProGate('ada-guides');
        return;
      }
      
      const today = new Date();
      const tasks = guide.steps.map((step, index) => {
        // Stagger due dates
        const dueDate = new Date(today);
        dueDate.setDate(dueDate.getDate() + (index * 2) + 1);
        
        return {
          id: Date.now() + index,
          title: step.title,
          category: 'Life Admin',
          priority: index === 0 ? 'high' : 'medium',
          due_date: dueDate.toISOString().split('T')[0],
          completed: false,
          guideId: guide.id,
          guideStep: index + 1,
          guideDescription: step.description
        };
      });
      
      // Add tasks to state
      state.tasks = [...(state.tasks || []), ...tasks];
      saveDemoData();
      
      // Track that user accepted this guide
      const acceptedGuides = JSON.parse(localStorage.getItem('ctrl_accepted_guides') || '[]');
      acceptedGuides.push(guide.id);
      localStorage.setItem('ctrl_accepted_guides', JSON.stringify(acceptedGuides));
      
      // Close modal and show success
      state.showGuideOffer = false;
      state.pendingGuide = null;
      
      showGuideAcceptedAnimation(guide, tasks.length);
    }

    function getFilteredSortedSubscriptions() {
      let subs = [...state.subscriptions];
      
      // Filter by category
      if (state.subscriptionFilter !== 'all') {
        subs = subs.filter(s => (s.category || 'Other') === state.subscriptionFilter);
      }
      
      // Filter by tag
      if (state.filterByTag) {
        subs = subs.filter(s => (s.tags || []).includes(state.filterByTag));
      }
      
      // Sort
      switch (state.subscriptionSort) {
        case 'due':
          subs.sort((a, b) => getDaysUntil(a.next_bill) - getDaysUntil(b.next_bill));
          break;
        case 'price':
          subs.sort((a, b) => (b.price || 0) - (a.price || 0));
          break;
        case 'name':
          subs.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
          break;
        case 'category':
          subs.sort((a, b) => (a.category || 'Other').localeCompare(b.category || 'Other'));
          break;
      }
      
      return subs;
    }

    function getFilteredSortedDocuments() {
      let docs = [...state.documents];
      
      // Filter by status
      if (state.documentFilter !== 'all') {
        docs = docs.filter(d => {
          const days = getDaysUntil(d.expiry_date || d.expiryDate);
          switch (state.documentFilter) {
            case 'expiring': return days > 0 && days <= 90;
            case 'expired': return days <= 0;
            case 'valid': return days > 90;
            default: return true;
          }
        });
      }
      
      // Filter by tag
      if (state.filterByTag) {
        docs = docs.filter(d => (d.tags || []).includes(state.filterByTag));
      }
      
      // Sort
      switch (state.documentSort) {
        case 'expiry':
          docs.sort((a, b) => getDaysUntil(a.expiry_date || a.expiryDate) - getDaysUntil(b.expiry_date || b.expiryDate));
          break;
        case 'name':
          docs.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
          break;
        case 'type':
          docs.sort((a, b) => (a.category || 'Other').localeCompare(b.category || 'Other'));
          break;
      }
      
      return docs;
    }

    function renderSpendingTrendsChart(currentMonthly) {
      const months = [];
      const today = new Date();
      
      // Generate last 6 months + current + 2 projected
      for (let i = -6; i <= 2; i++) {
        const date = new Date(today.getFullYear(), today.getMonth() + i, 1);
        const monthName = date.toLocaleDateString('en-US', { month: 'short' });
        const isCurrent = i === 0;
        const isProjected = i > 0;
        
        // Simulate some variance in historical data (in real app, this would come from actual data)
        let amount = currentMonthly;
        if (i < 0) {
          // Historical - add some random variance
          const variance = (Math.random() - 0.5) * 0.15; // ±7.5% variance
          amount = currentMonthly * (1 + variance);
        }
        
        months.push({
          name: monthName,
          amount: amount,
          isCurrent,
          isProjected
        });
      }
      
      const maxAmount = Math.max(...months.map(m => m.amount)) * 1.1;
      
      return months.map(m => {
        const height = (m.amount / maxAmount) * 140;
        return `
          <div class="spending-trend-bar-wrapper">
            <div class="spending-trend-bar ${m.isCurrent ? 'current' : ''} ${m.isProjected ? 'projected' : ''}" 
                 style="height: ${height}px; background: ${m.isProjected ? '' : m.isCurrent ? '' : 'var(--bg-elevated)'};"
                 title="$${m.amount.toFixed(0)}">
            </div>
            <span class="spending-trend-month ${m.isCurrent ? 'current' : ''}">${m.name}</span>
          </div>
        `;
      }).join('');
    }

              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            </button>
            <button class="mobile-header-btn" onclick="toggleNotificationCenter()">
              ${icons.bell}
              ${unreadCount > 0 ? `<span class="notification-badge">${unreadCount > 9 ? '9+' : unreadCount}</span>` : ''}
            </button>
            <div class="mobile-header-avatar">${userInitial}</div>
          </div>
        </div>
        
        <!-- Desktop Sidebar -->
        <aside class="sidebar">
          <div class="logo">
            <div class="logo-mark">
              <h1>CTRL</h1>
            </div>
            <span>Life Operating System</span>
          </div>
          
          <!-- Search Button -->
          <div class="sidebar-search" onclick="openSearch()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <span>Search...</span>
            <kbd>⌘K</kbd>
          </div>
          
          <nav class="nav">
            <div class="nav-section nav-section-core">
              <div class="nav-item ${state.activeModule === 'home' ? 'active' : ''}" data-module="home">
                <span class="nav-icon">${icons.home}</span>
                Home
              </div>
              <div class="nav-item ${state.activeModule === 'today' ? 'active' : ''}" data-module="today">
                <span class="nav-icon">${icons.calendar}</span>
                Today
              </div>
              <div class="nav-item nav-item-ada ${state.activeModule === 'copilot' ? 'active' : ''}" data-module="copilot">
                <span class="nav-icon">${icons.copilot}</span>
                Ada
              </div>
            </div>
            <div class="nav-section nav-section-modules">
              <div class="nav-section-title">Your stuff</div>
              <div class="nav-item nav-item-secondary ${state.activeModule === 'subscriptions' ? 'active' : ''}" data-module="subscriptions">
                <span class="nav-icon">${icons.subscriptions}</span>
                Bills
              </div>
              <div class="nav-item nav-item-secondary ${state.activeModule === 'documents' ? 'active' : ''}" data-module="documents">
                <span class="nav-icon">${icons.documents}</span>
                Documents
              </div>
              <div class="nav-item nav-item-secondary ${state.activeModule === 'tasks' ? 'active' : ''}" data-module="tasks">
                <span class="nav-icon">${icons.tasks}</span>
                Tasks
              </div>
              <div class="nav-item nav-item-secondary ${state.activeModule === 'habits' ? 'active' : ''}" data-module="habits">
                <span class="nav-icon">${icons.habits}</span>
                Habits
              </div>
              <div class="nav-item nav-item-secondary ${state.activeModule === 'calendar' ? 'active' : ''}" data-module="calendar">
                <span class="nav-icon">${icons.calendar}</span>
                Calendar
              </div>
            </div>
            <div class="nav-section">
              <div class="nav-item nav-item-secondary ${state.activeModule === 'reset' ? 'active' : ''}" data-module="reset">
                <span class="nav-icon">${icons.reset}</span>
                Monthly Reset
              </div>
              <div class="nav-item nav-item-secondary ${state.activeModule === 'settings' ? 'active' : ''}" data-module="settings">
                <span class="nav-icon">${icons.settings}</span>
                Settings
              </div>
            </div>
          </nav>
          <div class="sidebar-footer">
            <button class="theme-toggle" onclick="toggleTheme()" title="${state.theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'}">
              ${state.theme === 'dark' ? icons.sun : icons.moon}
            </button>
            <button class="notification-bell" onclick="toggleNotificationCenter()">
              ${icons.bell}
              ${unreadCount > 0 ? `<span class="notification-badge">${unreadCount > 9 ? '9+' : unreadCount}</span>` : ''}
            </button>
            ${state.user ? `
              <div class="sync-indicator ${state.isSyncing ? 'syncing' : 'synced'}">
                <span class="sync-dot"></span>
                ${state.isSyncing ? 'Syncing...' : 'Synced'}
              </div>
            ` : ''}
          </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main">
          ${renderModule()}
        </main>
        
        <!-- Mobile Bottom Navigation -->
        <nav class="bottom-nav">
          <div class="bottom-nav-items">
            <div class="bottom-nav-item ${state.activeModule === 'home' ? 'active' : ''}" data-module="home">
              ${icons.home}
              <span class="bottom-nav-label">Home</span>
            </div>
            <div class="bottom-nav-item ${state.activeModule === 'today' ? 'active' : ''}" data-module="today">
              ${icons.calendar}
              <span class="bottom-nav-label">Today</span>
            </div>
            <div class="bottom-nav-item bottom-nav-ada ${state.activeModule === 'copilot' ? 'active' : ''}" data-module="copilot">
              ${icons.copilot}
              <span class="bottom-nav-label">Ada</span>
            </div>
            <div class="bottom-nav-item ${['subscriptions', 'documents', 'tasks', 'habits', 'calendar', 'reset', 'settings'].includes(state.activeModule) ? 'active' : ''}" onclick="toggleMobileMore(event)">
              ${icons.menu}
              <span class="bottom-nav-label">More</span>
            </div>
          </div>
        </nav>
        
        <!-- Mobile More Menu -->
        ${state.showMobileMore ? `
          <div class="mobile-more-overlay" onclick="closeMobileMore()"></div>
          <div class="mobile-more-menu">
            <div class="mobile-more-item ${state.activeModule === 'subscriptions' ? 'active' : ''}" data-module="subscriptions">
              ${icons.subscriptions}
              <span>Subscriptions</span>
            </div>
            <div class="mobile-more-item ${state.activeModule === 'documents' ? 'active' : ''}" data-module="documents">
              ${icons.documents}
              <span>Documents</span>
            </div>
            <div class="mobile-more-item ${state.activeModule === 'habits' ? 'active' : ''}" data-module="habits">
              ${icons.habits}
              <span>Habits</span>
            </div>
            <div class="mobile-more-item ${state.activeModule === 'reset' ? 'active' : ''}" data-module="reset">
              ${icons.reset}
              <span>Monthly Reset</span>
            </div>
            <div class="mobile-more-item ${state.activeModule === 'settings' ? 'active' : ''}" data-module="settings">
              ${icons.settings}
              <span>Settings</span>
            </div>
          </div>
        ` : ''}
        
        ${state.showModal ? renderModal() : ''}
        ${state.showNotificationCenter ? renderNotificationCenter() : ''}
        ${state.showHabitCheckin ? renderHabitCheckin() : ''}
        ${state.showSearch ? renderSearch() : ''}
        ${state.showCalendarQuickAdd ? renderCalendarQuickAdd() : ''}
        ${state.showCalendarEventDetails ? renderCalendarEventDetails() : ''}
        ${state.showQuickExpense ? renderQuickExpense() : ''}
        ${state.showQuickAdd ? renderQuickAdd() : ''}
        ${state.showTagManager ? renderTagManager() : ''}
        ${state.showProUpgrade ? renderProUpgradeModal() : ''}
        ${state.showGuideOffer ? renderGuideOffer() : ''}
        ${state.showConfirm ? renderConfirmModal() : ''}
        ${state.showTour ? renderFeatureTour() : ''}
        ${state.showProGate ? renderProGateModal() : ''}
        ${state.showKeyboardHelp ? renderKeyboardHelp() : ''}
        ${state.viewingPhoto ? renderPhotoViewer() : ''}
        ${state.showAccountPrompt ? renderAccountPrompt() : ''}
      `;

      // Add event listeners for both desktop and mobile nav
      document.querySelectorAll('.nav-item, .bottom-nav-item').forEach(item => {
        item.addEventListener('click', () => {
          if (item.dataset.module) {
            state.activeModule = item.dataset.module;
            state.addingAccomplishment = false;
            state.addingGoal = false;
            state.showMobileMore = false;
            render();
          }
        });
      });
      
      // Mobile more menu items
      document.querySelectorAll('.mobile-more-item').forEach(item => {
        item.addEventListener('click', () => {
          state.activeModule = item.dataset.module;
          state.showMobileMore = false;
          render();
        });
      });

      if (state.activeModule === 'copilot') setupChat();
      if (state.activeModule === 'subscriptions') setupSubscriptions();
      if (state.activeModule === 'documents') setupDocuments();
      if (state.activeModule === 'reset') setupMonthlyReset();
      if (state.activeModule === 'tasks') setupTasks();
      if (state.activeModule === 'habits') setupHabits();
      if (state.showModal) setupModal();
      if (state.showSearch) setupSearch();
    }
    
    function toggleMobileMore(event) {
      event.stopPropagation();
      state.showMobileMore = !state.showMobileMore;
      render();
    }
    
    function closeMobileMore() {
      state.showMobileMore = false;
      render();
    }

    // =================== GLOBAL SEARCH ===================
    function renderSearch() {
      const results = performSearch(state.searchQuery);
      
      return `
        <div class="search-overlay" onclick="if(event.target === this) closeSearch()">
          <div class="search-modal">
            <div class="search-input-wrapper">
              ${icons.search || `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>`}
              <input type="text" 
                     class="search-input" 
                     id="globalSearchInput"
                     placeholder="Search subscriptions, documents, tasks, habits..." 
                     value="${state.searchQuery}"
                     autocomplete="off">
              <span class="search-shortcut">ESC</span>
            </div>
            <div class="search-results">
              ${state.searchQuery.length === 0 ? renderSearchQuickLinks() : renderSearchResults(results)}
            </div>
            <div class="search-footer">
              <div class="search-footer-item">
                <kbd>↑↓</kbd> Navigate
              </div>
              <div class="search-footer-item">
                <kbd>↵</kbd> Select
              </div>
              <div class="search-footer-item">
                <kbd>ESC</kbd> Close
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderSearchQuickLinks() {
      const modules = [
        { icon: icons.home, name: 'Home', module: 'home', type: 'module' },
        { icon: icons.copilot, name: 'Ada - AI Copilot', module: 'copilot', type: 'module' },
        { icon: icons.subscriptions, name: 'Subscriptions', module: 'subscriptions', type: 'module' },
        { icon: icons.documents, name: 'Documents', module: 'documents', type: 'module' },
        { icon: icons.tasks, name: 'Tasks', module: 'tasks', type: 'module' },
        { icon: icons.habits, name: 'Habits', module: 'habits', type: 'module' },
        { icon: icons.calendar, name: 'Calendar', module: 'calendar', type: 'module' },
        { icon: icons.reset, name: 'Monthly Reset', module: 'reset', type: 'module' },
      ];

      return `
        <div class="search-section">
          <div class="search-section-title">Quick Navigation</div>
          ${modules.map(m => `
            <div class="search-result" onclick="navigateFromSearch('${m.module}')">
              <div class="search-result-icon module">${m.icon}</div>
              <div class="search-result-content">
                <div class="search-result-title">${m.name}</div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderSearchResults(results) {
      if (results.length === 0) {
        return `
          <div class="search-empty">
            ${icons.search || `<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>`}
            <p>No results found for "${state.searchQuery}"</p>
          </div>
        `;
      }

      // Group results by type
      const grouped = {};
      results.forEach(r => {
        if (!grouped[r.type]) grouped[r.type] = [];
        grouped[r.type].push(r);
      });

      const typeLabels = {
        subscription: 'Subscriptions',
        document: 'Documents',
        task: 'Tasks',
        habit: 'Habits'
      };

      return Object.entries(grouped).map(([type, items]) => `
        <div class="search-section">
          <div class="search-section-title">${typeLabels[type] || type}</div>
          ${items.slice(0, 5).map(item => `
            <div class="search-result" onclick="selectSearchResult('${type}', '${item.id}')">
              <div class="search-result-icon ${type}">${item.icon}</div>
              <div class="search-result-content">
                <div class="search-result-title">${highlightMatch(item.title, state.searchQuery)}</div>
                <div class="search-result-meta">${item.meta}</div>
              </div>
              ${item.badge ? `<span class="search-result-badge">${item.badge}</span>` : ''}
            </div>
          `).join('')}
        </div>
      `).join('');
    }

    function performSearch(query) {
      if (!query || query.length < 1) return [];
      
      const q = query.toLowerCase();
      const results = [];

      // Search subscriptions
      (state.subscriptions || []).forEach(sub => {
        if (sub.name.toLowerCase().includes(q) || (sub.category || '').toLowerCase().includes(q)) {
          results.push({
            type: 'subscription',
            id: sub.id,
            icon: sub.icon || '💳',
            title: sub.name,
            meta: `$${(sub.price || 0).toFixed(2)}/${sub.cycle || 'monthly'}`,
            badge: sub.category
          });
        }
      });

      // Search documents
      (state.documents || []).forEach(doc => {
        if (doc.name.toLowerCase().includes(q)) {
          const days = getDaysUntil(doc.expiry_date || doc.expiryDate);
          results.push({
            type: 'document',
            id: doc.id,
            icon: doc.icon || '📄',
            title: doc.name,
            meta: days <= 0 ? 'Expired' : `Expires in ${days} days`,
            badge: days <= 30 ? (days <= 0 ? 'Expired' : 'Expiring') : null
          });
        }
      });

      // Search tasks
      (state.tasks || []).forEach(task => {
        if (task.title.toLowerCase().includes(q) || (task.category || '').toLowerCase().includes(q)) {
          results.push({
            type: 'task',
            id: task.id,
            icon: task.completed ? '✓' : '☐',
            title: task.title,
            meta: task.due_date ? `Due ${formatDate(task.due_date)}` : 'No due date',
            badge: task.priority
          });
        }
      });

      // Search habits
      (state.habits || []).forEach(habit => {
        if (habit.name.toLowerCase().includes(q)) {
          results.push({
            type: 'habit',
            id: habit.id,
            icon: habit.icon || '🎯',
            title: habit.name,
            meta: `${habit.streak || 0} day streak`,
            badge: habit.frequency
          });
        }
      });

      return results;
    }

    function highlightMatch(text, query) {
      if (!query) return text;
      const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
      return text.replace(regex, '<mark style="background: var(--brand-soft); color: var(--brand-primary); border-radius: 2px; padding: 0 2px;">$1</mark>');
    }

    function openSearch() {
      state.showSearch = true;
      state.searchQuery = '';
      render();
    }

    function closeSearch() {
      state.showSearch = false;
      state.searchQuery = '';
      render();
    }

    function navigateFromSearch(module) {
      state.activeModule = module;
      closeSearch();
    }

    function selectSearchResult(type, id) {
      const moduleMap = {
        subscription: 'subscriptions',
        document: 'documents',
        task: 'tasks',
        habit: 'habits'
      };
      state.activeModule = moduleMap[type] || 'home';
      closeSearch();
    }

    function setupSearch() {
      const input = document.getElementById('globalSearchInput');
      if (input) {
        input.focus();
        input.addEventListener('input', (e) => {
          state.searchQuery = e.target.value;
          // Re-render just the results
          const resultsContainer = document.querySelector('.search-results');
          if (resultsContainer) {
            const results = performSearch(state.searchQuery);
            resultsContainer.innerHTML = state.searchQuery.length === 0 
              ? renderSearchQuickLinks() 
              : renderSearchResults(results);
          }
        });
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') {
            closeSearch();
          } else if (e.key === 'Enter') {
            const firstResult = document.querySelector('.search-result');
            if (firstResult) firstResult.click();
          }
        });
      }
    }

    // Global keyboard shortcut for search
    document.addEventListener('keydown', (e) => {
      // Don't trigger shortcuts when typing in inputs
      const isTyping = ['INPUT', 'TEXTAREA'].includes(document.activeElement?.tagName);
      
      // Cmd+K or Ctrl+K to open search (works even when typing)
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        if (state.showSearch) {
          closeSearch();
        } else {
          openSearch();
        }
        return;
      }
      
      // Escape to close modals/search
      if (e.key === 'Escape') {
        if (state.showSearch) { closeSearch(); return; }
        if (state.showModal) { closeModal(); return; }
        if (state.showQuickAdd) { closeQuickAdd(); return; }
        if (state.showConfirm) { closeConfirmModal(); return; }
        if (state.showProGate) { closeProGate(); return; }
        if (state.showProUpgrade) { state.showProUpgrade = false; render(); return; }
        if (state.showTour) { skipTour(); return; }
        if (state.showGuideOffer) { declineGuide(); return; }
        return;
      }
      
      // Don't trigger navigation shortcuts when typing
      if (isTyping) return;
      
      // ? to show keyboard shortcuts help
      if (e.key === '?' && !e.shiftKey) {
        e.preventDefault();
        toggleKeyboardHelp();
        return;
      }
      
      // Navigation shortcuts (g + key for "go to")
      if (e.key === 'g') {
        state.awaitingNavKey = true;
        setTimeout(() => { state.awaitingNavKey = false; }, 1000);
        return;
      }
      
      if (state.awaitingNavKey) {
        state.awaitingNavKey = false;
        switch (e.key) {
          case 'h': state.activeModule = 'home'; render(); break;
          case 't': state.activeModule = 'today'; render(); break;
          case 'a': state.activeModule = 'copilot'; render(); break;
          case 's': state.activeModule = 'subscriptions'; render(); break;
          case 'd': state.activeModule = 'documents'; render(); break;
          case 'k': state.activeModule = 'tasks'; render(); break;
          case 'b': state.activeModule = 'habits'; render(); break;
          case 'c': state.activeModule = 'calendar'; render(); break;
          case 'r': state.activeModule = 'reset'; render(); break;
          case ',': state.activeModule = 'settings'; render(); break;
        }
        return;
      }
      
      // Quick actions
      if (e.key === 'n' && !e.metaKey && !e.ctrlKey) {
        e.preventDefault();
        openQuickAdd();
        return;
      }
      
      // Toggle sidebar on desktop
      if (e.key === '[' && (e.metaKey || e.ctrlKey)) {
        e.preventDefault();
        state.sidebarCollapsed = !state.sidebarCollapsed;
        render();
        return;
      }
      
      // Toggle theme
      if (e.key === 't' && (e.metaKey || e.ctrlKey) && e.shiftKey) {
        e.preventDefault();
        toggleTheme();
        return;
      }
    });
    
    // Keyboard shortcuts help modal
    function toggleKeyboardHelp() {
      state.showKeyboardHelp = !state.showKeyboardHelp;
      render();
    }
    
    function renderKeyboardHelp() {
      if (!state.showKeyboardHelp) return '';
      
      const shortcuts = [
        { category: 'Navigation', items: [
          { keys: ['g', 'h'], description: 'Go to Home' },
          { keys: ['g', 't'], description: 'Go to Today' },
          { keys: ['g', 'a'], description: 'Go to Ada' },
          { keys: ['g', 's'], description: 'Go to Subscriptions' },
          { keys: ['g', 'd'], description: 'Go to Documents' },
          { keys: ['g', 'k'], description: 'Go to Tasks' },
          { keys: ['g', 'b'], description: 'Go to Habits' },
          { keys: ['g', 'c'], description: 'Go to Calendar' },
          { keys: ['g', 'r'], description: 'Go to Monthly Reset' },
          { keys: ['g', ','], description: 'Go to Settings' },
        ]},
        { category: 'Actions', items: [
          { keys: ['⌘', 'K'], description: 'Open search' },
          { keys: ['N'], description: 'Quick add' },
          { keys: ['Esc'], description: 'Close modal/search' },
          { keys: ['?'], description: 'Show this help' },
        ]},
        { category: 'Other', items: [
          { keys: ['⌘', '⇧', 'T'], description: 'Toggle theme' },
          { keys: ['⌘', '['], description: 'Toggle sidebar' },
        ]}
      ];
      
      return `
        <div class="keyboard-help-overlay" onclick="toggleKeyboardHelp()">
          <div class="keyboard-help-modal" onclick="event.stopPropagation()">
            <div class="keyboard-help-header">
              <h2>Keyboard Shortcuts</h2>
              <button class="keyboard-help-close" onclick="toggleKeyboardHelp()">${icons.x}</button>
            </div>
            <div class="keyboard-help-content">
              ${shortcuts.map(section => `
                <div class="keyboard-help-section">
                  <h3 class="keyboard-help-category">${section.category}</h3>
                  <div class="keyboard-help-list">
                    ${section.items.map(item => `
                      <div class="keyboard-help-item">
                        <div class="keyboard-help-keys">
                          ${item.keys.map(k => `<kbd>${k}</kbd>`).join('<span class="keyboard-help-then">then</span>')}
                        </div>
                        <div class="keyboard-help-desc">${item.description}</div>
                      </div>
                    `).join('')}
                  </div>
                </div>
              `).join('')}
            </div>
            <div class="keyboard-help-footer">
              Press <kbd>?</kbd> to toggle this help
            </div>
          </div>
        </div>
      `;
    }

    // Apply theme immediately (before render to prevent flash)
    applyTheme();

    // Initialize the app
    initializeApp();

    // =================== PWA INSTALL PROMPT ===================
    let deferredPrompt;
    
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(registration => {
            console.log('CTRL: Service Worker registered');
          })
          .catch(err => {
            console.log('CTRL: Service Worker registration failed:', err);
          });
      });
    }
    
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
    });

    window.addEventListener('appinstalled', () => {
      deferredPrompt = null;
      addNotification({
        type: 'system',
        icon: '📱',
        title: 'CTRL installed!',
        body: 'You can now access CTRL from your home screen.',
      });
    });

    function installPWA() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((choiceResult) => {
          deferredPrompt = null;
        });
      } else {
        // Fallback instructions for browsers that don't support beforeinstallprompt
        alert('To install CTRL:\n\n• iOS Safari: Tap Share → Add to Home Screen\n• Android Chrome: Tap Menu → Add to Home Screen\n• Desktop Chrome: Click the install icon in the address bar');
      }
    }
  </script>
</body>
</html>
