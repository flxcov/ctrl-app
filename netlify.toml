[build]
  # No build command needed for static site
  publish = "."

[functions]
  # Directory for serverless functions
  directory = "netlify/functions"

# Redirect API calls to the function
[[redirects]]
  from = "/api/ada"
  to = "/.netlify/functions/ada"
  status = 200

# SPA fallback - serve index.html for all routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
